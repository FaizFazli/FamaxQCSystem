<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Teams Notification - IPQC System</title>
    <link rel="icon" type="png" href="/FamaxQCSystem/assets/LogoRound.png?v=2" />

    <!-- Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet" />

    <!-- Shared design system (load before page styles) -->
    <link rel="stylesheet" href="/assets/theme.css" />

    <!-- Corrected Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.6.2/axios.min.js"></script>
    <script src="/assets/app-config.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>

    <style>
        /* Page-specific layout & component overrides. Tokens/reset/base come from theme.css. */
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: var(--space-8) var(--space-5);
        }

        .nav-top {
            width: 100%;
            max-width: 1240px;
            margin-bottom: var(--space-6);
        }

        .back-link {
            color: var(--text-muted);
            text-decoration: none;
            font-size: var(--fs-sm);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: inline-flex;
            align-items: center;
            gap: var(--space-2);
            transition: color var(--transition), transform var(--transition);
            cursor: pointer;
        }

        .back-link:hover {
            color: var(--primary);
            transform: translateX(-3px);
        }

        .main-container {
            display: flex;
            flex-direction: row;
            gap: var(--space-6);
            width: 100%;
            max-width: 1240px;
            align-items: flex-start;
            justify-content: center;
        }

        .report-card,
        .tracking-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            flex: 1;
            width: 100%;
            max-width: 600px;
            height: 1100px;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        @media (max-width: 1024px) {
            .main-container {
                flex-direction: column;
                align-items: center;
            }

            .report-card,
            .tracking-card {
                max-width: 600px;
                height: auto;
                min-height: 800px;
            }
        }

        .card-header {
            background: #1e293b;
            padding: var(--space-6) var(--space-8);
            color: #fff;
        }

        .card-header h1 {
            margin: 0;
            font-size: var(--fs-lg);
            font-weight: 800;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: var(--space-3);
        }

        .card-body {
            padding: var(--space-8);
        }

        .form-group {
            margin-bottom: var(--space-6);
        }

        label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: var(--fs-xs);
            font-weight: 800;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: var(--space-2);
            margin-left: var(--space-1);
        }

        .label-badge {
            font-size: 10px;
            background: var(--primary-soft);
            color: var(--primary);
            padding: 2px 10px;
            border-radius: var(--radius-sm);
        }

        textarea {
            font-weight: 500;
        }

        .radio-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 10px;
        }

        .radio-card {
            position: relative;
            cursor: pointer;
        }

        .radio-card input {
            position: absolute;
            opacity: 0;
        }

        .radio-content {
            display: block;
            padding: var(--space-3);
            text-align: center;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: var(--fs-sm);
            font-weight: 700;
            transition: background var(--transition), border-color var(--transition), color var(--transition);
            background: var(--bg-card);
        }

        .radio-card input:checked+.radio-content {
            background: var(--primary-soft);
            border-color: var(--primary);
            color: var(--primary);
        }

        .part-selector-container {
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            overflow: hidden;
            background: var(--bg-card);
        }

        .search-wrapper {
            padding: var(--space-2);
            background: var(--surface-muted);
            border-bottom: 1px solid var(--border);
        }

        .part-list-scroll {
            max-height: 220px;
            overflow-y: auto;
            padding: var(--space-2);
        }

        .part-item {
            display: flex;
            align-items: center;
            padding: 10px var(--space-3);
            border-radius: var(--radius-sm);
            margin-bottom: var(--space-1);
            transition: background var(--transition);
        }

        .part-item:hover {
            background: var(--surface-muted);
        }

        .part-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
            margin-right: var(--space-3);
            accent-color: var(--primary);
        }

        .part-name-text {
            font-size: var(--fs-base);
            font-weight: 600;
            color: var(--text-main);
        }

        .part-date {
            font-size: var(--fs-xs);
            color: var(--text-muted);
            font-weight: 500;
        }

        textarea#message {
            background-color: var(--surface-muted);
            font-family: monospace;
            font-size: var(--fs-sm);
            line-height: 1.5;
            min-height: 140px;
            border-style: dashed;
            color: var(--primary);
        }

        .action-btn {
            width: 100%;
            height: 54px;
            background-color: #1e293b;
            color: #fff;
            border: none;
            border-radius: var(--radius-lg);
            font-size: var(--fs-base);
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: var(--space-3);
            transition: background var(--transition), transform var(--transition), box-shadow var(--transition);
            box-shadow: var(--shadow);
        }

        .action-btn:hover:not(:disabled) {
            background-color: #000;
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .action-btn:disabled {
            background-color: var(--border-strong);
            cursor: not-allowed;
            box-shadow: none;
        }

        .tracking-header {
            padding: var(--space-5) var(--space-6);
            background: var(--surface-muted);
            border-bottom: 1px solid var(--border);
            font-weight: 800;
            font-size: var(--fs-sm);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #tracking-list {
            flex: 1;
            overflow-y: auto;
            padding: var(--space-2) var(--space-5);
        }

        .log-item {
            padding: var(--space-5) 0;
            border-bottom: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: var(--space-2);
        }

        .status-badge {
            font-size: 9px;
            padding: 3px 10px;
            border-radius: var(--radius-sm);
            font-weight: 800;
            text-transform: uppercase;
        }

        .status-pending-qa {
            background: #ffedd5;
            color: #c2410c;
        }

        .status-pending-mgmt {
            background: #e0f2fe;
            color: #0369a1;
        }

        .status-completed {
            background: #dcfce7;
            color: #15803d;
        }

        .complete-btn,
        .qa-sign-btn {
            padding: 8px 16px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            border: none;
            cursor: pointer;
            transition: 0.2s;
        }

        .complete-btn {
            background: var(--success);
            color: #fff;
        }

        .qa-sign-btn {
            background: var(--primary);
            color: #fff;
        }

        .footer {
            text-align: center;
            margin: var(--space-10) 0;
            color: var(--text-muted);
            font-size: var(--fs-xs);
            font-weight: 500;
        }

        .hidden {
            display: none;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border-strong);
            border-radius: var(--radius-sm);
        }
    </style>
</head>

<body>
    <div class="nav-top">
        <a onclick="window.history.back()" class="back-link">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
            Back to Dashboard
        </a>
    </div>

    <div class="main-container">
        <!-- FORM CARD -->
        <div class="report-card">
            <div class="card-header">
                <h1>
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2.5">
                        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                        <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
                    </svg>
                    Teams Notification
                </h1>
            </div>

            <div class="card-body">
                <div class="form-group">
                    <label for="sender-name">Your Name</label>
                    <input type="text" id="sender-name" placeholder="Enter your name" oninput="autoGenerateMessage()" />
                </div>

                <div class="form-group">
                    <label>Subject / Issue</label>
                    <div class="radio-cards">
                        <label class="radio-card">
                            <input type="radio" name="subject-opt" value="WI APPROVAL" checked
                                onchange="handleSubjectChange()" />
                            <span class="radio-content">WI Approval</span>
                        </label>
                        <label class="radio-card">
                            <input type="radio" name="subject-opt" value="Machine breakdown"
                                onchange="handleSubjectChange()" />
                            <span class="radio-content">Breakdown</span>
                        </label>
                        <label class="radio-card">
                            <input type="radio" name="subject-opt" value="Others" onchange="handleSubjectChange()" />
                            <span class="radio-content">Others</span>
                        </label>
                    </div>
                    <div id="other-subject-container" class="hidden" style="margin-top: 12px">
                        <input type="text" id="other-subject" placeholder="Type specific issue..."
                            oninput="autoGenerateMessage()" />
                    </div>
                </div>

                <div class="form-group">
                    <label>Select Part Names <span class="label-badge" id="selected-count">0 selected</span></label>
                    <div class="part-selector-container">
                        <div class="search-wrapper">
                            <input type="text" class="search-input" id="part-search" placeholder="Search part name..."
                                oninput="filterParts()" />
                        </div>
                        <div class="part-list-scroll" id="part-list-container">
                            <div
                                style="padding: 20px; text-align: center; color: var(--text-muted); font-size: 13px; font-weight: 500;">
                                Loading parts...</div>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label>Person Responsible</label>
                    <div class="radio-cards">
                        <label class="radio-card">
                            <input type="radio" name="resp-opt" value="QA" checked onchange="autoGenerateMessage()" />
                            <span class="radio-content">QA</span>
                        </label>
                        <label class="radio-card">
                            <input type="radio" name="resp-opt" value="ENG" onchange="autoGenerateMessage()" />
                            <span class="radio-content">ENG</span>
                        </label>
                        <label class="radio-card">
                            <input type="radio" name="resp-opt" value="Management" onchange="autoGenerateMessage()" />
                            <span class="radio-content">Management</span>
                        </label>
                    </div>
                </div>

                <div class="form-group">
                    <label for="message">Preview Message</label>
                    <textarea id="message" readonly placeholder="Message will generate automatically..."></textarea>
                </div>

                <button id="send-btn" class="action-btn" onclick="sendTeamsMessage()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                    Send to Teams
                </button>
            </div>
        </div>

        <!-- TRACKING DASHBOARD -->
        <div class="tracking-card">
            <div class="tracking-header">
                <span>Approval Tracking</span>
                <button onclick="loadApprovalLogs()"
                    style="background:none; border:none; color:var(--primary); font-weight:800; font-size:11px; cursor:pointer;">Refresh</button>
            </div>
            <div id="tracking-list">
                <div style="padding: 20px; text-align: center; color: var(--text-muted); font-weight: 500;">Loading
                    active requests...</div>
            </div>
        </div>
    </div>

    <div class="footer">© 2025 Famax Technology (M) Sdn. Bhd. All rights reserved.</div>

    <script>
        const TEAMS_WEBHOOK_URL = window.APP_CONFIG.host + "/FamaxQCSystem/api/teams";
        const SUPABASE_URL = window.APP_CONFIG.url;
        const SUPABASE_KEY = window.APP_CONFIG.key;

        const api = axios.create({
            baseURL: SUPABASE_URL,
            headers: {
                apikey: SUPABASE_KEY,
                Authorization: `Bearer ${SUPABASE_KEY}`,
                "Content-Type": "application/json",
            },
        });

        let allParts = [];
        let selectedParts = new Set();

        async function loadPartsList() {
            try {
                const res = await api.get("/rest/v1/Parts?select=Part_Name,created_at&order=created_at.desc");
                const seen = new Set();
                allParts = res.data.filter((el) => {
                    const duplicate = seen.has(el.Part_Name);
                    seen.add(el.Part_Name);
                    return !duplicate;
                });
                renderPartsList(allParts);
            } catch (e) {
                console.error("Parts load error", e);
            }
        }

        function renderPartsList(parts) {
            const container = document.getElementById("part-list-container");
            container.innerHTML = "";
            if (parts.length === 0) {
                container.innerHTML = '<div style="padding: 20px; text-align: center;">No parts found.</div>';
                return;
            }
            parts.forEach((item) => {
                const dateStr = item.created_at ? new Date(item.created_at).toLocaleDateString("en-GB") : "";
                const isChecked = selectedParts.has(item.Part_Name) ? "checked" : "";

                const div = document.createElement("div");
                div.className = "part-item";
                div.onclick = (e) => {
                    if (e.target.tagName !== "INPUT") {
                        const cb = div.querySelector("input");
                        cb.checked = !cb.checked;
                        updateSelection(cb);
                    }
                };

                div.innerHTML = `
            <input type="checkbox" value="${item.Part_Name}" ${isChecked} onchange="updateSelection(this)">
            <div class="part-info">
                <span class="part-name-text">${item.Part_Name}</span>
                <span class="part-date">${dateStr}</span>
            </div>`;
                container.appendChild(div);
            });
        }

        function filterParts() {
            const term = document.getElementById("part-search").value.toLowerCase();
            const filtered = allParts.filter((p) => p.Part_Name.toLowerCase().includes(term));
            renderPartsList(filtered);
        }

        function updateSelection(checkbox) {
            if (checkbox.checked) {
                selectedParts.add(checkbox.value);
            } else {
                selectedParts.delete(checkbox.value);
            }
            updateUI();
        }

        function updateUI() {
            document.getElementById("selected-count").textContent = `${selectedParts.size} selected`;
            autoGenerateMessage();
        }

        function handleSubjectChange() {
            const otherContainer = document.getElementById("other-subject-container");
            const selectedSubject = document.querySelector('input[name="subject-opt"]:checked').value;
            otherContainer.classList.toggle("hidden", selectedSubject !== "Others");
            autoGenerateMessage();
        }

        function autoGenerateMessage() {
            const sender = document.getElementById("sender-name").value || "[Your Name]";
            const subjectOpt = document.querySelector('input[name="subject-opt"]:checked').value;
            const otherSubject = document.getElementById("other-subject").value;
            const finalSubject = subjectOpt === "Others" ? otherSubject || "Other Issue" : subjectOpt;
            const respPerson = document.querySelector('input[name="resp-opt"]:checked').value;

            let mention = "";
            if (respPerson === "QA") mention = "@Ayyub Sofi";
            else if (respPerson === "ENG") mention = "@Azim Bakar @Afiff Naufal";
            else if (respPerson === "Management") mention = "@Vicson Lee";

            const selectedPartsArray = Array.from(selectedParts);
            const partsListString = selectedPartsArray.length > 0 ? selectedPartsArray.join(", ") : "None selected";

            let msgTemplate = "";
            if (subjectOpt === "WI APPROVAL") {
                msgTemplate = `Please approve the following WI(s) immediately.\n\nParts: ${partsListString}\n\nAttention Required From: ${respPerson} ${mention}\n\nIssued BY: ${sender}`;
            } else {
                msgTemplate = `Subject: ${finalSubject}\nParts: ${partsListString}\nAttention: ${respPerson} ${mention}\n\nSubmitted by ${sender}. Please review.`;
            }
            document.getElementById("message").value = msgTemplate;
        }

        async function loadApprovalLogs() {
            try {
                const res = await api.get("/rest/v1/TeamsLog?status=neq.Completed&order=eng_initiated_at.desc");
                const container = document.getElementById("tracking-list");
                container.innerHTML = "";

                if (res.data.length === 0) {
                    container.innerHTML = '<div style="padding: 20px; text-align: center; color: var(--text-muted); font-weight:500;">No active logs found.</div>';
                    return;
                }

                res.data.forEach(item => {
                    const statusClass = item.status.toLowerCase().replace(/\s+/g, '-');
                    let actionBtn = "";

                    if (item.status === "Pending QA") {
                        actionBtn = `<button class="qa-sign-btn" onclick="qaSignApproval('${item.id}', '${item.part_names}')">QA Sign</button>`;
                    }
                    else if (item.status === "Pending MGMT") {
                        actionBtn = `<button class="complete-btn" onclick="completeApproval('${item.id}', '${item.part_names}')">Complete Sign</button>`;
                    }

                    container.innerHTML += `
                <div class="log-item">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <span style="font-weight: 700; font-size: 14px; color: var(--text-main);">${item.part_names}</span>
                        <span class="status-badge status-${statusClass}">${item.status}</span>
                    </div>
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 5px;">
                        <span style="font-size: 11px; color: var(--text-muted); font-weight: 600;">Initiated: ${new Date(item.eng_initiated_at).toLocaleString('en-GB')}</span>
                        ${actionBtn}
                    </div>
                </div>
            `;
                });
            } catch (e) { console.error(e); }
        }

        async function qaSignApproval(id, partNames) {
            if (!confirm(`Confirm QA Signature for ${partNames}? This will notify Management.`)) return;

            try {
                await api.patch(`/rest/v1/TeamsLog?id=eq.${id}`, {
                    qa_approved_at: new Date().toISOString(),
                    status: "Pending MGMT"
                });

                const payload = {
                    "type": "message",
                    "attachments": [{
                        "contentType": "application/vnd.microsoft.card.adaptive",
                        "content": {
                            "type": "AdaptiveCard",
                            "body": [
                                { "type": "TextBlock", "text": "✅ QA SIGNED - ACTION REQUIRED", "weight": "Bolder", "color": "Accent", "size": "Large" },
                                { "type": "TextBlock", "text": `QA (Ayyub) has signed the WI for the following parts. Management approval is now required.`, "wrap": true },
                                {
                                    "type": "FactSet", "facts": [
                                        { "title": "Parts:", "value": partNames },
                                        { "title": "Attention:", "value": "<at>Vicson Lee</at>" }
                                    ]
                                }
                            ],
                            "msteams": {
                                "entities": [{
                                    "type": "mention",
                                    "text": "<at>Vicson Lee</at>",
                                    "mentioned": { "id": "vicson.lee@famax.com.my", "name": "Vicson Lee" }
                                }]
                            },
                            "$schema": "http://adaptivecards.io/schemas/adaptive-card.json",
                            "version": "1.4"
                        }
                    }]
                };

                await axios.post(TEAMS_WEBHOOK_URL, payload);
                alert("QA Signed Successfully! Management has been notified.");
                loadApprovalLogs();
            } catch (e) {
                console.error(e);
                alert("Failed to update status.");
            }
        }

        async function logApprovalStep(partsArray, step, sender) {
            for (const part of partsArray) {
                try {
                    const checkRes = await api.get(`/rest/v1/TeamsLog?part_names=eq.${encodeURIComponent(part)}&status=neq.Completed`);
                    const payload = {
                        part_names: part,
                        initiated_by: sender,
                        status: step === "Management" ? "Pending MGMT" : "Pending QA",
                        eng_initiated_at: new Date().toISOString()
                    };

                    if (checkRes.data.length > 0) {
                        const existingId = checkRes.data[0].id;
                        await api.patch(`/rest/v1/TeamsLog?id=eq.${existingId}`, payload);
                    } else {
                        await api.post("/rest/v1/TeamsLog", payload);
                    }
                } catch (error) {
                    console.error(`Logging Error for part ${part}:`, error);
                }
            }
        }

        async function completeApproval(id, partNames) {
            if (!confirm(`Mark ${partNames} as fully signed and notify Teams?`)) return;
            try {
                await api.patch(`/rest/v1/TeamsLog?id=eq.${id}`, {
                    mgmt_approved_at: new Date().toISOString(),
                    status: "Completed"
                });

                const payload = {
                    "type": "message",
                    "attachments": [{
                        "contentType": "application/vnd.microsoft.card.adaptive",
                        "content": {
                            "type": "AdaptiveCard",
                            "body": [
                                { "type": "TextBlock", "text": "✅ WI SIGN-OFF COMPLETED", "weight": "Bolder", "color": "Good", "size": "Large" },
                                { "type": "TextBlock", "text": `Final management signature obtained. The WI for the following parts is now fully approved.`, "wrap": true },
                                {
                                    "type": "FactSet", "facts": [
                                        { "title": "Parts:", "value": partNames },
                                        { "title": "Completed At:", "value": new Date().toLocaleString() }
                                    ]
                                }
                            ],
                            "$schema": "http://adaptivecards.io/schemas/adaptive-card.json",
                            "version": "1.4"
                        }
                    }]
                };
                await axios.post(TEAMS_WEBHOOK_URL, payload);
                alert("Success! Status updated to Completed.");
                loadApprovalLogs();
            } catch (e) { alert("Failed to update status."); }
        }

        async function sendTeamsMessage() {
            const sender = document.getElementById("sender-name").value.trim();
            const subjectOpt = document.querySelector('input[name="subject-opt"]:checked').value;
            const otherSubject = document.getElementById("other-subject").value.trim();
            const finalSubject = subjectOpt === "Others" ? otherSubject : subjectOpt;
            const message = document.getElementById("message").value.trim();
            const respPerson = document.querySelector('input[name="resp-opt"]:checked').value;
            const btn = document.getElementById("send-btn");

            if (!sender) { alert("Please enter your name."); return; }
            const selectedPartsArray = Array.from(selectedParts);
            if (selectedPartsArray.length === 0) { alert("Please select parts."); return; }

            try {
                btn.disabled = true;
                btn.textContent = "Sending...";

                if (subjectOpt === "WI APPROVAL") {
                    await logApprovalStep(selectedPartsArray, respPerson, sender);
                }

                let mentionEntities = [];
                let mentionText = "";

                if (respPerson === "QA") {
                    mentionText = "<at>Ayyub Sofi</at>";
                    mentionEntities.push({ "type": "mention", "text": "<at>Ayyub Sofi</at>", "mentioned": { "id": "ayyub.sofi@famax.com.my", "name": "Ayyub Sofi" } });
                } else if (respPerson === "ENG") {
                    mentionText = "<at>Azim Bakar</at>";
                    mentionEntities.push({ "type": "mention", "text": "<at>Azim Bakar</at>", "mentioned": { "id": "azim.bakar@famax.com.my", "name": "Azim Bakar" } });
                } else if (respPerson === "Management") {
                    mentionText = "<at>Vicson Lee</at>";
                    mentionEntities.push({ "type": "mention", "text": "<at>Vicson Lee</at>", "mentioned": { "id": "vicson.lee@famax.com.my", "name": "Vicson Lee" } });
                }

                const payload = {
                    "type": "message",
                    "attachments": [{
                        "contentType": "application/vnd.microsoft.card.adaptive",
                        "content": {
                            "type": "AdaptiveCard",
                            "body": [
                                { "type": "TextBlock", "text": "🚨 IPQC SYSTEM ALERT", "weight": "Bolder", "color": "Attention" },
                                { "type": "TextBlock", "text": finalSubject, "weight": "Bolder", "size": "Large" },
                                {
                                    "type": "FactSet", "facts": [
                                        { "title": "Attention:", "value": `${respPerson} ${mentionText}` },
                                        { "title": "Issued by:", "value": sender },
                                        { "title": "Date:", "value": new Date().toLocaleString() }
                                    ]
                                },
                                { "type": "TextBlock", "text": message, "wrap": true }
                            ],
                            "msteams": { "entities": mentionEntities },
                            "$schema": "http://adaptivecards.io/schemas/adaptive-card.json",
                            "version": "1.4"
                        }
                    }]
                };

                await axios.post(TEAMS_WEBHOOK_URL, payload);
                alert("Success! Message sent.");
            } catch (error) { console.error(error); alert("Failed to send."); }
            finally {
                btn.disabled = false;
                btn.textContent = "Send to Teams";
                loadApprovalLogs();
            }
        }

        window.onload = () => {
            loadPartsList();
            loadApprovalLogs();
        };
    </script>
</body>
