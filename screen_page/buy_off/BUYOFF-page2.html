<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BUYOFF - Summary & Submit</title>
    <link rel="icon" type="png" href="/FamaxQCSystem/assets/LogoRound.png?v=2">
    <!-- Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.6.2/axios.min.js"></script>
    <script src="/assets/app-config.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />

    <!-- Shared design system (tokens + UI primitives) -->
    <link rel="stylesheet" href="/assets/theme.css">

    <style>
        /* ---- Page-specific layout (built on shared tokens in theme.css) ---- */
        /* Legacy token aliases still referenced by page-specific rules */
        :root {
            --primary-color: var(--primary);
            --border-color: var(--border);
            --text-secondary: var(--text-muted);
            --error: var(--danger);
        }

        body {
            display: flex;
            flex-direction: column;
        }

        header {
            position: sticky;
            top: 0;
            z-index: var(--z-header);
            display: flex;
            align-items: center;
            height: 64px;
            padding: 0 var(--space-8);
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
        }

        .header-title {
            font-weight: 700;
            font-size: var(--fs-md);
            letter-spacing: -0.2px;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: var(--space-3);
        }

        .header-title::before {
            content: "";
            display: block;
            width: 4px;
            height: 24px;
            background: var(--primary);
            border-radius: 2px;
        }

        .container {
            flex: 1;
            padding: var(--space-6) var(--space-8);
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
        }

        .section-title {
            font-size: var(--fs-xl);
            font-weight: 700;
            letter-spacing: -0.4px;
            margin-bottom: var(--space-6);
            padding-bottom: var(--space-2);
            border-bottom: 2px solid var(--border);
        }

        .info-card {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            padding: var(--space-6);
            box-shadow: var(--shadow-sm);
            margin-bottom: var(--space-8);
            border: 1px solid var(--border);
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: var(--space-6);
        }

        .info-label {
            font-size: var(--fs-xs);
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: var(--space-1);
            font-weight: 600;
            letter-spacing: 0.04em;
        }

        .info-value {
            font-size: var(--fs-base);
            font-weight: 600;
        }

        #summary-container {
            display: flex;
            flex-direction: column;
            gap: var(--space-5);
        }

        .zone-card {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            padding: var(--space-5);
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
            break-inside: avoid;
        }

        .zone-card h3 {
            font-size: var(--fs-md);
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: var(--space-3);
        }

        .detail-table {
            width: 100%;
            border-collapse: collapse;
            font-size: var(--fs-sm);
        }

        .detail-table th,
        .detail-table td {
            padding: 10px;
            text-align: center;
            border: 1px solid var(--border);
        }

        .detail-table th {
            background: var(--surface-muted);
            color: var(--text-muted);
            font-weight: 700;
            text-transform: uppercase;
            font-size: var(--fs-xs);
            letter-spacing: 0.04em;
        }

        .ng-cell {
            background-color: var(--danger) !important;
            color: #fff !important;
            font-weight: 700;
        }

        .remark-container {
            margin-top: var(--space-8);
            background: var(--bg-card);
            padding: var(--space-6);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
        }

        .remark-input {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--border-strong);
            border-radius: var(--radius-sm);
            min-height: 80px;
            font-family: inherit;
            font-size: var(--fs-base);
            transition: border-color var(--transition), box-shadow var(--transition);
        }

        .remark-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-ring);
        }

        /* Static Remark Div for PDF */
        #temp-remark-text {
            white-space: pre-wrap;
            background: var(--surface-muted);
        }

        .btn {
            padding: 12px var(--space-6);
            font-family: inherit;
            font-size: var(--fs-base);
            font-weight: 700;
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            width: auto;
            text-transform: uppercase;
            margin-top: var(--space-6);
            background: var(--primary);
            color: var(--on-primary);
            transition: background var(--transition), transform var(--transition);
        }

        .btn:hover {
            background: var(--primary-hover);
        }

        .btn:active {
            transform: translateY(1px);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .button-container {
            display: flex;
            justify-content: flex-end;
            margin-top: var(--space-8);
            margin-bottom: var(--space-10);
        }

        @media print {

            header,
            .btn {
                display: none !important;
            }

            body {
                background: white;
            }

            .container {
                max-width: 100%;
                padding: 0;
            }

            header,
            .button-container {
                display: none !important;
            }
        }
    </style>
</head>

<body>
    <header>
        <div class="header-title">BUYOFF Inspection System</div>
    </header>

    <div id="print-area">
        <div class="container">
            <h2 class="section-title">Buyoff Summary Report</h2>

            <div class="info-card">
                <div class="info-grid">
                    <div class="info-item">
                        <div class="info-label">Part Name</div>
                        <div class="info-value" id="val-part"></div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">Process</div>
                        <div class="info-value" id="val-process"></div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">JO / Machine</div>
                        <div class="info-value" id="val-jo-mc"></div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">Inspector</div>
                        <div class="info-value" id="val-inspector"></div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">QC Tech</div>
                        <div class="info-value" id="val-tech"></div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">Setting</div>
                        <div class="info-value" id="val-setting"></div>
                    </div>
                </div>
            </div>

            <div id="summary-container"></div>

            <div class="remark-container">
                <label class="info-label">Inspector Remarks</label>
                <textarea id="remarks" class="remark-input" placeholder="Add any final observations..."></textarea>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="button-container">
            <button id="finish-btn" class="btn btn-primary">Finish Report</button>
        </div>

    </div>

    <!-- Segment approval modal (pops up after the report is saved) -->
    <div id="approval-overlay" class="appr-overlay hidden">
        <div class="appr-modal">
            <h3 id="approval-title">Segment Approval</h3>
            <p id="approval-sub">Ask the approver to sign off now, or finish and let them approve later from the
                dashboard.</p>
            <label class="approval-label" for="approver-name">Approver</label>
            <select id="approver-name" class="approval-input">
                <option value="">Select approver...</option>
            </select>
            <label class="approval-label" for="approver-pin">PIN</label>
            <input type="password" id="approver-pin" class="approval-input" inputmode="numeric" autocomplete="off"
                placeholder="Enter PIN" />
            <div id="approval-msg" class="approval-msg"></div>
            <div class="approval-actions">
                <button id="approve-btn" class="btn btn-primary">Approve &amp; Finish</button>
                <button id="skip-approval-btn" class="btn btn-secondary">Finish without approval</button>
            </div>
        </div>
    </div>

    <style>
        .appr-overlay {
            position: fixed;
            inset: 0;
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            background: rgba(15, 23, 42, 0.55);
            -webkit-backdrop-filter: blur(3px);
            backdrop-filter: blur(3px);
        }

        .appr-overlay.hidden { display: none; }

        .appr-modal {
            width: 100%;
            max-width: 460px;
            padding: 1.5rem;
            border-radius: 14px;
            background: var(--bg-card, #fff);
            box-shadow: 0 20px 25px -5px rgba(15, 23, 42, 0.2);
        }

        .appr-modal h3 {
            margin: 0 0 4px;
            font-size: 1.1rem;
            font-weight: 800;
        }

        .appr-modal #approval-sub {
            margin: 0 0 1rem;
            font-size: 0.85rem;
            color: var(--text-muted, #64748b);
        }

        .approval-label {
            display: block;
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted, #64748b);
            margin: 0.5rem 0 4px;
        }

        .approval-input {
            width: 100%;
            height: 44px;
            box-sizing: border-box;
            padding: 0 12px;
            border: 1px solid var(--border-strong, #cbd5e1);
            border-radius: 8px;
            font-size: 1rem;
        }

        .approval-msg {
            min-height: 1.1rem;
            margin: 8px 0;
            font-size: 0.8rem;
            font-weight: 700;
        }

        .approval-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 8px;
        }
    </style>

    <div class="footer">© 2025 Famax Technology (M) Sdn. Bhd. All rights reserved.</div>

    <script>
        const store = {
            part: localStorage.getItem('partName'),
            process: localStorage.getItem('processName'),
            jo: localStorage.getItem('joNumber'),
            machine: localStorage.getItem('machineNumber'),
            person: localStorage.getItem('personName'),
            tech: localStorage.getItem('qcTechnician'),
            setting: localStorage.getItem('settingType'),
            // NEW: Get the Attempt ID from Page 1
            attemptId: localStorage.getItem('lastAttemptGroup'),
            data: JSON.parse(localStorage.getItem('summaryData') || '[]')
        };

        const supabaseClient = window.supabase.createClient(window.APP_CONFIG.url, window.APP_CONFIG.key);

        document.addEventListener("DOMContentLoaded", () => {
            document.getElementById('val-part').textContent = store.part || "-";
            document.getElementById('val-process').textContent = store.process || "-";
            document.getElementById('val-jo-mc').textContent = `${store.jo || "-"} / ${store.machine || "-"}`;
            document.getElementById('val-inspector').textContent = store.person || "-";
            document.getElementById('val-tech').textContent = store.tech || "-";
            document.getElementById('val-setting').textContent = store.setting || "-";

            const remarkInput = document.getElementById("remarks");
            remarkInput.addEventListener("keydown", function (e) {
                if (e.key === "Enter" && !e.shiftKey) {
                    e.preventDefault();
                    document.getElementById("finish-btn").click();
                }
            });

            document.addEventListener("keydown", function (e) {
                if ((e.key === "Enter" || e.code === "NumpadEnter") && !e.shiftKey) {
                    if (document.activeElement.id !== "remarks") {
                        e.preventDefault();
                        document.getElementById("finish-btn").click();
                    }
                }
            });

            renderZones();
        });

        function isNg(val, min, max) {
            if (val === null || val === undefined || val === "") return false;
            if (String(min).toLowerCase() === 'ok') return !['OK', 'GO'].includes(String(val).toUpperCase());
            if (String(max).toLowerCase() === 'ng') return ['NG', 'NOGO'].includes(String(val).toUpperCase());
            const v = parseFloat(val), l = parseFloat(min), u = parseFloat(max);
            return isNaN(v) || v < l || v > u;
        }

        function renderZones() {
            const container = document.getElementById('summary-container');
            store.data.forEach((z, idx) => {
                const card = document.createElement('div');
                card.className = 'zone-card';
                const readings = [z.Reading_1, z.Reading_2, z.Reading_3, z.Reading_4, z.Reading_5];
                const cells = readings.map(r => {
                    const ngClass = isNg(r, z.LSL_OK, z.USL_NG) ? 'ng-cell' : '';
                    return `<td class="${ngClass}">${r ?? '-'}</td>`;
                }).join('');

                card.innerHTML = `
                <h3>Zone: ${z.Point_DWG_Zone} (Spec: ${z.LSL_OK} ~ ${z.USL_NG})</h3>
                <table class="detail-table">
                    <thead>
                        <tr><th>R1</th><th>R2</th><th>R3</th><th>R4</th><th>R5</th></tr>
                    </thead>
                    <tbody>
                        <tr>${cells}</tr>
                    </tbody>
                </table>
            `;
                container.appendChild(card);
            });
        }

        document.getElementById('finish-btn').onclick = async function () {
            const btn = this;
            const element = document.getElementById("print-area");
            const remarkInput = document.getElementById('remarks');
            const remarkValue = remarkInput.value.trim();

            btn.disabled = true;
            btn.textContent = "PROCESSING...";

            try {
                const ngList = [];
                const payload = store.data.map(z => {
                    [1, 2, 3, 4, 5].forEach(i => {
                        const val = z[`Reading_${i}`];
                        if (isNg(val, z.LSL_OK, z.USL_NG)) {
                            ngList.push({ zone: z.Point_DWG_Zone, val, min: z.LSL_OK, max: z.USL_NG });
                        }
                    });

                    return {
                        Part_Name: store.part,
                        Process: store.process,
                        JO_Number: store.jo,
                        Machine: store.machine,
                        Person: store.person,
                        QC_Technician: store.tech,
                        Setting: store.setting,
                        Point_DWG_Zone: z.Point_DWG_Zone,
                        Measuring_Instrument: z.Measuring_Instrument,
                        LSL_OK: z.LSL_OK,
                        USL_NG: z.USL_NG,
                        SC: z.SC,
                        Reading_1: z.Reading_1,
                        Reading_2: z.Reading_2,
                        Reading_3: z.Reading_3,
                        Reading_4: z.Reading_4,
                        Reading_5: z.Reading_5,
                        Remarks: remarkValue,
                        // UPDATED: Include the Attempt_Group ID
                        Attempt_Group: store.attemptId
                    };
                });

                // 1. Save to DB
                btn.textContent = "SAVING TO DATABASE...";
                const { error } = await supabaseClient.from('Data_BUYOFF').insert(payload);
                if (error) throw error;

                // 1b. Create the pending approval record for this segment (Supervisor or HOD-QA).
                //     Non-fatal: if it fails the buy-off is still saved.
                try {
                    await supabaseClient.from('buyoff_approvals').insert([{
                        attempt_group: store.attemptId,
                        segment: store.tech,
                        part_name: store.part,
                        jo_number: store.jo,
                        machine: store.machine,
                        process: store.process,
                        person: store.person,
                        status: 'PENDING'
                    }]);
                } catch (apErr) {
                    console.error('Could not create approval record:', apErr);
                }

                // 2. Alert if NG (Note: Based on Page 1 logic, this should usually be empty now)
                if (ngList.length > 0) {
                    btn.textContent = "SENDING ALERTS...";
                    await sendTelegramAlert(ngList, remarkValue);
                }

                // 3. Prepare UI for PDF
                btn.textContent = "SAVING TO SERVER...";
                remarkInput.style.display = "none";
                let staticRemark = document.getElementById("temp-remark-text");
                if (!staticRemark) {
                    staticRemark = document.createElement("div");
                    staticRemark.className = "remark-input";
                    staticRemark.id = "temp-remark-text";
                    remarkInput.parentNode.appendChild(staticRemark);
                }
                staticRemark.innerText = remarkValue || "No remarks provided.";

                // 4. PDF Configuration
                const pdfOptions = {
                    margin: 10,
                    filename: `BUYOFF_${store.part}_${store.jo}_${Date.now()}.pdf`,
                    image: { type: "jpeg", quality: 0.98 },
                    html2canvas: { scale: 2, useCORS: true, scrollY: 0 },
                    jsPDF: { unit: "mm", format: "a4", orientation: "portrait" },
                };

                // 5. Generate PDF and upload
                const pdfBlob = await html2pdf().set(pdfOptions).from(element).outputPdf('blob');
                const formData = new FormData();
                formData.append("pdf", pdfBlob, pdfOptions.filename);
                formData.append("partDescription", store.part);
                formData.append("personName", store.person);
                formData.append("processName", store.process);
                formData.append("joNumber", store.jo);
                formData.append("inspectionType", "BuyOff");

                try {
                    await fetch('/FamaxQCSystem/saveInspectionPdf', { method: 'POST', body: formData });
                } catch (serverErr) {
                    console.error("Server upload fail", serverErr);
                }

                // 6. Complete → ask for segment approval (or finish without it).
                btn.textContent = "SAVED ✓";
                showApprovalPanel();

            } catch (err) {
                alert("Error: " + err.message);
                remarkInput.style.display = "block";
                const tempDiv = document.getElementById("temp-remark-text");
                if (tempDiv) tempDiv.remove();
                btn.disabled = false;
                btn.textContent = "FINISH REPORT";
            }
        };

        // --- Segment approval (name + PIN) ---
        let approverMap = {}; // { NAME_UPPER: { pin, position } }

        function finishAndExit() {
            localStorage.clear();
            window.location.href = "../../index.html";
        }

        async function showApprovalPanel() {
            const panel = document.getElementById('approval-overlay');
            const title = document.getElementById('approval-title');
            const select = document.getElementById('approver-name');
            title.textContent = store.tech === 'QC'
                ? 'QC Segment — HOD of QA Approval'
                : 'Technician Segment — Supervisor Approval';
            select.innerHTML = '<option value="">Select approver...</option>';

            try {
                // Anyone with a PIN set in EmployeeTable is an eligible approver.
                const { data, error } = await supabaseClient
                    .from('EmployeeTable')
                    .select('name, position, pin')
                    .not('pin', 'is', null)
                    .order('name', { ascending: true });
                if (error) throw error;
                approverMap = {};
                (data || []).forEach(e => {
                    const nm = (e.name || e.Name || '').trim();
                    const pin = String(e.pin || e.PIN || '').trim();
                    if (!nm || !pin) return;
                    const position = e.position || e.Position || '';
                    approverMap[nm.toUpperCase()] = { pin, position };
                    const opt = document.createElement('option');
                    opt.value = nm; opt.textContent = nm + (position ? ` (${position})` : '');
                    select.appendChild(opt);
                });
            } catch (e) {
                console.error('Failed to load approvers:', e);
            }
            panel.classList.remove('hidden');
        }

        document.getElementById('skip-approval-btn').onclick = function () {
            alert('Report saved. Approval left as PENDING — approve it later from the Buy-Off Approvals dashboard.');
            finishAndExit();
        };

        document.getElementById('approve-btn').onclick = async function () {
            const msg = document.getElementById('approval-msg');
            const name = document.getElementById('approver-name').value.trim();
            const pin = document.getElementById('approver-pin').value.trim();
            msg.style.color = 'var(--danger, #ef4444)';

            if (!name) { msg.textContent = 'Select an approver.'; return; }
            const rec = approverMap[name.toUpperCase()];
            if (!rec || !rec.pin) { msg.textContent = 'No PIN set for this approver — contact HR.'; return; }
            if (pin !== rec.pin) { msg.textContent = 'Incorrect PIN.'; return; }

            const btn = this;
            btn.disabled = true; btn.textContent = 'Approving...';
            try {
                const { error } = await supabaseClient
                    .from('buyoff_approvals')
                    .update({
                        status: 'APPROVED',
                        approver_name: name,
                        approver_position: rec.position || null,
                        approved_at: new Date().toISOString()
                    })
                    .eq('attempt_group', store.attemptId)
                    .eq('segment', store.tech);
                if (error) throw error;
                msg.style.color = 'var(--success, #10b981)';
                msg.textContent = 'Approved by ' + name + '.';
                setTimeout(finishAndExit, 900);
            } catch (e) {
                console.error(e);
                btn.disabled = false; btn.textContent = 'Approve & Finish';
                msg.textContent = 'Could not save approval: ' + e.message;
            }
        };

        async function sendTelegramAlert(ngList, remarks) {
            const botToken = '8107605903:AAG6yB5C-8l8NXZCvtief1Wm4GCv8Mv6UR4';
            const chatId = '-1003227469075';
            let msg = `🚨 *BUYOFF ALERT - NG FOUND* 🚨\n\n`;
            msg += `*Part:* ${store.part}\n*JO:* ${store.jo}\n*MC:* ${store.machine}\n*Inspector:* ${store.person}\n\n`;
            msg += `*Out of Spec Details:*\n`;
            ngList.forEach(item => {
                msg += `📍 Zone ${item.zone}: ❌ *${item.val}* (Spec: ${item.min}-${item.max})\n`;
            });
            if (remarks) msg += `\n*Remarks:* ${remarks}`;
            try {
                await axios.post(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                    chat_id: chatId,
                    text: msg,
                    parse_mode: 'Markdown'
                });
            } catch (e) { console.error("Telegram fail", e); }
        }
    </script>
</body>

</html>
