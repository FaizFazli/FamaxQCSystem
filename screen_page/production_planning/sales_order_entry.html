<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sales Order Entry | Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.6.2/axios.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/toastify-js/1.12.0/toastify.min.css" />
    <link rel="icon" type="png" href="/FamaxQCSystem/assets/LogoRound.png?v=2">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/toastify-js/1.12.0/toastify.min.js"></script>

    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg-body: #f8fafc;
            --bg-card: #ffffff;
            --text-main: #0f172a;
            --text-sub: #64748b;
            --border: #e2e8f0;
            --radius: 12px;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --danger: #ef4444;
            --success: #10b981;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
        }

        header {
            background: var(--bg-card);
            height: 60px;
            padding: 0 2rem;
            display: flex;
            align-items: center;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .main-container {
            max-width: 1500px;
            margin: 20px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: 380px 1fr;
            gap: 20px;
        }

        .card {
            background: var(--bg-card);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            overflow: visible;
        }

        .card-header {
            background: #f1f5f9;
            padding: 15px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 12px 12px 0 0;
        }

        .card-header h3 {
            font-size: 0.9rem;
            font-weight: 800;
            text-transform: uppercase;
            color: var(--text-sub);
            letter-spacing: 0.5px;
        }

        .card-body {
            padding: 20px;
        }

        .form-group {
            margin-bottom: 15px;
            position: relative;
        }

        label {
            display: block;
            font-size: 0.75rem;
            font-weight: 700;
            margin-bottom: 5px;
            color: var(--text-sub);
            text-transform: uppercase;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 0.9rem;
            outline: none;
            transition: all 0.2s;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        /* Table Design */
        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 12px;
            font-size: 0.7rem;
            text-transform: uppercase;
            color: var(--text-sub);
            background: #f8fafc;
            border-bottom: 2px solid var(--border);
        }

        td {
            padding: 8px;
            border-bottom: 1px solid #f1f5f9;
            vertical-align: middle;
            overflow: visible;
            position: relative;
        }

        /* Generic Dropdown for Comboboxes */
        .dropdown-list {
            position: absolute;
            width: 100%;
            background: white;
            border: 1px solid var(--border);
            border-radius: 8px;
            margin-top: 4px;
            max-height: 200px;
            overflow-y: auto;
            z-index: 9999;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .dropdown-item {
            padding: 10px 12px;
            cursor: pointer;
            font-size: 0.85rem;
            border-bottom: 1px solid #f8fafc;
            line-height: 1.4;
        }

        .dropdown-item:hover {
            background: #eff6ff;
            color: var(--primary);
        }

        .dropdown-item small {
            display: block;
            color: var(--text-sub);
            font-size: 0.75rem;
        }

        /* Status Badges */
        .produce-badge {
            padding: 6px;
            border-radius: 6px;
            font-weight: 800;
            font-size: 0.85rem;
            text-align: center;
        }

        .bg-urgent {
            background: #fee2e2;
            color: var(--danger);
        }

        .bg-stock {
            background: #dcfce7;
            color: var(--success);
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }

        .btn-add {
            background: var(--text-main);
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.75rem;
            cursor: pointer;
        }

        .remove-row {
            color: var(--danger);
            cursor: pointer;
            font-size: 1.2rem;
            background: none;
            border: none;
        }
    </style>
</head>

<body>

    <div id="app">
        <header>
            <h1 style="font-size:1.1rem; font-weight:800; color:var(--primary)">SALES <span
                    style="color:var(--text-main)">ORDER PORTAL</span></h1>
        </header>

        <div class="main-container">
            <!-- Header Info -->
            <div class="card">
                <div class="card-header">
                    <h3>Header Information</h3>
                </div>
                <div class="card-body">
                    <div class="form-group">
                        <label>Customer</label>
                        <input type="text" v-model="header.customer_name" @input="handleCustomerSearch"
                            @focus="showCustomers = true" placeholder="Search or type new customer...">
                        <div v-if="showCustomers && filterCustomers(header.customer_name).length" class="dropdown-list">
                            <div v-for="c in filterCustomers(header.customer_name)" :key="c.id" class="dropdown-item"
                                @click="selectCustomer(c)">
                                <strong>{{ c.customer_name }}</strong>
                                <small v-if="c.address">{{ c.address }}</small>
                            </div>
                        </div>
                    </div>

                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                        <div class="form-group">
                            <label>PO Number</label>
                            <input type="text" v-model="header.po_number" placeholder="PO-..."
                                @input="header.po_number = header.po_number.toUpperCase()">
                        </div>
                        <div class="form-group">
                            <label>S/O Number (S/O No.)</label>
                            <input type="text" v-model="header.so_number" placeholder="SO-..."
                                @input="header.so_number = header.so_number.toUpperCase()">
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Shipping Address</label>
                        <textarea v-model="header.shipping_address" rows="2"></textarea>
                    </div>

                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                        <div class="form-group"><label>ETA</label><input type="date" v-model="header.eta"></div>
                        <div class="form-group"><label>ETD</label><input type="date" v-model="header.etd"></div>
                    </div>

                    <!-- Payment Term Combobox -->
                    <div class="form-group">
                        <label>Payment Term</label>
                        <input type="text" v-model="header.payment_term" @focus="showTerms = true"
                            placeholder="Type or select term...">
                        <div v-if="showTerms && filteredTerms.length" class="dropdown-list">
                            <div v-for="t in filteredTerms" :key="t.id" class="dropdown-item"
                                @click="selectTerm(t.payment_term)">
                                {{ t.payment_term }}
                            </div>
                        </div>
                    </div>

                    <button class="btn-primary" @click="submitOrder" :disabled="submitting">
                        {{ submitting ? 'PROCESSING...' : 'SUBMIT ORDER' }}
                    </button>
                </div>
            </div>

            <!-- Items & Inventory -->
            <div class="card">
                <div class="card-header">
                    <h3>Order Items & Inventory Check</h3>
                    <button class="btn-add" @click="addRow">+ ADD PART</button>
                </div>
                <div class="card-body" style="padding:0">
                    <table>
                        <thead>
                            <tr>
                                <th style="padding-left:20px">Part Number / Description</th>
                                <th width="100">Order Qty</th>
                                <th width="100">FG Stock</th>
                                <th width="120">To Produce</th>
                                <th width="120">Unit Price</th>
                                <th width="50"></th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr v-for="(row, index) in items" :key="index">
                                <td style="padding-left:20px; overflow: visible;">
                                    <!-- PART SEARCHABLE INPUT -->
                                    <input type="text" v-model="row.part_input" @input="handlePartSearch(index)"
                                        @focus="row.showList = true" placeholder="Search P/N...">
                                    <div v-if="row.showList && filterParts(row.part_input).length"
                                        class="dropdown-list">
                                        <div v-for="p in filterParts(row.part_input)" :key="p.id" class="dropdown-item"
                                            @click="selectPart(index, p)">
                                            <strong>{{ p.Part_Number }}</strong>
                                            <small>{{ p.Part_Name }}</small>
                                        </div>
                                    </div>
                                </td>
                                <td><input type="number" v-model.number="row.order_qty"></td>
                                <td><input type="number" v-model="row.stock_available" readonly
                                        style="background:#f8fafc"></td>
                                <td>
                                    <div :class="['produce-badge', row.produce_qty > 0 ? 'bg-urgent' : 'bg-stock']">
                                        {{ row.produce_qty }}
                                    </div>
                                </td>
                                <td><input type="number" step="0.01" v-model.number="row.unit_price"></td>
                                <td align="center">
                                    <button class="remove-row" @click="items.splice(index, 1)">×</button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref, computed, onMounted, watch } = Vue;

        createApp({
            setup() {
                const SB_URL = "http://192.168.0.5:8000";
                const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyAgCiAgICAicm9sZSI6ICJhbm9uIiwKICAgICJpc3MiOiAic3VwYWJhc2UtZGVtbyIsCiAgICAiaWF0IjogMTY0MTc2OTIwMCwKICAgICJleHAiOiAxNzk5NTM1NjAwCn0.dc_X5iR_VP_qT0zsiyj_I_OZ2T9FtRU2BBNWN8Bu4GE";

                const api = axios.create({
                    baseURL: SB_URL,
                    headers: { apikey: SB_KEY, Authorization: `Bearer ${SB_KEY}`, "Content-Type": "application/json" }
                });

                const customers = ref([]);
                const parts = ref([]);
                const paymentTerms = ref([]);
                const showTerms = ref(false);
                const submitting = ref(false);
                const showCustomers = ref(false);

                const header = ref({
                    customer_id: '', customer_name: '', po_number: '', so_number: '',
                    shipping_address: '', eta: '', etd: '', payment_term: ''
                });

                const items = ref([]);

                // 1. Filter Logic for Customers
                const filterCustomers = (input) => {
                    if (!input) return customers.value.slice(0, 10);
                    const q = input.replace(/[^a-zA-Z0-9]/g, '').toLowerCase();
                    return customers.value.filter(c => {
                        const cleanName = c.customer_name.replace(/[^a-zA-Z0-9]/g, '').toLowerCase();
                        return cleanName.includes(q);
                    }).slice(0, 15);
                };

                // 2. Handle Typing in Customer Field
                const handleCustomerSearch = () => {
                    header.value.customer_name = header.value.customer_name.toUpperCase();
                    header.value.customer_id = ''; // Reset ID because it might be a new manual entry
                    showCustomers.value = true;
                };

                // 3. Handle Selection from Customer List
                const selectCustomer = (customer) => {
                    header.value.customer_id = customer.id;
                    header.value.customer_name = customer.customer_name;
                    header.value.shipping_address = customer.address; // Auto-fill address
                    showCustomers.value = false;

                    // Trigger inventory check for existing rows since customer changed
                    items.value.forEach((row, index) => {
                        if (row.part_number) checkStock(index);
                    });
                };

                onMounted(async () => {
                    try {
                        const [cRes, pRes, tRes] = await Promise.all([
                            api.get('/rest/v1/customerdetails?select=*'),
                            api.get('/rest/v1/Parts?select=*'),
                            api.get('/rest/v1/paymentTerm?select=*')
                        ]);
                        customers.value = cRes.data;
                        parts.value = pRes.data;
                        paymentTerms.value = tRes.data;
                        addRow(); // Start with 1 row
                    } catch (e) { console.error("Load failed", e); }

                    window.addEventListener('click', (e) => {
                        if (!e.target.closest('.form-group')) {
                            showTerms.value = false;
                            showCustomers.value = false; // Add this
                        }
                        if (!e.target.closest('td')) {
                            items.value.forEach(row => row.showList = false);
                        }
                    });
                });

                // Term Filter Logic
                const filteredTerms = computed(() => {
                    const q = header.value.payment_term.toLowerCase().trim();
                    return q ? paymentTerms.value.filter(t => t.payment_term.toLowerCase().includes(q)) : paymentTerms.value;
                });

                const selectTerm = (term) => { header.value.payment_term = term; showTerms.value = false; };

                // Part Combobox Logic
                const filterParts = (input) => {
                    if (!input) return parts.value.slice(0, 10);
                    const q = input.replace(/[^a-zA-Z0-9]/g, '').toLowerCase();
                    return parts.value.filter(p => {
                        const cleanPN = p.Part_Number.replace(/[^a-zA-Z0-9]/g, '').toLowerCase();
                        const cleanName = p.Part_Name.replace(/[^a-zA-Z0-9]/g, '').toLowerCase();
                        return cleanPN.includes(q) || cleanName.includes(q);
                    }).slice(0, 15);
                };

                const handlePartSearch = (index) => {
                    items.value[index].part_input = items.value[index].part_input.toUpperCase();
                    items.value[index].showList = true;
                };

                const selectPart = (index, part) => {
                    const row = items.value[index];
                    row.part_number = part.Part_Number;
                    row.part_input = part.Part_Number;
                    row.showList = false;
                    checkStock(index);
                };

                function addRow() {
                    items.value.push({
                        part_input: '', part_number: '', order_qty: 0,
                        stock_available: 0, produce_qty: 0, unit_price: 0, showList: false
                    });
                }

                const onCustomerChange = () => {
                    const c = customers.value.find(x => x.id == header.value.customer_id);
                    if (c) {
                        header.value.customer_name = c.customer_name;
                        header.value.shipping_address = c.address;
                    }
                };

                async function checkStock(index) {
                    const row = items.value[index];
                    if (!row.part_number || !header.value.customer_name) return;
                    const prefix = header.value.customer_name.split(' ')[0];
                    const res = await api.get(`/rest/v1/inventory?barcode=eq.${row.part_number}&customer=ilike.*${prefix}*`);
                    row.stock_available = res.data.length ? res.data[0].available_pcs : 0;
                }

                watch(items, (newVal) => {
                    newVal.forEach(row => {
                        const diff = row.order_qty - row.stock_available;
                        row.produce_qty = diff > 0 ? diff : 0;
                    });
                }, { deep: true });

                async function submitOrder() {
                    // 1. Validation
                    const soNo = header.value.so_number ? header.value.so_number.trim() : "";
                    const custName = header.value.customer_name ? header.value.customer_name.trim() : "";
                    const poNo = header.value.po_number ? header.value.po_number.trim() : ""; // Capture PO

                    if (!soNo || !custName) {
                        return alert("S/O No and Customer Name are required");
                    }

                    const validItems = items.value.filter(i => i.part_number && i.order_qty > 0);
                    if (validItems.length === 0) {
                        return alert("Please add at least one part with an Order Quantity.");
                    }

                    submitting.value = true;
                    try {
                        // 2. INSERT HEADER 
                        const hRes = await api.post('/rest/v1/SalesOrders', {
                            so_number: header.value.so_number,
                            po_number: header.value.po_number,
                            customer_id: header.value.customer_id || null,
                            customer_name: header.value.customer_name,
                            shipping_address: header.value.shipping_address,
                            eta: header.value.eta,
                            etd: header.value.etd,
                            payment_term: header.value.payment_term
                        }, { headers: { "Prefer": "return=representation" } });

                        const so_id = hRes.data[0].id;

                        // 3. DEFINE ITEM PAYLOAD
                        const itemPayload = validItems.map(i => ({
                            so_id: so_id,
                            part_number: i.part_number,
                            order_qty: i.order_qty,
                            stock_available: i.stock_available,
                            produce_qty: i.produce_qty,
                            unit_price: i.unit_price
                        }));

                        await api.post('/rest/v1/SalesOrder_Items', itemPayload);

                        // 4. AUTO-GENERATE JOB ORDERS LOGS
                        const jobOrderPayload = [];

                        validItems.forEach((item, index) => {
                            if (item.produce_qty > 0) {
                                const indexedJO = `${header.value.so_number}/${index + 1}`;
                                const partInfo = parts.value.find(p => p.Part_Number === item.part_number);

                                if (partInfo && partInfo.Process) {
                                    let processList = [];
                                    try {
                                        processList = typeof partInfo.Process === 'string'
                                            ? JSON.parse(partInfo.Process)
                                            : partInfo.Process;
                                    } catch (e) {
                                        console.error("Error parsing process", e);
                                    }

                                    processList.forEach(procName => {
                                        jobOrderPayload.push({
                                            Part_Name: partInfo.Part_Name,
                                            Process: procName,
                                            JO_Number: indexedJO,
                                            Status: 'active',
                                            Quantity: item.produce_qty,
                                            Created_By: 'Sales System',
                                            Customer_PO: poNo, // <--- THIS LINE INSERTS THE PO NUMBER
                                            created_at: new Date().toISOString()
                                        });
                                    });
                                }
                            }
                        });

                        // 5. BULK INSERT JOB ORDERS
                        if (jobOrderPayload.length > 0) {
                            await api.post('/rest/v1/JobOrder', jobOrderPayload);
                        }

                        Toastify({
                            text: `S/O ${header.value.so_number} & ${jobOrderPayload.length} JOB LOGS CREATED`,
                            background: "var(--success)"
                        }).showToast();

                        setTimeout(() => location.reload(), 1500);

                    } catch (err) {
                        console.error("Submission Error:", err);
                        alert("Database Error: " + (err.response?.data?.message || err.message));
                    } finally {
                        submitting.value = false;
                    }
                }

                return {
                    customers, parts, header, items, showTerms, filteredTerms, submitting,
                    onCustomerChange, handlePartSearch, selectPart, filterParts, selectTerm,
                    addRow, submitOrder, showCustomers, filterCustomers, handleCustomerSearch,
                    selectCustomer,
                };
            }
        }).mount('#app');
    </script>
</body>

</html>
