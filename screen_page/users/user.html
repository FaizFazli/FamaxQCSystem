<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management</title>
    <!-- Add /FamaxQCSystem to the beginning of the path -->
    <link rel="icon" type="png" href="/FamaxQCSystem/assets/LogoRound.png?v=2">

    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/assets/app-config.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.6.2/axios.min.js"></script>

    <!-- Shared design system (tokens + UI primitives) -->
    <link rel="stylesheet" href="/assets/theme.css">

    <style>
        /* ---- Page-specific layout (built on shared tokens in theme.css) ---- */
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: var(--space-8) var(--space-4);
        }

        /* --- Navigation --- */
        .nav-top {
            width: 100%;
            max-width: 900px;
            margin-bottom: var(--space-5);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: var(--space-4);
            flex-wrap: wrap;
        }

        .back-link {
            color: var(--text-muted);
            text-decoration: none;
            font-size: var(--fs-sm);
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            transition: color var(--transition);
        }

        .back-link:hover {
            color: var(--primary);
        }

        /* --- Tab Switcher (segmented control) --- */
        .tab-container {
            background: var(--surface-muted);
            padding: var(--space-1);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            display: flex;
            gap: var(--space-1);
        }

        .tab-btn {
            padding: 8px 18px;
            border: none;
            border-radius: var(--radius-sm);
            font-family: inherit;
            font-size: var(--fs-sm);
            font-weight: 600;
            cursor: pointer;
            background: transparent;
            color: var(--text-muted);
            transition: background var(--transition), color var(--transition), box-shadow var(--transition);
        }

        .tab-btn.active {
            background: var(--bg-card);
            color: var(--primary);
            box-shadow: var(--shadow-sm);
        }

        /* --- Main Card (panel) --- */
        .main-card {
            width: 100%;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow);
            overflow: hidden;
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .main-card.active {
            display: block;
        }

        #card-add { max-width: 500px; }
        #card-list { max-width: 900px; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Panel header */
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: var(--space-4);
            padding: var(--space-5) var(--space-6);
            background: var(--surface-muted);
            border-bottom: 1px solid var(--border);
        }

        .card-header h1 {
            margin: 0;
            font-size: var(--fs-lg);
            font-weight: 700;
            letter-spacing: -0.3px;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: var(--space-3);
        }

        .card-header h1 svg { stroke: var(--primary); }

        .count-chip {
            font-size: var(--fs-sm);
            font-weight: 700;
            color: var(--primary);
            background: var(--primary-soft);
            padding: 4px 12px;
            border-radius: var(--radius-full);
        }

        .card-body { padding: var(--space-6); }

        /* Form layout — uses theme .field/.label + native control styling */
        .form-group { margin-bottom: var(--space-5); }

        /* --- Primary action button (full-width within forms) --- */
        .btn-action {
            width: 100%;
            margin-top: var(--space-2);
        }

        /* --- Table wrapper --- */
        .table-wrapper {
            overflow-x: auto;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
        }

        /* Badge color variants (keyed by access role, set by JS) */
        .badge { text-transform: uppercase; letter-spacing: 0.03em; }
        .badge-ALL { background: #dcfce7; color: #166534; }
        .badge-ENGINEER { background: #dbeafe; color: #1e40af; }
        .badge-PRODUCTION { background: #ffedd5; color: #9a3412; }
        .badge-REGISTER { background: #f3e8ff; color: #6b21a8; }
        .badge-RESOURCE { background: #ecfccb; color: #5e6e03; }
        .badge-BUSINESSDEV { background: #ecfeff; color: #0891b2; }
        .badge-QUALITY { background: #fce7f3; color: #8a042c; }
        .badge-MANAGEMENT { background: #fef3c7; color: #b45309; }

        /* Small row-action buttons */
        .btn-sm {
            padding: 6px 12px;
            border-radius: var(--radius-sm);
            font-family: inherit;
            font-size: var(--fs-xs);
            font-weight: 700;
            border: 1px solid transparent;
            cursor: pointer;
            margin-left: var(--space-2);
            transition: background var(--transition);
        }

        .btn-edit {
            background: var(--surface-muted);
            color: var(--text-main);
            border-color: var(--border);
        }
        .btn-edit:hover { background: var(--border); }

        .btn-delete {
            background: #fee2e2;
            color: #b91c1c;
        }
        .btn-delete:hover { background: #fecaca; }

        /* --- Modal (matches theme .modal-overlay / .modal) --- */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            z-index: var(--z-modal);
            align-items: center;
            justify-content: center;
            padding: var(--space-4);
            background: rgba(15, 23, 42, 0.55);
            -webkit-backdrop-filter: blur(3px);
            backdrop-filter: blur(3px);
        }

        .modal-content {
            width: 100%;
            max-width: 450px;
            padding: var(--space-8);
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
        }

        .modal-content h2 {
            margin: 0 0 var(--space-5);
            font-size: var(--fs-lg);
            font-weight: 700;
        }

        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: var(--space-3);
            margin-top: var(--space-6);
        }
    </style>
</head>

<body>

    <div id="loading-overlay">
        <div class="spinner"></div>
        <div style="font-weight:600; color:var(--text-muted);">Loading System...</div>
    </div>

    <!-- Navigation Bar -->
    <div class="nav-top">
        <a onclick="goBack()" class="back-link">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
            Back to Dashboard
        </a>

        <!-- Tab Switcher -->
        <div class="tab-container">
            <button class="tab-btn active" onclick="switchView('list')">User List</button>
            <button class="tab-btn" onclick="switchView('add')">Add New User</button>
        </div>
    </div>

    <!-- CARD 1: User List (Wide) -->
    <div id="card-list" class="main-card active">
        <div class="card-header">
            <h1>
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                    <circle cx="9" cy="7" r="4"></circle>
                    <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                    <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                </svg>
                User Directory
            </h1>
            <div class="count-chip">
                <span id="userCount">0</span> Users
            </div>
        </div>
        <div class="card-body">
            <div class="table-wrapper">
                <table id="users-table" class="table table--striped">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>User ID</th>
                            <th>Role</th>
                            <th style="text-align:right;">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="users-table-body">
                        <!-- JS populated -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- CARD 2: Add User (Focused Form - Like Generate Report) -->
    <div id="card-add" class="main-card">
        <div class="card-header">
            <h1>
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                    <circle cx="8.5" cy="7" r="4"></circle>
                    <line x1="20" y1="8" x2="20" y2="14"></line>
                    <line x1="23" y1="11" x2="17" y2="11"></line>
                </svg>
                Create New User
            </h1>
        </div>
        <div class="card-body">
            <form id="add-user-form">
                <div class="form-group field">
                    <label class="label" for="new-name">Full Name</label>
                    <input type="text" id="new-name" placeholder="e.g. John Doe" required>
                </div>

                <div class="form-group field">
                    <label class="label" for="new-userid">Login ID (Unique)</label>
                    <input type="text" id="new-userid" placeholder="e.g. johndoe123" required>
                </div>

                <div class="form-group field">
                    <label class="label" for="new-password">Password</label>
                    <input type="password" id="new-password" placeholder="••••••••" required>
                </div>

                <div class="form-group field">
                    <label class="label" for="new-access">Access Level</label>
                    <select id="new-access" required>
                        <option value="" disabled selected>Select Role...</option>
                        <option value="ALL">ALL (Admin)</option>
                        <option value="QUALITY">QUALITY</option>
                        <option value="ENGINEER">ENGINEER</option>
                        <option value="PRODUCTION">PRODUCTION</option>
                        <option value="REGISTER">REGISTER</option>
                        <option value="RESOURCE">RESOURCE</option>
                        <option value="BUSINESSDEV">BUSINESSDEV</option>
                        <option value="MANAGEMENT">MANAGEMENT</option>
                    </select>
                </div>

                <button type="submit" class="btn btn-action">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                    Create Account
                </button>
            </form>
        </div>
    </div>

    <!-- Edit Modal (Simplified) -->
    <div id="edit-modal" class="modal">
        <div class="modal-content">
            <h2>Edit User</h2>
            <form id="edit-user-form">
                <input type="hidden" id="edit-id">
                <div class="form-group field">
                    <label class="label" for="edit-name">Name</label>
                    <input type="text" id="edit-name" required>
                </div>
                <div class="form-group field">
                    <label class="label" for="edit-userid">User ID</label>
                    <input type="text" id="edit-userid" readonly style="background:var(--surface-muted);">
                </div>
                <div class="form-group field">
                    <label class="label" for="edit-password">New Password (Optional)</label>
                    <input type="password" id="edit-password">
                </div>
                <div class="form-group field">
                    <label class="label" for="edit-access">Access Level</label>
                    <select id="edit-access" required>
                        <option value="ALL">ALL</option>
                        <option value="QUALITY">QUALITY</option>
                        <option value="ENGINEER">ENGINEER</option>
                        <option value="PRODUCTION">PRODUCTION</option>
                        <option value="REGISTER">REGISTER</option>
                        <option value="RESOURCE">RESOURCE</option>
                        <option value="BUSINESSDEV">BUSINESSDEV</option>
                    </select>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn--secondary"
                        onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // --- Config ---
        const SUPABASE_URL = window.APP_CONFIG.url;
        const SUPABASE_KEY = window.APP_CONFIG.key;

        const supabaseClient = axios.create({
            baseURL: SUPABASE_URL,
            headers: {
                'apikey': SUPABASE_KEY,
                'Authorization': `Bearer ${SUPABASE_KEY}`,
                'Content-Type': 'application/json',
                'Prefer': 'return=representation'
            }
        });

        // --- Navigation ---
        function goBack() { window.location.href = '../../AdminLogin.html'; }

        function switchView(viewName) {
            // Toggle Cards
            document.querySelectorAll('.main-card').forEach(el => el.classList.remove('active'));
            document.getElementById('card-' + viewName).classList.add('active');

            // Toggle Buttons
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            // Find the button that called this function or correspond to index
            if (viewName === 'list') document.querySelectorAll('.tab-btn')[0].classList.add('active');
            if (viewName === 'add') document.querySelectorAll('.tab-btn')[1].classList.add('active');
        }

        // --- Auth & Init ---
        document.addEventListener('DOMContentLoaded', checkLogin);

        async function checkLogin() {
            const userId = sessionStorage.getItem('userId');
            if (!userId) { window.location.href = '../../index.html'; return; }

            try {
                const { data } = await supabaseClient.get('/rest/v1/AdminCredential', {
                    params: { select: 'Access', UserId: `eq.${userId}` }
                });

                if (data.length > 0 && data[0].Access === 'ALL') {
                    loadUsers();
                } else {
                    alert('Access Denied. Admins Only.');
                    goBack();
                }
            } catch (e) { console.error(e); }
            document.getElementById('loading-overlay').style.display = 'none';
        }

        // --- Load Users ---
        async function loadUsers() {
            try {
                const { data } = await supabaseClient.get('/rest/v1/AdminCredential', {
                    params: { select: '*', order: 'Name.asc' }
                });

                document.getElementById('userCount').textContent = data.length;
                const tbody = document.getElementById('users-table-body');
                tbody.innerHTML = '';

                data.forEach(user => {
                    const tr = document.createElement('tr');
                    // This forces the class to be uppercase and removes any spaces
                    const safeRole = (user.Access || "").toUpperCase().replace(/\s/g, '');

                    tr.innerHTML = `
                                    <td style="font-weight:500;">${user.Name}</td>
                                    <td style="color:var(--text-muted);">${user.UserId}</td>
                                    <td><span class="badge badge-${safeRole}">${user.Access}</span></td>
                                    <td style="text-align:right;">
                                    <button class="btn-sm btn-edit" onclick='openEditModal(${JSON.stringify(user)})'>Edit</button>
                                    <button class="btn-sm btn-delete" onclick="deleteUser('${user.UserId}')">Delete</button>
                                    </td>
                                    `;
                    tbody.appendChild(tr);
                });
            } catch (err) { console.error(err); }
        }

        // --- Create User ---
        document.getElementById('add-user-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const loader = document.getElementById('loading-overlay');
            loader.style.display = 'flex';

            const payload = {
                Name: document.getElementById('new-name').value,
                UserId: document.getElementById('new-userid').value,
                Password: document.getElementById('new-password').value,
                Access: document.getElementById('new-access').value
            };

            try {
                await supabaseClient.post('/rest/v1/AdminCredential', payload);

                alert('Success: User created.');
                document.getElementById('add-user-form').reset();
                switchView('list');
                loadUsers();

            } catch (err) {
                console.error('Create Error:', err);
                // Robust Error Message
                if (err.response && err.response.status === 409) {
                    alert('Error: The User ID "' + payload.UserId + '" already exists.');
                } else {
                    alert('Failed to create user. Please try again.');
                }
            } finally {
                loader.style.display = 'none';
            }
        });

        // --- Delete User ---
        async function deleteUser(id) {
            if (!confirm('Are you sure you want to delete ' + id + '?')) return;

            const loader = document.getElementById('loading-overlay');
            loader.style.display = 'flex';

            try {
                await supabaseClient.delete('/rest/v1/AdminCredential', {
                    params: { UserId: `eq.${id}` }
                });
                loadUsers();
            } catch (err) {
                alert('Delete failed.');
            } finally {
                loader.style.display = 'none';
            }
        }

        // --- Edit Modal Logic ---
        function openEditModal(user) {
            document.getElementById('edit-id').value = user.UserId;
            document.getElementById('edit-name').value = user.Name;
            document.getElementById('edit-userid').value = user.UserId;
            document.getElementById('edit-password').value = '';
            document.getElementById('edit-access').value = user.Access;
            document.getElementById('edit-modal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('edit-modal').style.display = 'none';
        }

        document.getElementById('edit-user-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const loader = document.getElementById('loading-overlay');
            loader.style.display = 'flex';

            const id = document.getElementById('edit-id').value;
            const pass = document.getElementById('edit-password').value;
            const payload = {
                Name: document.getElementById('edit-name').value,
                Access: document.getElementById('edit-access').value
            };
            if (pass) payload.Password = pass;

            try {
                await supabaseClient.patch('/rest/v1/AdminCredential', payload, {
                    params: { UserId: `eq.${id}` }
                });
                closeModal();
                loadUsers();
            } catch (err) {
                alert('Update failed.');
            } finally {
                loader.style.display = 'none';
            }
        });

        // Close modal on outside click
        window.onclick = (e) => {
            if (e.target == document.getElementById('edit-modal')) closeModal();
        }
    </script>
    <div class="footer">© 2025 Famax Technology (M) Sdn. Bhd. All rights reserved.</div>
</body>

</html>
