<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPQC Management - Famax</title>
    <link rel="icon" type="png" href="/FamaxQCSystem/assets/LogoRound.png?v=2">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="/assets/app-config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/toastify-js/1.12.0/toastify.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/toastify-js/1.12.0/toastify.min.js"></script>

    <link rel="stylesheet" href="/assets/theme.css">

    <style>
        /* Page-specific tokens not in the design system */
        :root {
            --text-dark: var(--text-main);
            --special-bg: #fffbeb;
        }

        body { padding: 0; }

        .container { max-width: 1400px; }

        /* Part Cards (main accordions) — reuse .panel surface, keep .glass-card hook */
        .glass-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
        }

        .part-card {
            margin-bottom: var(--space-5);
            overflow: hidden;
        }

        .part-header {
            background: #1e293b;
            color: #fff;
            padding: var(--space-5) var(--space-6);
            font-weight: 800;
            text-transform: uppercase;
            font-size: var(--fs-base);
            letter-spacing: 0.02em;
            display: flex;
            align-items: center;
            gap: var(--space-5);
            cursor: pointer;
            transition: background var(--transition);
        }

        .part-header:hover { background: #0f172a; }

        .part-content {
            display: none;
            padding: var(--space-5);
            background: var(--surface-muted);
        }

        /* Session groups */
        .session-group {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            margin-bottom: var(--space-4);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
        }

        .session-header {
            background: var(--surface-muted);
            padding: var(--space-4) var(--space-5);
            display: flex;
            gap: var(--space-4);
            align-items: center;
            cursor: pointer;
            font-weight: 700;
            font-size: var(--fs-sm);
            border-bottom: 1px solid var(--border);
            transition: background var(--transition);
        }

        .session-header:hover { background: var(--border); }

        .session-content {
            display: none;
            padding: var(--space-6);
        }

        /* Metadata grid */
        .session-meta-grid {
            display: grid;
            grid-template-columns: 200px 200px 1fr;
            gap: var(--space-8);
            margin-bottom: var(--space-6);
            padding-bottom: var(--space-6);
            border-bottom: 1px solid var(--border);
            align-items: end;
        }

        .meta-item label {
            font-size: var(--fs-xs);
            font-weight: 800;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.04em;
            margin-bottom: var(--space-2);
            display: block;
        }

        .meta-item span {
            font-size: var(--fs-md);
            font-weight: 700;
            color: var(--text-main);
        }

        .meta-item input[type="text"] {
            font-weight: 600;
        }

        /* Reading inputs (data grid cells) — keep .reading-input hook */
        .reading-input {
            width: 100% !important;
            max-width: 120px;
            background: var(--bg-card);
            font-weight: 700;
            border: 1px solid var(--border-strong);
            color: var(--text-main);
            padding: 8px 10px;
        }

        .reading-input:focus {
            background: #f0f9ff;
            border-color: var(--primary);
        }

        /* Special states — JS toggles these classes at runtime */
        .row-special-accepted {
            background-color: var(--special-bg) !important;
        }

        .out-of-spec {
            background-color: #ffe4e6 !important;
            border: 2px solid var(--danger) !important;
            color: var(--danger) !important;
        }

        /* Chevrons */
        .chevron::before {
            content: '→';
            display: inline-block;
            margin-right: var(--space-3);
            transition: transform var(--transition);
            font-weight: bold;
        }

        .active>.chevron::before {
            transform: rotate(90deg);
        }

        /* Loader overlay — JS toggles display on #overlay */
        #overlay {
            position: fixed;
            inset: 0;
            background: rgba(255, 255, 255, 0.7);
            -webkit-backdrop-filter: blur(2px);
            backdrop-filter: blur(2px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: var(--z-overlay);
        }
    </style>
</head>

<body>
    <div id="overlay">
        <div class="spinner"></div>
    </div>

    <div class="container">
        <div class="header-nav">
            <div>
                <h2>IPQC Inspection Editor</h2>
                <div style="font-size: 13px; color: var(--text-muted); font-weight: 600;" id="last-sync">Loading...
                </div>
            </div>
            <div class="filter-group">
                <label
                    style="font-size: 10px; font-weight:800; color:var(--text-muted); text-transform: uppercase;">Select
                    Date</label>
                <input type="date" id="date-filter">
            </div>
        </div>

        <div id="ipqc-content"></div>
    </div>

    <script>
        const SB_URL = window.APP_CONFIG.url;
        const SB_KEY = window.APP_CONFIG.key;
        const _supabase = window.supabase.createClient(SB_URL, SB_KEY);

        $(document).ready(function () {
            const today = new Date().toISOString().split('T')[0];
            $('#date-filter').val(today);
            fetchIPQCByDate(today);

            $('#date-filter').on('change', function () {
                fetchIPQCByDate(this.value);
            });
        });

        // Validation logic for coloring
        function validateSpec(input, lsl, usl) {
            const $row = $(input).closest('tr');
            const isSpecialAccept = $row.find('.special-accept-checkbox').is(':checked');
            const val = $(input).val().trim().toUpperCase();

            $(input).removeClass('out-of-spec');

            if (isSpecialAccept) return;
            if (val === "") return;

            if (val === "NG" || val === "STOP") {
                $(input).addClass('out-of-spec');
                return;
            }

            const numVal = parseFloat(val);
            const numLsl = parseFloat(lsl);
            const numUsl = parseFloat(usl);

            if (!isNaN(numVal)) {
                if ((!isNaN(numLsl) && numVal < numLsl) || (!isNaN(numUsl) && numVal > numUsl)) {
                    $(input).addClass('out-of-spec');
                }
            }
        }

        async function toggleAllSessionSA(headerCheckbox, idList) {
            const isChecked = $(headerCheckbox).is(':checked') ? 1 : 0;
            $('#overlay').css('display', 'flex');
            const { error } = await _supabase.from('Data_IPQC').update({ special_accept: isChecked }).in('id', idList);
            if (error) {
                Toastify({ text: "Error updating batch", background: "var(--danger)" }).showToast();
                $(headerCheckbox).prop('checked', !isChecked);
            } else {
                Toastify({ text: "Batch Special Accept Updated", background: "var(--success)" }).showToast();
                const $table = $(headerCheckbox).closest('table');
                $table.find('.special-accept-checkbox').prop('checked', isChecked).each(function () { revalidateRow(this); });
            }
            $('#overlay').hide();
        }

        function revalidateRow(checkbox) {
            const $row = $(checkbox).closest('tr');
            const lsl = $row.find('td:nth-child(4)').text();
            const usl = $row.find('td:nth-child(5)').text();

            $row.find('.reading-input').each(function () {
                validateSpec(this, lsl, usl);
            });

            if ($(checkbox).is(':checked')) {
                $row.addClass('row-special-accepted');
            } else {
                $row.removeClass('row-special-accepted');
            }
        }

        function toggleCollapse(element) {
            const $header = $(element);
            const $content = $header.next();
            $header.toggleClass('active');
            $content.slideToggle(250);
        }

        async function fetchIPQCByDate(dateStr) {
            if (!dateStr) return;
            $('#overlay').css('display', 'flex');

            const startOfDay = `${dateStr}T00:00:00.000Z`;
            const endOfDay = `${dateStr}T23:59:59.999Z`;

            const { data, error } = await _supabase
                .from('Data_IPQC')
                .select('*')
                .gte('created_at', startOfDay)
                .lte('created_at', endOfDay)
                .order('created_at', { ascending: false });

            if (error) {
                Toastify({ text: "Error fetching data", background: "var(--danger)" }).showToast();
                $('#overlay').hide();
                return;
            }

            renderGroupedData(data);
            $('#last-sync').text(`(${data.length} entries)`);
            $('#overlay').hide();
        }

        function renderGroupedData(data) {
            const grouped = data.reduce((acc, row) => {
                const part = row.Part_Name;
                const sessionKey = `${row.Process}|${row.JO_Number}|${row.created_at}`;
                if (!acc[part]) acc[part] = {};
                if (!acc[part][sessionKey]) {
                    acc[part][sessionKey] = {
                        process: row.Process, jo: row.JO_Number,
                        time: row.created_at, remarks: row.Remarks || '',
                        machine: row.Machine || '', points: []
                    };
                }
                acc[part][sessionKey].points.push(row);
                return acc;
            }, {});

            let html = '';
            const entries = Object.entries(grouped);

            if (entries.length === 0) {
                html = '<div class="glass-card" style="padding:50px; text-align:center; font-weight:600; color:var(--text-muted);">No records found for this date.</div>';
            } else {
                for (const [partName, sessions] of entries) {
                    html += `
                    <div class="part-card glass-card">
                        <div class="part-header chevron" onclick="toggleCollapse(this)">
                            <span>${partName}</span>
                            <span style="font-weight:400; font-size:11px; opacity:0.8; margin-left:auto;">${Object.keys(sessions).length} Sessions</span>
                        </div>
                        <div class="part-content">`;

                    for (const [sKey, s] of Object.entries(sessions)) {
                        const timeOnly = new Date(s.time).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                        html += `
                        <div class="session-group">
                            <div class="session-header chevron" onclick="toggleCollapse(this)">
                                <span>TIME: ${timeOnly}</span>
                                <span style="color:var(--text-muted)">|</span>
                                <span>PROCESS: ${s.process}</span>
                            </div>
                            <div class="session-content">
                                <div class="session-meta-grid">
                                    <div class="meta-item"><label>JO Number</label><span>${s.jo}</span></div>
                                    <div class="meta-item">
                                        <label>Machine</label>
                                        <input type="text" value="${s.machine}" 
                                            onblur="updateSessionField('${partName}','${s.process}','${s.jo}','${s.time}', 'Machine', this.value)"
                                            placeholder="MC NO.">
                                    </div>
                                    <div class="meta-item">
                                        <label>Batch Remarks</label>
                                        <input type="text" value="${s.remarks}" 
                                            onblur="updateSessionField('${partName}','${s.process}','${s.jo}','${s.time}', 'Remarks', this.value)"
                                            placeholder="Add process remarks...">
                                    </div>
                                </div>
                                <table>
                                 <thead>
                                    <tr>
                                      <th style="width:50px; text-align:center">
                                        <input type="checkbox" class="header-sa-checkbox" 
                                            onclick="toggleAllSessionSA(this, ${JSON.stringify(s.points.map(p => p.id))})"> SA
                                         </th>
                                        <th>Zone</th><th>Instrument</th><th>LSL</th><th>USL</th>
                                        <th>Reading 1</th><th>Reading 2</th><th>Reading 3</th>
                                         </tr>
                                </thead>
                                    <tbody>`;

                        s.points.sort((a, b) => a.Point_DWG_Zone - b.Point_DWG_Zone).forEach(p => {
                            const r1 = p.Reading_1 === null ? '' : p.Reading_1;
                            const r2 = p.Reading_2 === null ? '' : p.Reading_2;
                            const r3 = p.Reading_3 === null ? '' : p.Reading_3;
                            const saChecked = p.special_accept === 1 ? 'checked' : '';
                            const saRowClass = p.special_accept === 1 ? 'row-special-accepted' : '';

                            html += `
                            <tr class="${saRowClass}">
                                <td style="text-align:center">
                                    <input type="checkbox" class="special-accept-checkbox" ${saChecked} 
                                        onchange="updateSpecialAccept(${p.id}, this)">
                                </td>
                                <td style="font-weight:700">#${p.Point_DWG_Zone}</td>
                                <td><span style="background:#f1f5f9; padding:4px 8px; border-radius:6px; font-size:10px; font-weight:700;">${p.Measuring_Instrument}</span></td>
                                <td style="color:var(--text-muted)">${p.LSL_OK}</td>
                                <td style="color:var(--text-muted)">${p.USL_NG}</td>
                                <td><input type="text" class="reading-input" value="${r1}" 
                                    onkeyup="validateSpec(this, '${p.LSL_OK}', '${p.USL_NG}')"
                                    onblur="updateReading(${p.id}, 'Reading_1', this.value)"></td>
                                <td><input type="text" class="reading-input" value="${r2}" 
                                    onkeyup="validateSpec(this, '${p.LSL_OK}', '${p.USL_NG}')"
                                    onblur="updateReading(${p.id}, 'Reading_2', this.value)"></td>
                                <td><input type="text" class="reading-input" value="${r3}" 
                                    onkeyup="validateSpec(this, '${p.LSL_OK}', '${p.USL_NG}')"
                                    onblur="updateReading(${p.id}, 'Reading_3', this.value)"></td>
                            </tr>`;
                        });
                        html += `</tbody></table></div></div>`;
                    }
                    html += `</div></div>`;
                }
            }
            $('#ipqc-content').html(html);

            $('.reading-input').each(function () {
                const lsl = $(this).closest('tr').find('td:nth-child(4)').text();
                const usl = $(this).closest('tr').find('td:nth-child(5)').text();
                validateSpec(this, lsl, usl);
            });
        }

        async function updateSpecialAccept(rowId, checkbox) {
            const isChecked = $(checkbox).is(':checked') ? 1 : 0;
            const { error } = await _supabase.from('Data_IPQC').update({ special_accept: isChecked }).eq('id', rowId);
            if (error) {
                Toastify({ text: "Error updating Special Accept", background: "var(--danger)" }).showToast();
                $(checkbox).prop('checked', !$(checkbox).is(':checked'));
            } else {
                Toastify({ text: "Special Accept Updated", background: "var(--primary)" }).showToast();
                revalidateRow(checkbox);
            }
        }

        async function updateSessionField(part, process, jo, time, field, newVal) {
            const updateObj = {};
            updateObj[field] = newVal;
            const { error } = await _supabase.from('Data_IPQC').update(updateObj)
                .match({ Part_Name: part, Process: process, JO_Number: jo, created_at: time });

            if (error) Toastify({ text: `Error updating ${field}`, background: "var(--danger)" }).showToast();
            else Toastify({ text: `${field} Updated`, background: "var(--primary)" }).showToast();
        }

        async function updateReading(rowId, field, newVal) {
            const updateObj = {};
            updateObj[field] = newVal;
            const { error } = await _supabase.from('Data_IPQC').update(updateObj).eq('id', rowId);

            if (error) Toastify({ text: "Error saving reading", background: "var(--danger)" }).showToast();
            else Toastify({ text: "Reading Saved", background: "var(--success)" }).showToast();
        }
    </script>
<div class="footer">© 2025 Famax Technology (M) Sdn. Bhd. All rights reserved.</div>
</body>

</html>
