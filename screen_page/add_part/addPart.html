<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Add Part - Upload Excel</title>
    <!-- Add /FamaxQCSystem to the beginning of the path -->
    <link rel="icon" type="png" href="/FamaxQCSystem/assets/LogoRound.png?v=2">

    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <!-- Libraries -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="/assets/app-config.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/toastify-js/1.12.0/toastify.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/toastify-js/1.12.0/toastify.min.js"></script>

    <!-- Shared design system (tokens + UI primitives) -->
    <link rel="stylesheet" href="/assets/theme.css">

    <style>
        /* ---- Page-specific layout (built on shared tokens in theme.css) ---- */
        /* Local aliases for tokens this page references by old names */
        :root {
            --primary-dark: var(--primary-hover);
            --border-color: var(--border);
            --focus-ring: var(--primary-ring);
            --input-height: 46px;
            --shadow-card: var(--shadow-lg);
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: var(--space-5);
        }

        /* --- Navigation --- */
        .nav-top {
            width: 100%;
            max-width: 600px;
            margin-bottom: var(--space-4);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .back-link {
            color: var(--text-muted);
            text-decoration: none;
            font-size: var(--fs-base);
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            transition: color var(--transition);
        }

        .back-link:hover {
            color: var(--primary);
        }

        /* --- Main Card --- */
        .card {
            background: var(--bg-card);
            width: 100%;
            max-width: 600px;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            overflow: hidden;
            border: 1px solid var(--border);
            padding: 0;
        }

        /* Header */
        .card-header {
            background: var(--primary);
            padding: var(--space-6) var(--space-8);
            color: var(--on-primary);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-header h1 {
            margin: 0;
            font-size: var(--fs-lg);
            font-weight: 700;
            letter-spacing: -0.2px;
            display: flex;
            align-items: center;
            gap: var(--space-3);
        }

        .user-badge {
            font-size: var(--fs-sm);
            background: rgba(255, 255, 255, 0.2);
            padding: 4px 10px;
            border-radius: var(--radius-full);
        }

        .card-body {
            padding: var(--space-8);
        }

        /* --- Form Elements --- */
        .form-group {
            margin-bottom: var(--space-5);
        }

        label {
            display: block;
            font-size: var(--fs-sm);
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: var(--space-2);
        }

        /* Select2 Override */
        .select2-container {
            width: 100% !important;
        }

        .select2-container .select2-selection--single {
            height: var(--input-height) !important;
            border: 1px solid var(--border-color) !important;
            border-radius: var(--radius) !important;
            display: flex !important;
            align-items: center !important;
        }

        .select2-container--default .select2-selection--single .select2-selection__rendered {
            padding-left: 12px !important;
            color: var(--text-main) !important;
            font-size: 14px !important;
        }

        .select2-container--default .select2-selection--single .select2-selection__arrow {
            height: 100% !important;
            top: 0 !important;
            right: 8px !important;
        }

        .select2-container--default.select2-container--focus .select2-selection--single,
        .select2-container--default.select2-container--open .select2-selection--single {
            border-color: var(--primary) !important;
            box-shadow: 0 0 0 4px var(--focus-ring) !important;
        }

        .select2-dropdown {
            border-color: var(--border-color) !important;
            border-radius: var(--radius) !important;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1) !important;
            margin-top: 4px;
        }

        .select2-results__option {
            padding: 10px 12px !important;
            font-size: 14px !important;
        }

        .select2-container--default .select2-results__option--highlighted[aria-selected] {
            background-color: var(--primary) !important;
        }

        /* --- File Drop Area --- */
        .drop-zone {
            position: relative;
            border: 2px dashed var(--border-strong);
            border-radius: var(--radius-sm);
            padding: var(--space-8);
            text-align: center;
            background-color: var(--surface-muted);
            transition: border-color var(--transition), background-color var(--transition);
            cursor: pointer;
            margin-bottom: var(--space-5);
        }

        .drop-zone:hover {
            border-color: var(--primary);
            background-color: var(--primary-soft);
        }

        .drop-text {
            font-size: var(--fs-sm);
            color: var(--text-muted);
            pointer-events: none;
        }

        .drop-icon {
            font-size: 24px;
            color: var(--primary);
            margin-bottom: var(--space-2);
            display: block;
            pointer-events: none;
        }

        input[type="file"] {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        /* --- File List --- */
        .file-list {
            list-style: none;
            padding: 0;
            margin: 0 0 var(--space-5) 0;
        }

        .file-item {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 10px var(--space-4);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }

        .file-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
            flex: 1;
        }

        .file-name {
            font-size: var(--fs-sm);
            font-weight: 600;
            color: var(--text-main);
            word-break: break-all;
        }

        /* Styled Dropdown inside list */
        .category-select {
            padding: 4px 8px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: var(--fs-xs);
            color: var(--text-main);
            background: var(--surface-muted);
            cursor: pointer;
            width: 80px;
        }

        .btn-remove {
            background: #fee2e2;
            color: #991b1b;
            border: none;
            padding: 6px 12px;
            border-radius: var(--radius-sm);
            font-size: var(--fs-xs);
            font-weight: 700;
            cursor: pointer;
            transition: background var(--transition);
        }

        .btn-remove:hover {
            background: #fecaca;
        }

        /* --- Buttons --- */
        /* .btn-action mirrors .btn (theme) but keeps page-specific full-width sizing */
        .btn-action {
            width: 100%;
            height: 48px;
            background-color: var(--primary);
            color: var(--on-primary);
            border: none;
            border-radius: var(--radius);
            font-size: var(--fs-md);
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: var(--space-2);
            transition: background var(--transition);
        }

        .btn-action:hover:not(:disabled) {
            background-color: var(--primary-hover);
        }

        .btn-action:disabled {
            background-color: var(--border-strong);
            cursor: not-allowed;
        }

        /* --- Loading Overlay --- */
        /* spinner + #loading-overlay base styles come from theme.css; override sizing/bg */
        #loading-overlay {
            background: rgba(255, 255, 255, 0.9);
            z-index: var(--z-modal);
            gap: var(--space-2);
        }

        .spinner {
            width: 30px;
            height: 30px;
            border-width: 3px;
            margin-bottom: 10px;
        }

        /* --- Modal Styles --- */
        .modal {
            display: none;
            position: fixed;
            z-index: var(--z-modal);
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(15, 23, 42, 0.55);
            -webkit-backdrop-filter: blur(4px);
            backdrop-filter: blur(4px);
        }

        .modal-content {
            background-color: var(--bg-card);
            margin: 5% auto;
            padding: var(--space-6);
            border-radius: var(--radius-lg);
            width: 90%;
            max-width: 700px;
            box-shadow: var(--shadow-lg);
            position: relative;
            max-height: 80vh;
            overflow-y: auto;
        }

        .close-modal {
            position: absolute;
            right: var(--space-5);
            top: var(--space-4);
            font-size: 28px;
            font-weight: bold;
            color: var(--text-muted);
            cursor: pointer;
            transition: color var(--transition);
        }

        .close-modal:hover {
            color: var(--danger);
        }

        /* --- Table Styles --- */
        .wi-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: var(--space-4);
            font-size: var(--fs-base);
        }

        .wi-table th,
        .wi-table td {
            padding: 12px var(--space-4);
            text-align: left;
            border-bottom: 1px solid var(--border);
        }

        .wi-table th {
            background-color: var(--surface-muted);
            color: var(--text-muted);
            font-weight: 700;
            text-transform: uppercase;
            font-size: var(--fs-xs);
            letter-spacing: 0.05em;
        }

        .status-pill {
            padding: 4px 8px;
            border-radius: var(--radius-full);
            font-size: var(--fs-xs);
            font-weight: 700;
            background: #dcfce7;
            color: #166534;
        }

        .btn-view-list {
            background: var(--bg-card);
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 6px 12px;
            border-radius: var(--radius-sm);
            font-size: var(--fs-xs);
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 10px;
            transition: background var(--transition), color var(--transition);
        }

        .btn-view-list:hover {
            background: var(--primary-hover);
            color: var(--on-primary);
        }

        /* New Search Style */
        .wi-search-container {
            margin-top: var(--space-4);
            margin-bottom: 10px;
        }

        #wiSearchInput {
            width: 100%;
        }

        .footer {
            margin-top: auto;
            padding: var(--space-5);
            color: var(--text-faint);
            font-size: var(--fs-xs);
            font-weight: 500;
        }

        .drop-icon {
            width: 32px;
            height: 32px;
            color: var(--primary);
            margin: 0 auto 10px auto;
            /* Centering the SVG */
            display: block;
            pointer-events: none;
        }
    </style>
</head>

<body>
    <div id="loading-overlay" style="display: none">
        <div class="spinner"></div>
        <div style="font-size: 14px; color: var(--text-muted)">Processing...</div>
    </div>

    <!-- Navigation -->
    <div class="nav-top">
        <a onclick="window.location.href='../../AdminLogin.html'" class="back-link">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
            Back to Dashboard
        </a>
    </div>

    <div class="card">
        <div class="card-header">
            <h1>
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="17 8 12 3 7 8"></polyline>
                    <line x1="12" y1="3" x2="12" y2="15"></line>
                </svg>
                Add Part - Upload Excel
            </h1>
            <button class="btn-view-list" onclick="openWIModal()">
                View WI List
            </button>
        </div>

        <div class="card-body">
            <!-- Part Selection -->
            <div class="form-group">
                <label>Select Part Name</label>
                <select id="partNameInput" class="select2">
                    <option value="">Search part name...</option>
                </select>
                <label>Revision (e.g., 0, 1, A)</label>
                <input type="text" id="revInput" placeholder="Enter REV..."
                    style="width:100%; padding:10px; border:1px solid var(--border-color); border-radius:var(--radius);">
            </div>

            <!-- File Drop Zone -->
            <div class="form-group" id="uploadSection" style="display: none">
                <label>Upload Excel Files (.xlsx / .xls)</label>
                <div class="drop-zone">
                    <svg class="drop-icon" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                        <polyline points="14 2 14 8 20 8"></polyline>
                        <line x1="16" y1="13" x2="8" y2="13"></line>
                        <line x1="16" y1="17" x2="8" y2="17"></line>
                        <polyline points="10 9 9 9 8 9"></polyline>
                    </svg>
                    <span class="drop-text">Drag files here or click to browse</span>
                    <!-- Note: 'webkitdirectory' allows folder selection -->
                    <input type="file" id="fileInput" webkitdirectory multiple />
                </div>
            </div>

            <!-- File List -->
            <ul id="fileList" class="file-list"></ul>

            <!-- Submit Button -->
            <button id="submitButton" class="btn-action" disabled>
                Submit Files
            </button>
        </div>
    </div>
    <!-- WI List Modal -->
    <div id="wiModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeWIModal()">&times;</span>
            <h2 style="margin-top: 0; font-size: 18px">
                Active Work Instructions (IPQC)
            </h2>

            <!-- Search Field Added Here -->
            <div class="wi-search-container">
                <input type="text" id="wiSearchInput" placeholder="Search by Part Name..." onkeyup="filterWITable()">
            </div>

            <div style="overflow-x: auto">
                <table class="wi-table" id="wiListTable">
                    <thead>
                        <tr>
                            <th>Part Name</th>
                            <th>WI Upload Time</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="wiTableBody">
                        <!-- Data will be injected here -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="footer">© 2025 Famax Technology (M) Sdn. Bhd. All rights reserved.</div>

    <script>
        // --- Config ---
        const SUPABASE_URL = window.APP_CONFIG.url;
        const SUPABASE_KEY = window.APP_CONFIG.key;

        const supabaseClient = window.supabase.createClient(
            SUPABASE_URL,
            SUPABASE_KEY,
            {
                auth: { persistSession: false },
            }
        );

        // --- State ---
        let fileArray = [];
        let selectedPartName = "";

        // --- Initialization ---
        $(document).ready(function () {
            // Check Auth
            const userId = sessionStorage.getItem("userId");
            if (!userId) window.location.href = "../../index.html";
            $("#userName").text(userId);

            // Init Select2
            $("#partNameInput").select2({
                placeholder: "Search and select part...",
                allowClear: true,
                width: "100%",
            });
            $("#partNameInput").on("select2:open", function () {
                setTimeout(function () {
                    document
                        .querySelector(".select2-container--open .select2-search__field")
                        ?.focus();
                }, 0);
            });

            // Load Parts
            fetchPartNames();

            // Event Listeners
            $("#partNameInput").on("select2:select", function (e) {
                selectedPartName = e.params.data.id;
                $("#uploadSection").fadeIn();
                updateSubmitState();
            });

            $("#partNameInput").on("select2:clear", function () {
                selectedPartName = "";
                $("#uploadSection").hide();
                $("#fileList").empty();
                fileArray = [];
                updateSubmitState();
            });

            $("#fileInput").on("change", handleFileSelect);
            $("#submitButton").click(submitFiles);
        });

        // --- Data Loading ---
        async function fetchPartNames() {
            try {
                const { data, error } = await supabaseClient
                    .from("Parts")
                    .select("Part_Name")
                    .order("Part_Name");
                if (error) throw error;

                const $select = $("#partNameInput");
                data.forEach((p) =>
                    $select.append(new Option(p.Part_Name, p.Part_Name))
                );
            } catch (e) {
                console.error(e);
                showToast("Error loading parts", "error");
            }
        }

        // --- File Handling ---
        function handleFileSelect(event) {
            const files = event.target.files;

            // Filter Excel
            for (let i = 0; i < files.length; i++) {
                if (files[i].name.match(/\.(xlsx|xls)$/i)) {
                    fileArray.push(files[i]);
                }
            }

            if (fileArray.length === 0 && files.length > 0) {
                showToast("No valid Excel files found.", "error");
            }

            renderFileList();
            updateSubmitState();

            // Reset input so same files can be re-selected if cleared
            this.value = "";
        }

        function renderFileList() {
            const list = $("#fileList");
            list.empty();

            fileArray.forEach((file, index) => {
                const name = file.name.replace(/\.(xlsx|xls)$/i, "");

                // Determine Category
                let cat = "IPQC";
                if (name.includes("_OQC")) cat = "OQC";
                else if (name.includes("_IQC")) cat = "IQC";

                const html = `
                    <li class="file-item">
                        <div class="file-info">
                            <span class="file-name">${file.name}</span>
                            <div style="display:flex; align-items:center; gap:5px;">
                                <span style="font-size:11px; color:#6b7280;">Category:</span>
                                <select class="category-select" data-index="${index}" onchange="updateCategory(${index}, this.value)">
                                    <option value="IPQC" ${cat === "IPQC" ? "selected" : ""
                    }>IPQC</option>
                                    <option value="OQC" ${cat === "OQC" ? "selected" : ""
                    }>OQC</option>
                                    <option value="IQC" ${cat === "IQC" ? "selected" : ""
                    }>IQC</option>
                                </select>
                            </div>
                        </div>
                        <button class="btn-remove" onclick="removeFile(${index})">Remove</button>
                    </li>
                `;
                list.append(html);
            });
        }

        // Exposed globally for onclick access
        window.removeFile = function (index) {
            fileArray.splice(index, 1);
            renderFileList();
            updateSubmitState();
        };

        window.updateCategory = function (index, value) {
            // Logic handled by rendering, but we could validate here
            const file = fileArray[index];
            const name = file.name;
            let expected = "IPQC";
            if (name.includes("_OQC")) expected = "OQC";
            else if (name.includes("_IQC")) expected = "IQC";

            if (value !== expected) {
                showToast(
                    `Warning: Category ${value} mismatch with filename pattern.`,
                    "error"
                );
            }
        };

        function updateSubmitState() {
            const hasFiles = fileArray.length > 0;
            const hasPart = !!selectedPartName;
            $("#submitButton").prop("disabled", !(hasFiles && hasPart));
        }

        // --- Submission Logic ---
        async function submitFiles() {
            // 1. Validations
            const revision = $("#revInput").val() ? $("#revInput").val().trim() : "";
            if (!revision) {
                showToast("Please enter a Revision (e.g., 0, 1, A)", "error");
                return;
            }
            if (!selectedPartName) {
                showToast("Please select a Part Name first", "error");
                return;
            }

            $("#loading-overlay").show();
            $("#submitButton").prop("disabled", true);

            try {
                // --- STEP 1: PREPARE DMS FOLDERS (Local Network) ---
                console.log("Creating DMS Folders for:", selectedPartName, "Rev:", revision);

                const prepResponse = await fetch(`${window.APP_CONFIG.host}/FamaxDMS/prepare`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ productName: selectedPartName, revision: revision })
                });

                // Robust JSON parsing to avoid "undefined" errors
                const prepData = await prepResponse.json().catch(() => ({
                    success: false,
                    error: "Server did not return valid JSON. Check Backend Console."
                }));

                if (!prepResponse.ok || !prepData.success) {
                    throw new Error(prepData.error || `Server Error (${prepResponse.status})`);
                }

                // --- STEP 2: UPLOAD EXCEL FILES TO DMS DRIVE ---
                console.log("Uploading files to local DMS...");
                const dmsFormData = new FormData();
                dmsFormData.append("productName", selectedPartName);
                dmsFormData.append("revision", revision);
                dmsFormData.append("subFolder", "Work Instruction (WI)");

                // Append all selected files
                fileArray.forEach(file => {
                    dmsFormData.append("files", file);
                });

                const uploadDmsResponse = await fetch(`${window.APP_CONFIG.host}/FamaxDMS/upload-multi`, {
                    method: 'POST',
                    body: dmsFormData
                });

                const uploadDmsData = await uploadDmsResponse.json().catch(() => ({ success: false }));
                if (!uploadDmsResponse.ok || !uploadDmsData.success) {
                    throw new Error("Failed to upload Excel files to the Network Drive.");
                }

                // --- STEP 3: PREPARE DATA FOR DATABASE & NEXT PAGE ---
                const fileDetails = fileArray.map((file, idx) => {
                    const cat = $(`.category-select[data-index="${idx}"]`).val();
                    const nameWithoutExt = file.name.replace(/\.(xlsx|xls)$/i, "");
                    // Extract process name (part before the underscore)
                    const process = nameWithoutExt.split("_")[0];

                    return {
                        partName: selectedPartName,
                        fileName: file.name,
                        process: process,
                        fileObject: file,
                        category: cat,
                    };
                });

                // Store configuration for the Image Upload page
                const uniqueProc = [...new Set(fileDetails.map((d) => d.process))];
                const categories = fileDetails.map((d) => d.category);

                localStorage.setItem("selectedPartName", selectedPartName);
                localStorage.setItem("currentRev", revision);
                localStorage.setItem("processNames", JSON.stringify(uniqueProc));
                localStorage.setItem("fileCategories", JSON.stringify(categories));

                // --- STEP 4: PARSE EXCEL & INSERT INTO SUPABASE ---
                console.log("Inserting data into Supabase tables...");
                const promises = fileDetails.map((detail) => {
                    if (detail.category === "IPQC") return handleIPQCFile(detail);
                    if (detail.category === "OQC") return handleOQCFile(detail);
                    if (detail.category === "IQC") return handleIQCFile(detail);
                });

                // Wait for all database insertions to finish
                await Promise.all(promises);

                showToast("Success: Folders created and database updated!", "success");

                // Redirect to Image Upload page
                setTimeout(() => {
                    window.location.href = "addPartImage.html";
                }, 1500);

            } catch (e) {
                console.error("Submit Error:", e);
                showToast("Error: " + e.message, "error");

                // Re-enable UI on failure
                $("#loading-overlay").hide();
                $("#submitButton").prop("disabled", false);
            }
        }

        // --- Excel Handlers ---
        function readExcel(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const data = new Uint8Array(e.target.result);
                    const wb = XLSX.read(data, { type: "array" });
                    resolve(wb.Sheets[wb.SheetNames[0]]);
                };
                reader.onerror = reject;
                reader.readAsArrayBuffer(file);
            });
        }

        // --- Modal Logic ---

        async function openWIModal() {
            $("#wiModal").fadeIn(200);
            $("#wiSearchInput").val(""); // Clear search when opening
            $("#wiTableBody").html(
                '<tr><td colspan="3" style="text-align:center;">Loading data...</td></tr>'
            );

            try {
                // Fetch data from IPQC table where Status is Active
                // We order by created_at descending so the most recent is first
                const { data, error } = await supabaseClient
                    .from("IPQC")
                    .select("Part_Name, created_at, Status")
                    .eq("Status", "Active")
                    .order("Part_Name", { ascending: true });

                if (error) throw error;

                // Logic to ensure Part_Name only shows once
                const uniqueParts = [];
                const seenNames = new Set();

                data.forEach((item) => {
                    if (!seenNames.has(item.Part_Name)) {
                        seenNames.add(item.Part_Name);
                        uniqueParts.push(item);
                    }
                });

                renderWITable(uniqueParts);
            } catch (e) {
                console.error(e);
                $("#wiTableBody").html(
                    '<tr><td colspan="3" style="text-align:center; color:red;">Failed to load data.</td></tr>'
                );
            }
        }

        function renderWITable(items) {
            const container = $("#wiTableBody");
            container.empty();

            if (items.length === 0) {
                container.append(
                    '<tr><td colspan="3" style="text-align:center;">No active WI found.</td></tr>'
                );
                return;
            }

            items.forEach((item) => {
                const date = new Date(item.created_at).toLocaleString("en-GB", {
                    day: "2-digit",
                    month: "2-digit",
                    year: "numeric",
                    hour: "2-digit",
                    minute: "2-digit",
                });

                const html = `
            <tr>
                <td style="font-weight:500;">${item.Part_Name}</td>
                <td style="color: #6b7280;">${date}</td>
                <td><span class="status-pill">${item.Status}</span></td>
            </tr>
        `;
                container.append(html);
            });
        }

        // --- Added Search Logic ---
        function filterWITable() {
            const input = document.getElementById("wiSearchInput");
            const filter = input.value.toLowerCase();
            const table = document.getElementById("wiListTable");
            const tr = table.getElementsByTagName("tr");

            for (let i = 1; i < tr.length; i++) {
                const td = tr[i].getElementsByTagName("td")[0]; // Part Name column
                if (td) {
                    const txtValue = td.textContent || td.innerText;
                    if (txtValue.toLowerCase().indexOf(filter) > -1) {
                        tr[i].style.display = "";
                    } else {
                        tr[i].style.display = "none";
                    }
                }
            }
        }

        function closeWIModal() {
            $("#wiModal").fadeOut(200);
        }

        // Close modal when clicking outside the box
        $(window).on("click", function (event) {
            if ($(event.target).is("#wiModal")) {
                closeWIModal();
            }
        });

        function showToast(msg, type) {
            Toastify({
                text: msg,
                duration: 3000,
                gravity: "top",
                position: "left",
                style: { background: type === "error" ? "#ef4444" : "#10b981" },
            }).showToast();
        }
