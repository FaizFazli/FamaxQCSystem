<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IPQC Checking - Summary Report</title>
    <!-- Add /FamaxQCSystem to the beginning of the path -->
    <link rel="icon" type="png" href="/FamaxQCSystem/assets/LogoRound.png?v=2">

    <!-- Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.6.2/axios.min.js"></script>
    <script src="/assets/app-config.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/select2/4.0.13/css/select2.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/select2/4.0.13/js/select2.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />

    <!-- Shared design system (tokens + UI primitives) -->
    <link rel="stylesheet" href="/assets/theme.css">

    <style>
        /* ---- Page-specific overrides (built on shared tokens in theme.css) ---- */
        :root {
            --primary-color: var(--primary);
            --primary-dark: var(--primary-hover);
            --primary-light: var(--primary-soft);
            --accent-color: var(--warning);
            --text-secondary: var(--text-muted);
            --border-color: var(--border);
            --error: var(--danger);
            --error-bg: #fee2e2;
            --disabled: var(--border-strong);
            --shadow-md: var(--shadow);
        }

        body {
            display: flex;
            flex-direction: column;
        }

        /* Header */
        header {
            background-color: var(--bg-card);
            height: 64px;
            padding: 0 var(--space-8);
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: var(--shadow-sm);
            position: sticky;
            top: 0;
            z-index: var(--z-header);
            border-bottom: 1px solid var(--border);
        }

        .header-title {
            font-weight: 700;
            font-size: var(--fs-md);
            color: var(--text-main);
            letter-spacing: -0.2px;
            display: flex;
            align-items: center;
            gap: var(--space-3);
        }

        .header-title::before {
            content: "";
            display: block;
            width: 4px;
            height: 24px;
            background: var(--primary);
            border-radius: 2px;
        }

        /* Layout */
        .container {
            flex: 1;
            padding: var(--space-6) var(--space-8);
            max-width: 1200px;
            /* Wider for report view */
            width: 100%;
            margin: 0 auto;
        }

        .section-title {
            font-size: var(--fs-xl);
            font-weight: 700;
            letter-spacing: -0.4px;
            color: var(--text-main);
            margin-bottom: var(--space-6);
            padding-bottom: var(--space-2);
            border-bottom: 2px solid var(--border);
        }

        /* Info Bar (Grid) */
        .info-card {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            padding: var(--space-6);
            box-shadow: var(--shadow-sm);
            margin-bottom: var(--space-8);
            border: 1px solid var(--border);
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1.5rem;
        }

        .info-item {
            display: flex;
            flex-direction: column;
        }

        .info-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-secondary);
            margin-bottom: 0.25rem;
            font-weight: 600;
        }

        .info-value {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-main);
        }

        /* Summary Cards (Generated Zones) */
        #summary-container {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        /* Styles applied to dynamically generated content */
        .zone-card {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 1.5rem;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-color);
            break-inside: avoid;
            /* For printing */
        }

        .zone-card h3 {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--border-color);
        }

        .detail-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            font-size: 0.9rem;
        }

        .detail-table th,
        .detail-table td {
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
        }

        .detail-table th {
            background-color: var(--bg-body);
            color: var(--text-secondary);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.5px;
        }

        .detail-table th:first-child,
        .detail-table td:first-child {
            text-align: left;
            padding-left: 1rem;
        }

        /* Status Styles */
        .exceeded {
            background-color: var(--error) !important;
            color: white !important;
        }

        .exceeded-value {
            background-color: var(--error-bg);
            color: var(--error);
            font-weight: 700;
            border-radius: 4px;
        }

        /* Remarks Section */
        .remark-container {
            margin-top: 2rem;
            background: var(--bg-card);
            padding: 1.5rem;
            border-radius: var(--radius);
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-color);
        }

        .remark-label {
            font-size: 0.9rem;
            font-weight: 600;
            display: block;
            margin-bottom: 0.75rem;
            color: var(--text-main);
        }

        /* Detail box (optional point/value/time) + PDF static remark */
        .remark-detail-input,
        .remark-input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            font-family: var(--font-sans);
            font-size: 1rem;
            transition: all 0.2s;
            background: #fafafa;
        }

        .remark-detail-input {
            margin-top: 0.75rem;
        }

        /* .remark-input is reused as the static remark div injected for PDF export */
        .remark-input {
            min-height: 100px;
            resize: vertical;
            white-space: pre-wrap;
        }

        .remark-detail-input:focus,
        .remark-input:focus {
            outline: none;
            border-color: var(--primary-color);
            background: white;
            box-shadow: 0 4px 10px rgba(25, 118, 210, 0.1);
        }

        /* Select2 dropdown themed to match the rest of the app */
        .remark-container .select2-container {
            width: 100% !important;
        }

        .select2-container--default .select2-selection--single {
            height: 46px;
            display: flex;
            align-items: center;
            background: #fafafa;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            transition: border-color var(--transition), box-shadow var(--transition);
        }

        .select2-container--default .select2-selection--single .select2-selection__rendered {
            color: var(--text-main);
            padding-left: var(--space-3);
            font-size: 1rem;
            line-height: 42px;
        }

        .select2-container--default .select2-selection--single .select2-selection__arrow {
            height: 44px;
        }

        .select2-container--default.select2-container--open .select2-selection--single,
        .select2-container--default.select2-container--focus .select2-selection--single {
            border-color: var(--primary-color);
            background: #fff;
            box-shadow: 0 0 0 3px var(--primary-ring);
        }

        .select2-container--default .select2-results__option--highlighted[aria-selected] {
            background-color: var(--primary);
        }

        /* Buttons */
        .button-container {
            display: flex;
            justify-content: flex-end;
            margin-top: 2rem;
            margin-bottom: 2rem;
        }

        .btn {
            padding: 14px 28px;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background-color: var(--primary-color);
            color: white;
            box-shadow: 0 4px 6px rgba(25, 118, 210, 0.3);
        }

        .btn-primary:hover {
            background-color: var(--primary-dark);
            transform: translateY(-1px);
            box-shadow: 0 6px 8px rgba(25, 118, 210, 0.4);
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 1.5rem;
            color: var(--text-secondary);
            font-size: 0.85rem;
            background: var(--bg-body);
            margin-top: auto;
        }

        /* Print Styles */
        @media print {
            body {
                background-color: white;
                color: black;
            }

            header,
            .button-container {
                display: none !important;
            }

            .footer {
                text-align: center;
                margin-top: auto;
                padding: 20px;
                color: var(--text-muted);
                font-size: 12px;
            }

            .container {
                padding: 0;
                max-width: 100%;
            }

            .info-card,
            .zone-card,
            .remark-container {
                box-shadow: none;
                border: 1px solid #ddd;
                margin-bottom: 1rem;
            }
        }

        /* --- MOBILE RESPONSIVE ADAPTATIONS --- */
        @media (max-width: 768px) {

            /* 1. Global Spacing */
            header {
                padding: 0 1rem;
                height: 60px;
            }

            .container {
                padding: 1rem;
            }

            .section-title {
                font-size: 1.25rem;
                margin-bottom: 1rem;
            }

            /* 2. Info Grid: 2 columns for better fit */
            .info-card {
                padding: 1rem;
            }

            .info-grid {
                grid-template-columns: 1fr 1fr;
                gap: 1rem;
            }

            /* Force Inspector Name to take full width if needed */
            .info-item:last-child {
                grid-column: 1 / -1;
            }

            .info-value {
                font-size: 0.9rem;
            }

            /* 3. Zone Cards & Tables */
            .zone-card {
                padding: 1rem;
                /* Allow the card to scroll horizontally if the table is too wide */
                overflow-x: auto;
            }

            .zone-card h3 {
                font-size: 1rem;
            }

            .detail-table {
                /* Prevent the table from squashing the text too much */
                min-width: 500px;
            }

            .detail-table th,
            .detail-table td {
                padding: 8px;
                font-size: 0.85rem;
            }

            /* 4. Remarks & Inputs */
            .remark-container {
                padding: 1rem;
            }

            .remark-input {
                font-size: 16px !important;
                /* Prevents auto-zoom on mobile browsers */
            }

            /* 5. Buttons */
            .button-container {
                justify-content: center;
                /* Center the button on mobile */
            }

            .btn {
                width: 100%;
                /* Full width button for easier tapping */
                padding: 16px;
            }
        }

        /* Extra Small Devices */
        @media (max-width: 480px) {
            .info-grid {
                grid-template-columns: 1fr;
                /* Stack everything in 1 column */
            }
        }
    </style>
</head>

<body>
    <header>
        <div class="header-title">
            <span>IPQC Checking System</span>
        </div>
    </header>

    <!-- Main Content ID for HTML2PDF to target -->
    <div id="print-area">
        <div class="container">
            <h2 class="section-title">Inspection Summary</h2>

            <div class="info-card">
                <div class="info-grid">
                    <div class="info-item">
                        <span class="info-label">Part Name</span>
                        <span class="info-value" id="selected-part"></span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">Process</span>
                        <span class="info-value" id="selected-process"></span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">Job Order</span>
                        <span class="info-value" id="selected-jo"></span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">Machine</span>
                        <span class="info-value" id="selected-machine"></span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">Inspector Name</span>
                        <span class="info-value" id="person-name"></span>
                    </div>
                </div>
            </div>

            <div id="summary-container">
                <!-- Dynamic Content -->
            </div>

            <div class="remark-container">
                <label for="remark-category" class="remark-label">Remark</label>
                <select id="remark-category" class="remark-select">
                    <option value="">— No remark / select category —</option>
                    <option value="Following tooling / jig">Following tooling / jig</option>
                    <option value="Following customer drawing">Following customer drawing</option>
                    <option value="Following max / min limit">Following max / min limit</option>
                    <option value="Out of spec – accepted (next process / customer accept)">Out of spec – accepted (next process / customer accept)</option>
                    <option value="Dimension out of spec (reject / rework)">Dimension out of spec (reject / rework)</option>
                    <option value="Surface defect (dent / burr / line / vibration / off-center)">Surface defect (dent / burr / line / vibration / off-center)</option>
                    <option value="Drawing needs improvement">Drawing needs improvement</option>
                    <option value="Machine problem / stop">Machine problem / stop</option>
                    <option value="Tooling problem / broken">Tooling problem / broken</option>
                    <option value="Setting / new setting / offset">Setting / new setting / offset</option>
                    <option value="Waiting (material / operator / next process)">Waiting (material / operator / next process)</option>
                    <option value="Production start / stop">Production start / stop</option>
                    <option value="Quantity complete">Quantity complete</option>
                    <option value="Other">Other (free text)</option>
                </select>
                <input type="text" id="remark-detail" class="remark-detail-input"
                    placeholder="Optional detail: point no, value, time (e.g. POINT 8 66.553)" />
            </div>
        </div>
    </div>

    <!-- Buttons outside print area -->
    <div class="container">
        <div class="button-container">
            <button id="finish-btn" class="btn btn-primary">Finish Report</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = window.APP_CONFIG.url;
        const SUPABASE_KEY = window.APP_CONFIG.key;

        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        document.addEventListener("DOMContentLoaded", function () {
            // --- 1. LOAD DATA ---
            const partName = localStorage.getItem("partName");
            const processName = localStorage.getItem("processName");
            const joNumber = localStorage.getItem("joNumber");
            const machineNumber = localStorage.getItem("machineNumber");
            const personName = localStorage.getItem("personName");
            const readings = JSON.parse(
                localStorage.getItem("summaryData") || "[]"
            );

            // --- 2. DISPLAY HEADER INFO ---
            document.getElementById("selected-part").textContent = partName || "Not provided";
            document.getElementById("selected-process").textContent = processName || "Not provided";
            document.getElementById("selected-jo").textContent = joNumber || "Not provided";
            document.getElementById("selected-machine").textContent = machineNumber || "Not provided";
            document.getElementById("person-name").textContent = personName || "Not provided";

            // --- 3. GENERATE ZONES (Fix for 0 values included) ---
            const summaryContainer = document.getElementById("summary-container");
            readings.forEach((zone, index) => {
                const zoneElement = document.createElement("div");
                zoneElement.className = "zone-card";

                // Validation Helpers
                const checkExceeded = (val, min, max) => {
                    if (val === "" || val === null || val === undefined) return false;
                    const v = parseFloat(val);
                    const l = parseFloat(min);
                    const h = parseFloat(max);
                    if (!isNaN(v) && !isNaN(l) && v < l) return true;
                    if (!isNaN(v) && !isNaN(h) && v > h) return true;
                    return false;
                };

                const checkTextExceeded = (val, okCriteria, ngCriteria) => {
                    if (typeof val !== "string") return false;
                    if (okCriteria && okCriteria.toLowerCase() === "ok" && val.toLowerCase() !== "ok") return true;
                    if (ngCriteria && ngCriteria.toLowerCase() === "ng" && val.toLowerCase() === "ng") return true;
                    return false;
                };

                const generateCells = (tagType) => {
                    return ["Reading_1", "Reading_2", "Reading_3"]
                        .map((key) => {
                            const isHeader = tagType === "th";
                            const val = zone[key];
                            const isErr =
                                checkExceeded(val, zone.LSL_OK, zone.USL_NG) ||
                                checkTextExceeded(val, zone.LSL_OK, zone.USL_NG);

                            let className = "";
                            if (isErr) className = isHeader ? "exceeded" : "exceeded-value";

                            let displayValue = "N/A";
                            if (isHeader) {
                                displayValue = key.replace("_", " ");
                            } else {
                                // Allow 0 to appear
                                if (val !== null && val !== undefined && val !== "") {
                                    displayValue = val;
                                }
                            }
                            return `<${tagType} class="${className}">${displayValue}</${tagType}>`;
                        })
                        .join("");
                };

                zoneElement.innerHTML = `
            <h3>Zone ${index + 1}: ${zone.Point_DWG_Zone || index + 1}</h3>
            <table class="detail-table">
                <thead>
                    <tr><th>Measurement</th>${generateCells("th")}</tr>
                </thead>
                <tbody>
                    <tr>
                        <td>Range: ${zone.LSL_OK || "N/A"} - ${zone.USL_NG || "N/A"}</td>
                        ${generateCells("td")}
                    </tr>
                </tbody>
            </table>
          `;
                summaryContainer.appendChild(zoneElement);
            });

            // --- 4. REMARK DROPDOWN + DETAIL FIELD ---
            // Order the remark options by how often each category was used in
            // previous inspections (most-used first), then init Select2.
            async function initRemarkSelect() {
                try {
                    // ponytail: full scan of one column; add a server-side count or date cap if Data_IPQC grows large.
                    const { data, error } = await supabaseClient.from("Data_IPQC").select("Remarks");
                    if (error) {
                        console.error("Remark frequency fetch error:", error);
                    } else if (data) {
                        const freq = {};
                        data.forEach(r => {
                            const cat = String(r.Remarks || r.remarks || "").split("|")[0].trim();
                            if (cat) freq[cat] = (freq[cat] || 0) + 1;
                        });
                        const select = document.getElementById("remark-category");
                        const opts = Array.from(select.options);
                        // Keep the placeholder ("") first and "Other" last; sort the rest by frequency desc.
                        const middle = opts
                            .filter(o => o.value !== "" && o.value !== "Other")
                            .sort((a, b) => (freq[b.value] || 0) - (freq[a.value] || 0));
                        const other = opts.find(o => o.value === "Other");
                        middle.forEach(o => select.appendChild(o));
                        if (other) select.appendChild(other);
                    }
                } catch (e) {
                    console.error("Remark frequency sort failed:", e);
                }
                $("#remark-category").select2({
                    minimumResultsForSearch: 0,
                    placeholder: "— No remark / select category —"
                });
            }
            initRemarkSelect();

            // Enter in the detail box submits (matches previous textarea behaviour)
            document.getElementById("remark-detail").addEventListener("keydown", function (e) {
                if (e.key === "Enter") {
                    e.preventDefault();
                    document.getElementById("finish-btn").click();
                }
            });

            // --- 5. FINISH BUTTON HANDLER ---
            document.getElementById("finish-btn").addEventListener("click", async function () {
                const btn = this;

                // 1. Identify the area to print (Fixes the ReferenceError)
                const element = document.getElementById("print-area");
                if (!element) {
                    alert("Error: Print area not found!");
                    return;
                }

                // 2. Collect all data from localStorage and Input
                // Remark = standardized category + optional free detail, stored in the single Remarks column
                const remarkCategory = document.getElementById("remark-category").value;
                const remarkDetail = document.getElementById("remark-detail").value.trim();
                const remarkValue = remarkCategory === "Other"
                    ? remarkDetail
                    : (remarkDetail ? `${remarkCategory} | ${remarkDetail}` : remarkCategory);
                const partName = localStorage.getItem("partName") || "UnknownPart";
                const processName = localStorage.getItem("processName") || "UnknownProcess";
                const joNumber = localStorage.getItem("joNumber") || "UnknownJO";
                const machineNumber = localStorage.getItem("machineNumber") || "UnknownMachine";
                const personName = localStorage.getItem("personName") || "UnknownInspector";
                const readings = JSON.parse(localStorage.getItem("summaryData") || "[]");

                btn.innerText = "Processing...";
                btn.disabled = true;

                try {
                    const outOfSpecList = [];

                    // 3. Prepare Data for DB and Check for Out-of-Spec
                    const rowsToInsert = readings.map(zone => {
                        [1, 2, 3].forEach(num => {
                            const val = zone[`Reading_${num}`];

                            // ONLY check and add to outOfSpecList if there is actually a value
                            if (val !== "" && val !== null && val !== undefined) {
                                if (!validateReading(val, zone.LSL_OK, zone.USL_NG)) {
                                    outOfSpecList.push({
                                        zone: zone.Point_DWG_Zone,
                                        readingNum: num,
                                        value: val,
                                        min: zone.LSL_OK,
                                        max: zone.USL_NG
                                    });
                                }
                            }
                        });

                        return {
                            Part_Name: partName,
                            Process: processName,
                            JO_Number: joNumber,
                            Machine: machineNumber,
                            Person: personName,
                            Point_DWG_Zone: zone.Point_DWG_Zone,
                            Measuring_Instrument: zone.Measuring_Instrument,
                            LSL_OK: zone.LSL_OK,
                            USL_NG: zone.USL_NG,
                            SC: zone.SC,
                            Reading_1: zone.Reading_1,
                            Reading_2: zone.Reading_2,
                            Reading_3: zone.Reading_3,
                            Remarks: remarkValue
                        };
                    });

                    // 4. Insert into Supabase
                    const { error } = await supabaseClient.from("Data_IPQC").insert(rowsToInsert);
                    if (error) throw error;

                    // 5. Send Telegram Alert (Only if OOS found)
                    if (outOfSpecList.length > 0) {
                        btn.innerText = "Sending Alert...";
                        await sendTelegramAlert(outOfSpecList, remarkValue);
                    }

                    // 6. Prepare UI for PDF (Hide dropdown + detail, show static text)
                    btn.innerText = "Saving to Server...";
                    const remarkContainer = document.querySelector(".remark-container");
                    remarkContainer.querySelector(".select2-container").style.display = "none";
                    document.getElementById("remark-detail").style.display = "none";

                    // Check if temp remark already exists to prevent duplicates
                    let staticRemark = document.getElementById("temp-remark-text");
                    if (!staticRemark) {
                        staticRemark = document.createElement("div");
                        staticRemark.className = "remark-input";
                        staticRemark.id = "temp-remark-text";
                        remarkContainer.appendChild(staticRemark);
                    }
                    staticRemark.textContent = remarkValue || "No remarks.";

                    // 7. PDF Configuration
                    const options = {
                        margin: 10,
                        filename: `${partName}_IPQC_${joNumber}_${new Date().getTime()}.pdf`,
                        image: { type: "jpeg", quality: 0.98 },
                        html2canvas: { scale: 2, useCORS: true, scrollY: 0 },
                        jsPDF: { unit: "mm", format: "a4", orientation: "portrait" },
                    };

                    // 8. Generate PDF as blob and upload to Server
                    const pdfBlob = await html2pdf().set(options).from(element).outputPdf('blob');

                    const formData = new FormData();
                    formData.append("pdf", pdfBlob, options.filename);
                    formData.append("partDescription", partName);
                    formData.append("personName", personName);
                    formData.append("processName", processName);
                    formData.append("joNumber", joNumber);
                    formData.append("inspectionType", "IPQC");

                    try {
                        const serverResponse = await fetch('/FamaxQCSystem/saveInspectionPdf', {
                            method: 'POST',
                            body: formData
                        });
                        const serverResult = await serverResponse.json();
                        console.log("Server response:", serverResult);
                    } catch (serverErr) {
                        console.error("Error uploading PDF to server:", serverErr);
                    }

        // Helper to check if a reading is within spec
        function validateReading(reading, min, max) {
            // 1. If there is no reading, don't treat it as Out of Spec (skip empty cells)
            if (reading === null || reading === undefined || reading === "") return true;

            const rStr = String(reading).toLowerCase();
            const minStr = String(min || "").toLowerCase();
            const maxStr = String(max || "").toLowerCase();

            // 2. Handle Text-based specs (OK/NG or GO/NOGO)
            // We check if the spec is actually "ok" or "go"
            if (minStr === 'ok' || minStr === 'go') {
                return rStr === 'ok' || rStr === 'go';
            }
            if (maxStr === 'ng' || maxStr === 'nogo') {
                return rStr !== 'ng' && rStr !== 'nogo';
            }

            // 3. Handle Numeric-based specs
            const readingValue = parseFloat(reading);
            const minValue = parseFloat(min);
            const maxValue = parseFloat(max);

            // If limits are not numbers (and not the text "ok/ng" handled above), 
            // we can't validate, so we assume it's OK to avoid false alarms.
            if (isNaN(minValue) || isNaN(maxValue)) return true;

            // Return true if value is within range
            return !isNaN(readingValue) && readingValue >= minValue && readingValue <= maxValue;
        }
