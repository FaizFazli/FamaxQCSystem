<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trace by JO | Famax ISO Packet</title>
    <link rel="icon" type="png" href="/FamaxQCSystem/assets/LogoRound.png?v=2">
    <script src="/assets/app-config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="/assets/theme.css">
    <style>
        body { margin: 0; background: var(--bg-body); font-family: var(--font-sans); color: var(--text-main); }
        header {
            position: sticky; top: 0; z-index: 10;
            display: flex; align-items: center; justify-content: space-between; gap: 12px;
            min-height: 56px; padding: 10px 16px;
            background: var(--bg-card); border-bottom: 1px solid var(--border);
        }
        .title { font-weight: 800; font-size: 1rem; }
        .wrap { max-width: 1100px; margin: 0 auto; padding: 16px; }
        .search-bar {
            display: flex; flex-wrap: wrap; gap: 10px; align-items: end;
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 12px; padding: 14px; margin-bottom: 16px;
        }
        .field { flex: 1 1 220px; min-width: 0; }
        .field label { display: block; font-size: 0.72rem; font-weight: 700; color: var(--text-muted); margin-bottom: 4px; text-transform: uppercase; }
        .field input {
            width: 100%; box-sizing: border-box; height: 44px; padding: 0 12px;
            border: 1px solid var(--border-strong); border-radius: 8px; font-size: 16px;
        }
        .btn {
            height: 44px; padding: 0 18px; border: 0; border-radius: 8px;
            background: var(--primary); color: #fff; font-weight: 700; cursor: pointer;
        }
        .btn:disabled { opacity: .6; cursor: not-allowed; }
        .kpis { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 16px; }
        .kpi {
            background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 12px;
        }
        .kpi .l { font-size: 0.7rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; }
        .kpi .v { font-size: 1.35rem; font-weight: 800; margin-top: 4px; }
        .section {
            background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px;
            margin-bottom: 14px; overflow: hidden;
        }
        .section h2 {
            margin: 0; padding: 12px 14px; font-size: 0.9rem; font-weight: 800;
            border-bottom: 1px solid var(--border); background: var(--surface-muted);
        }
        .table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }
        table { width: 100%; border-collapse: collapse; font-size: 0.82rem; min-width: 520px; }
        th, td { padding: 8px 10px; border-bottom: 1px solid var(--border); text-align: left; vertical-align: top; }
        th { font-size: 0.7rem; text-transform: uppercase; color: var(--text-muted); background: #fafafa; }
        .empty { padding: 14px; color: var(--text-muted); font-size: 0.9rem; }
        .msg { color: var(--danger); font-weight: 700; margin: 8px 0; }
        .hint { color: var(--text-muted); font-size: 0.8rem; margin-bottom: 12px; }
        @media print {
            header .btn, .search-bar .btn { display: none; }
            .section { break-inside: avoid; }
        }
    </style>
</head>

<body>
    <header>
        <div class="title">Trace by JO — ISO packet (read-only)</div>
        <button class="btn" type="button" onclick="window.print()">Print</button>
    </header>

    <div class="wrap">
        <p class="hint">Soft-key search on <strong>JO_Number</strong> across existing tables. Does not alter any save/key-in flow. Empty sections mean no matching rows.</p>
        <div class="search-bar">
            <div class="field">
                <label for="jo">Job Order</label>
                <input id="jo" type="text" placeholder="e.g. JO-12345" autocomplete="off" />
            </div>
            <button class="btn" id="btn-search" type="button">Search</button>
        </div>
        <div id="msg" class="msg" hidden></div>
        <div id="kpis" class="kpis" hidden></div>
        <div id="results"></div>
    </div>

    <script>
        (function () {
            const sb = window.supabase.createClient(window.APP_CONFIG.url, window.APP_CONFIG.key);
            const joInput = document.getElementById('jo');
            const btn = document.getElementById('btn-search');
            const msg = document.getElementById('msg');
            const kpis = document.getElementById('kpis');
            const results = document.getElementById('results');

            const params = new URLSearchParams(location.search);
            if (params.get('jo')) joInput.value = params.get('jo');

            function esc(v) {
                return String(v ?? '')
                    .replace(/&/g, '\u0026amp;')
                    .replace(/</g, '\u0026lt;')
                    .replace(/>/g, '\u0026gt;')
                    .replace(/"/g, '\u0026quot;');
            }
            function fmtDate(iso) {
                if (!iso) return '-';
                try { return new Date(iso).toLocaleString('en-GB'); } catch { return iso; }
            }
            function eq(jo) {
                return encodeURIComponent(jo);
            }

            async function get(table, filter) {
                try {
                    const { data, error } = await sb.from(table).select('*').eq(filter.col, filter.val).limit(200);
                    if (error) {
                        console.warn(table, error);
                        return [];
                    }
                    return data || [];
                } catch (e) {
                    console.warn(table, e);
                    return [];
                }
            }

            function section(title, headers, rows, mapRow) {
                if (!rows.length) {
                    return `<div class="section"><h2>${esc(title)} (0)</h2><div class="empty">No rows</div></div>`;
                }
                const body = rows.map(r => `<tr>${mapRow(r).map(c => `<td>${c}</td>`).join('')}</tr>`).join('');
                return `<div class="section"><h2>${esc(title)} (${rows.length})</h2>
          <div class="table-scroll"><table><thead><tr>${headers.map(h => `<th>${esc(h)}</th>`).join('')}</tr></thead>
          <tbody>${body}</tbody></table></div></div>`;
            }

            async function search() {
                const jo = joInput.value.trim();
                msg.hidden = true;
                results.innerHTML = '';
                kpis.hidden = true;
                if (!jo) {
                    msg.hidden = false;
                    msg.textContent = 'Enter a Job Order number.';
                    return;
                }
                btn.disabled = true;
                btn.textContent = 'Loading...';
                try {
                    const [
                        jobOrders,
                        dataIpqc,
                        dataBuyoff,
                        buyoffLogs,
                        buyoffAppr,
                        inspRec,
                        inspSch,
                        storeRec
                    ] = await Promise.all([
                        get('JobOrder', { col: 'JO_Number', val: jo }),
                        get('Data_IPQC', { col: 'JO_Number', val: jo }),
                        get('Data_BUYOFF', { col: 'JO_Number', val: jo }),
                        get('data_buyoff_logs', { col: 'jo_number', val: jo }),
                        get('buyoff_approvals', { col: 'jo_number', val: jo }),
                        get('InspectionRecord', { col: 'JO_Number', val: jo }),
                        get('InspectionSchedule', { col: 'JO_Number', val: jo }),
                        get('storeRecords', { col: 'jo_number', val: jo })
                    ]);

                    const oos = buyoffLogs.filter(r => String(r.status || '').toUpperCase() === 'NG').length;
                    const okLog = buyoffLogs.filter(r => String(r.status || '').toUpperCase() === 'OK').length;
                    const accept = inspRec.reduce((s, r) => s + (Number(r.AcceptQty) || 0), 0);
                    const reject = inspRec.reduce((s, r) => s + (Number(r.RejectQty) || 0), 0);

                    kpis.hidden = false;
                    kpis.innerHTML = `
            <div class="kpi"><div class="l">IPQC rows</div><div class="v">${dataIpqc.length}</div></div>
            <div class="kpi"><div class="l">Buy-off rows</div><div class="v">${dataBuyoff.length}</div></div>
            <div class="kpi"><div class="l">Buy-off OOS (logs)</div><div class="v">${oos}</div></div>
            <div class="kpi"><div class="l">Buy-off OK logs</div><div class="v">${okLog}</div></div>
            <div class="kpi"><div class="l">Lot Accept qty</div><div class="v">${accept}</div></div>
            <div class="kpi"><div class="l">Lot Reject qty</div><div class="v">${reject}</div></div>
            <div class="kpi"><div class="l">Approvals</div><div class="v">${buyoffAppr.length}</div></div>
            <div class="kpi"><div class="l">Store moves</div><div class="v">${storeRec.length}</div></div>
          `;

                    results.innerHTML = [
                        section('Job Order', ['JO', 'Part', 'Process', 'Qty', 'Status', 'Created'], jobOrders, r => [
                            esc(r.JO_Number), esc(r.Part_Name), esc(r.Process), esc(r.Quantity), esc(r.Status), esc(fmtDate(r.created_at))
                        ]),
                        section('Data_IPQC (dimensional)', ['When', 'Part', 'Process', 'Point', 'R1', 'R2', 'R3', 'Person', 'Machine', 'Remarks'], dataIpqc, r => [
                            esc(fmtDate(r.created_at)), esc(r.Part_Name), esc(r.Process), esc(r.Point_DWG_Zone),
                            esc(r.Reading_1), esc(r.Reading_2), esc(r.Reading_3), esc(r.Person), esc(r.Machine), esc(r.Remarks)
                        ]),
                        section('Data_BUYOFF (accepted)', ['When', 'Part', 'Process', 'Point', 'R1–R5', 'Person', 'Technician', 'Remarks', 'Attempt'], dataBuyoff, r => [
                            esc(fmtDate(r.created_at)), esc(r.Part_Name), esc(r.Process), esc(r.Point_DWG_Zone),
                            esc([r.Reading_1, r.Reading_2, r.Reading_3, r.Reading_4, r.Reading_5].join(' / ')),
                            esc(r.Person), esc(r.QC_Technician), esc(r.Remarks), esc(r.Attempt_Group)
                        ]),
                        section('data_buyoff_logs (attempts / OOS)', ['When', 'Point', 'Value', 'Status', 'Person', 'Attempt'], buyoffLogs, r => [
                            esc(fmtDate(r.created_at)), esc(r.point_dwg_zone), esc(r.reading_value), esc(r.status), esc(r.person), esc(r.attempt_group)
                        ]),
                        section('buyoff_approvals', ['Status', 'Segment', 'Part', 'Person', 'Approver', 'Approved at'], buyoffAppr, r => [
                            esc(r.status), esc(r.segment), esc(r.part_name), esc(r.person), esc(r.approver_name), esc(fmtDate(r.approved_at))
                        ]),
                        section('InspectionRecord (lot)', ['When', 'Type', 'Category', 'Part', 'Param', 'Accept', 'Reject', 'Scrap', 'By'], inspRec, r => [
                            esc(fmtDate(r.created_at)), esc(r.Inspection_Type), esc(r.Category), esc(r.Part_Name), esc(r.Parameter),
                            esc(r.AcceptQty), esc(r.RejectQty), esc(r.ScrapQty), esc(r.InspectBy)
                        ]),
                        section('InspectionSchedule', ['Status', 'Part', 'Param', 'Assign', 'Qty', 'Remaining', 'Est finish'], inspSch, r => [
                            esc(r.Status), esc(r.Part_Name), esc(r.Parameter), esc(r.AssignTo), esc(r.quantity), esc(r.remaining_qty), esc(fmtDate(r.EstFinished))
                        ]),
                        section('storeRecords', ['When', 'Part', 'Type', 'Qty', 'PIC', 'Customer'], storeRec, r => [
                            esc(fmtDate(r.created_at || r.out_date || r.manu_date)), esc(r.part_name), esc(r.entry_type || r.remark_in_out), esc(r.quantity), esc(r.pic_name), esc(r.customer_name)
                        ])
                    ].join('');
                } finally {
                    btn.disabled = false;
                    btn.textContent = 'Search';
                }
            }

            btn.addEventListener('click', search);
            joInput.addEventListener('keydown', e => { if (e.key === 'Enter') search(); });
            if (joInput.value.trim()) search();
        })();
    </script>
</body>

</html>
