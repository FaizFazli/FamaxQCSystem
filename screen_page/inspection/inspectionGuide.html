<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Guide Setup | Quality Hub</title>
    <link rel="icon" type="png" href="/FamaxQCSystem/assets/LogoRound.png?v=2">
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/vue@3.4.21/dist/vue.global.prod.js"></script>
    <script src="/assets/app-config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <!-- Shared design system (tokens + UI primitives) -->
    <link rel="stylesheet" href="/assets/theme.css">

    <style>
        /* ---- Page-specific overrides (built on shared tokens in theme.css) ---- */
        body {
            font-family: var(--font-sans);
            padding: var(--space-8);
            text-transform: uppercase;
        }

        /* Behaviour parity: JS also uppercases via @input; keep CSS for instant paint */
        input { text-transform: uppercase; }

        [v-cloak] { display: none; }

        /* Top app bar — uses .panel surface with the amber accent rail */
        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: var(--space-4);
            padding: var(--space-6) var(--space-8);
            margin-bottom: var(--space-8);
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow);
        }

        .header-accent-bar {
            width: var(--space-3);
            height: 40px;
            background-color: var(--primary);
            border-radius: var(--radius-full);
            box-shadow: 0 4px 10px var(--primary-ring);
        }

        .header-title {
            font-size: 2.25rem;
            font-weight: 900;
            letter-spacing: -0.05em;
            text-transform: uppercase;
            font-style: italic;
        }

        /* Content section — maps onto the shared .panel pattern */
        .inspection-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
            margin-bottom: var(--space-8);
            overflow: hidden;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: var(--space-4);
            padding: var(--space-5) var(--space-8);
            background-color: var(--surface-muted);
            border-bottom: 1px solid var(--border);
        }

        .section-label {
            display: flex;
            align-items: center;
            gap: var(--space-2);
            margin-bottom: var(--space-3);
            font-size: var(--fs-xs);
            font-weight: 800;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        /* Form field — themed input with the local amber focus ring */
        .form-input {
            width: 100%;
            height: 3.5rem;
            padding: 0 var(--space-5);
            font-weight: 600;
            color: var(--text-main);
            background-color: var(--bg-card);
            border: 1px solid var(--border-strong);
            border-radius: var(--radius);
            transition: border-color var(--transition), box-shadow var(--transition);
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-ring);
        }

        /* Primary action — variant of the shared .btn */
        .btn-submit {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: var(--space-4) var(--space-8);
            font-family: inherit;
            font-weight: 900;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            color: var(--on-primary);
            background-color: var(--primary);
            border: 1px solid transparent;
            border-radius: var(--radius-lg);
            cursor: pointer;
            box-shadow: 0 10px 20px var(--primary-soft);
            transition: background var(--transition), transform var(--transition), box-shadow var(--transition);
        }
        .btn-submit:hover { background-color: var(--primary-hover); }
        .btn-submit:active { transform: translateY(1px); }
        .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }

        .step-row {
            padding: var(--space-5);
            margin-bottom: var(--space-4);
            background: var(--surface-muted);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
        }

        .card-id-badge {
            width: var(--space-8);
            height: var(--space-8);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: var(--fs-sm);
            font-weight: 900;
            color: var(--on-primary);
            background: var(--primary);
            border-radius: var(--radius-sm);
        }
    </style>
</head>

<body>
    <div id="app" class="max-w-[1200px] mx-auto pb-20" v-cloak>

        <!-- Header -->
        <header class="app-header">
            <div class="flex items-center gap-4">
                <div class="header-accent-bar"></div>
                <h1 class="header-title">Master <span style="color: var(--primary);">Guide Setup</span></h1>
            </div>
            <button @click="submitAll" :disabled="isSubmitting" class="btn-submit">
                <i class="fa fa-save mr-2"></i> {{ isSubmitting ? 'Processing...' : 'Save Guide' }}
            </button>
        </header>

        <!-- Main Info Section -->
        <div class="inspection-card">
            <div class="card-header">
                <h2 class="font-black uppercase text-xl italic tracking-tighter">
                    <span style="color: var(--primary);">Guide</span> <span style="color: var(--text-main);">Definition</span>
                </h2>
            </div>
            <div class="p-10">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
                    <div>
                        <label class="section-label">Part Number (From Parts Inventory)</label>
                        <input type="text" list="parts-list" v-model="master.part_no"
                            placeholder="SEARCH PART NUMBER..." class="form-input"
                            @input="master.part_no = master.part_no.toUpperCase()">
                    </div>
                    <div>
                        <label class="section-label">Process Name</label>
                        <input type="text" v-model="master.process" placeholder="E.G. PLATING / RAW PART"
                            class="form-input" @input="master.process = master.process.toUpperCase()">
                    </div>
                </div>
            </div>
        </div>

        <!-- Dynamic Steps Section -->
        <div class="inspection-card">
            <div class="card-header">
                <h2 class="font-black uppercase text-xl italic tracking-tighter">
                    <span style="color: var(--primary);">Inspection</span> <span style="color: var(--text-main);">Steps</span>
                </h2>
                <button @click="addStep" class="font-bold hover:underline" style="color: var(--primary); background: none; border: none; cursor: pointer;">
                    <i class="fa fa-plus-circle"></i> ADD STEP
                </button>
            </div>
            <div class="p-10">
                <div v-for="(step, index) in steps" :key="index"
                    class="step-row flex flex-col md:flex-row gap-6 items-end">
                    <div class="flex-none">
                        <div class="card-id-badge">{{ index + 1 }}</div>
                    </div>

                    <div class="flex-1 w-full">
                        <label class="section-label">Parameter (Check Item)</label>
                        <input list="db-params" v-model="step.parameter" placeholder="PARAMETER..." class="form-input"
                            @input="step.parameter = step.parameter.toUpperCase()">
                    </div>

                    <div class="flex-1 w-full">
                        <label class="section-label">Details / Instructions</label>
                        <input type="text" v-model="step.details" placeholder="E.G. CHECK FOR SCRATCHES..."
                            class="form-input" @input="step.details = step.details.toUpperCase()">
                    </div>

                    <div class="w-full md:w-32">
                        <label class="section-label">Cycle (Sec)</label>
                        <input type="number" step="0.001" v-model="step.cycle" class="form-input text-center">
                    </div>

                    <button @click="removeStep(index)" class="h-[3.5rem] px-4 text-red-400 hover:text-red-600">
                        <i class="fa fa-trash-alt"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- Datalists -->
        <datalist id="parts-list">
            <!-- Fixed variable name to p.val -->
            <option v-for="p in partsData" :key="p.val" :value="p.val"></option>
        </datalist>

        <datalist id="db-params">
            <option v-for="p in existingParams" :key="p.id" :value="p.Parameter"></option>
        </datalist>

    </div>

    <script>
        const { createApp, ref, onMounted } = Vue;

        createApp({
            setup() {
                const API_KEY = window.APP_CONFIG.key;

                const api = axios.create({
                    baseURL: `${window.APP_CONFIG.url}/rest/v1`,
                    headers: {
                        'apikey': API_KEY,
                        'Authorization': `Bearer ${API_KEY}`
                    }
                });

                const master = ref({ part_no: '', process: '' });
                const steps = ref([{ parameter: '', details: '', cycle: '0.00' }]);
                const existingParams = ref([]);
                const partsData = ref([]);
                const isSubmitting = ref(false);

                const fetchInitialData = async () => {
                    try {
                        const [resParams, resParts] = await Promise.all([
                            api.get('/InspectionGuide?select=id,Parameter'),
                            // Select both casing possibilities to be safe
                            api.get('/Parts?select=*')
                        ]);

                        existingParams.value = resParams.data;

                        // Normalization: Extract the part number regardless of database casing
                        partsData.value = resParts.data.map(item => ({
                            val: (item.Part_Number || item.part_number || item.Part_number || "").toUpperCase()
                        })).filter(i => i.val !== "");

                    } catch (err) {
                        console.error("Fetch Error:", err);
                    }
                };

                const addStep = () => steps.value.push({ parameter: '', details: '', cycle: '0.00' });
                const removeStep = (idx) => steps.value.splice(idx, 1);
                const submitAll = async () => {
                    // Guard against double-click / re-entry creating duplicate rows.
                    if (isSubmitting.value) return;

                    // 1. Validation
                    if (!master.value.part_no || !master.value.process) {
                        return Toastify({
                            text: "PLEASE FILL PART NO AND PROCESS",
                            style: { background: "#ef4444" }
                        }).showToast();
                    }

                    // Filter out empty steps
                    const validSteps = steps.value.filter(s => s.parameter && s.parameter.trim() !== "");
                    if (validSteps.length === 0) {
                        return Toastify({
                            text: "PLEASE ADD AT LEAST ONE PARAMETER",
                            style: { background: "#ef4444" }
                        }).showToast();
                    }

                    isSubmitting.value = true;
                    try {
                        const inspection_ids = [];
                        const cycle_times = [];

                        // 2. Process each step
                        for (const s of validSteps) {
                            const paramUpper = s.parameter.trim().toUpperCase();
                            const detailsUpper = (s.details || "").trim().toUpperCase();

                            // Check if this parameter already exists in our existingParams list
                            // We find by Parameter name (case insensitive)
                            // Trim BOTH sides so "HARDNESS " matches "HARDNESS" (avoids duplicate params).
                            let match = existingParams.value.find(p =>
                                p.Parameter && p.Parameter.trim().toUpperCase() === paramUpper
                            );

                            let targetId;

                            if (match) {
                                // PARAMETER EXISTS: Use the existing ID
                                targetId = match.id;
                            } else {
                                // PARAMETER IS NEW: Create it in the InspectionGuide table
                                try {
                                    const createRes = await api.post('/InspectionGuide',
                                        { Parameter: paramUpper, Details: detailsUpper },
                                        { headers: { 'Prefer': 'return=representation' } }
                                    );
                                    targetId = createRes.data[0].id;
                                } catch (e) {
                                    // Race / unique-index conflict: another insert won — re-fetch and reuse it.
                                    const again = await api.get(`/InspectionGuide?select=id,Parameter&Parameter=eq.${encodeURIComponent(paramUpper)}`);
                                    if (again.data && again.data.length) targetId = again.data[0].id;
                                    else throw e;
                                }
                                // Cache locally so the same name in another step doesn't create it again.
                                existingParams.value.push({ id: targetId, Parameter: paramUpper });
                            }

                            inspection_ids.push(String(targetId));
                            cycle_times.push(String(s.cycle || 0));
                        }

                        // 3. Save to InspectionGuideDetails — UPSERT by part_no + process so we never
                        //    create a second row for the same guide (re-save updates in place).
                        const partNoUpper = master.value.part_no.trim().toUpperCase();
                        const processUpper = master.value.process.trim().toUpperCase();
                        const { data: existingGuide } = await api.get(
                            `/InspectionGuideDetails?select=id&part_no=eq.${encodeURIComponent(partNoUpper)}&process=eq.${encodeURIComponent(processUpper)}`
                        );

                        const wasUpdate = existingGuide.length > 0;
                        if (wasUpdate) {
                            await api.patch(`/InspectionGuideDetails?id=eq.${existingGuide[0].id}`, {
                                inspection_ids: inspection_ids,
                                cycle_times: cycle_times
                            });
                        } else {
                            await api.post('/InspectionGuideDetails', {
                                part_no: partNoUpper,
                                process: processUpper,
                                inspection_ids: inspection_ids,
                                cycle_times: cycle_times
                            });
                        }

                        Toastify({
                            text: wasUpdate ? "UPDATED EXISTING GUIDE FOR THIS PART / PROCESS" : "SUCCESS: MASTER GUIDE CREATED",
                            style: { background: "#fbbf24", color: "#000" }
                        }).showToast();

                        // 4. Reset Form
                        master.value = { part_no: '', process: '' };
                        steps.value = [{ parameter: '', details: '', cycle: '0.00' }];

                        // Refresh data to ensure datalists are up to date
                        fetchInitialData();

                    } catch (err) {
                        console.error("Submission Error:", err);
                        const errorMsg = err.response?.data?.message || "FAILED TO SAVE GUIDE";
                        Toastify({
                            text: errorMsg,
                            style: { background: "#ef4444" }
                        }).showToast();
                    } finally {
                        isSubmitting.value = false;
                    }
                };

                onMounted(fetchInitialData);

                return { master, steps, existingParams, partsData, isSubmitting, addStep, removeStep, submitAll };
            }
        }).mount('#app');
    </script>
    <div class="footer">© 2025 Famax Technology (M) Sdn. Bhd. All rights reserved.</div>
</body>

</html>
