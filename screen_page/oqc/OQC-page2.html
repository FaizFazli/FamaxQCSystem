<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OQC Checking - Summary</title>
    <!-- Add /FamaxQCSystem to the beginning of the path -->
    <link rel="icon" type="png" href="/FamaxQCSystem/assets/LogoRound.png?v=2">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Shared design system (tokens + UI primitives) -->
    <link rel="stylesheet" href="/assets/theme.css">

    <style>
        /* ---- Legacy color aliases retained for page-local rules ---- */
        :root {
            --primary-color: var(--primary);
            --primary-light: #42a5f5;
            --primary-dark: var(--primary-hover);
            --text-light: #ffffff;
            --text-dark: var(--text-main);
            --background-light: var(--surface-muted);
            --background-white: var(--bg-card);
            --border-color: var(--border);
            --disabled-color: var(--border-strong);
            --exceeded-color: var(--danger);
        }

        /* ---- Page-specific layout (built on shared tokens in theme.css) ---- */
        body { display: flex; flex-direction: column; min-height: 100vh; }

        header {
            position: sticky;
            top: 0;
            z-index: var(--z-header);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: var(--space-4);
            height: 64px;
            padding: 0 var(--space-8);
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
        }

        .header-title {
            display: flex;
            align-items: center;
            gap: var(--space-3);
            font-size: var(--fs-md);
            font-weight: 700;
            letter-spacing: -0.2px;
            color: var(--text-main);
        }

        .container {
            flex: 1;
            width: 100%;
            max-width: 1100px;
            margin: 0 auto;
            padding: var(--space-8);
        }

        .section-title {
            margin: 0 0 var(--space-6);
            padding-bottom: var(--space-3);
            font-size: var(--fs-xl);
            font-weight: 700;
            letter-spacing: -0.4px;
            color: var(--text-main);
            border-bottom: 1px solid var(--border);
        }

        .info-card {
            padding: var(--space-6);
            margin-bottom: var(--space-8);
            background: var(--primary);
            color: var(--on-primary);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow);
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: var(--space-5);
        }

        .info-item { display: flex; flex-direction: column; }

        .info-label {
            font-size: var(--fs-sm);
            margin-bottom: var(--space-1);
            opacity: 0.85;
        }

        .info-value {
            font-size: var(--fs-lg);
            font-weight: 700;
        }

        .exceeded {
            background-color: var(--danger);
            color: #fff;
        }

        .exceeded-value {
            background-color: #fee2e2;
            color: #b91c1c;
            font-weight: 700;
        }

        .detail-table {
            font-size: var(--fs-sm);
            margin-bottom: var(--space-5);
            width: 100%;
            border-collapse: collapse;
        }

        .detail-table th, .detail-table td {
            padding: var(--space-2);
            text-align: center;
            border: 1px solid var(--border);
        }

        .detail-table th {
            background: var(--primary);
            color: var(--on-primary);
        }

        .detail-table th.exceeded {
            background-color: var(--danger);
            color: #ffffff;
        }

        .detail-table .range-row td {
            background-color: var(--primary-soft);
            font-weight: 600;
        }

        h3 {
            margin: var(--space-6) 0 var(--space-3);
            font-size: var(--fs-md);
            font-weight: 700;
            color: var(--text-main);
        }

        .button-container {
            display: flex;
            justify-content: flex-end;
            margin-top: var(--space-8);
        }

        /* Local alias so existing .btn-primary hook maps to shared button */
        .btn-primary { background: var(--primary); color: var(--on-primary); }
        .btn-primary:hover { background: var(--primary-hover); }
        .btn-primary:disabled { background: var(--border-strong); cursor: not-allowed; }

        .footer {
            padding: var(--space-6) var(--space-8);
            text-align: center;
            font-size: var(--fs-sm);
            font-weight: 500;
            color: var(--text-faint);
            border-top: 1px solid var(--border);
        }

        /* Visual inspection section styles */
        .visual-section {
            margin-top: var(--space-8);
            padding: var(--space-6);
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
        }

        .visual-title {
            font-size: var(--fs-md);
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: var(--space-4);
            padding-bottom: var(--space-3);
            border-bottom: 1px solid var(--border);
        }

        .visual-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: var(--space-4);
            margin-bottom: var(--space-6);
        }

        .visual-item {
            background: var(--surface-muted);
            padding: var(--space-4);
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
        }

        .rating-label {
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: var(--space-2);
        }

        .rating-value {
            font-size: var(--fs-lg);
            font-weight: 700;
        }

        .rating-low { color: var(--danger); }

        .decision-section {
            margin-top: var(--space-6);
            padding: var(--space-4);
            background: var(--primary-soft);
            border-radius: var(--radius-sm);
        }

        .remark-section {
            margin-top: var(--space-6);
            padding: var(--space-4);
            background: var(--surface-muted);
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
        }

        @media (max-width: 768px) {
            header { padding: 0 12px; height: auto; min-height: 52px; }
            .container { padding: 12px 10px; }
            .info-grid { grid-template-columns: 1fr 1fr; }
            .visual-grid { grid-template-columns: 1fr 1fr; }
            .detail-table { min-width: 480px; }
            .table-scroll,
            #summary-container > div {
                width: 100%;
                max-width: 100%;
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
            }
            input, select, textarea, .remark-input { font-size: 16px !important; }
            .button-container {
                flex-direction: column;
                position: sticky;
                bottom: 0;
                background: var(--bg-body);
                padding: 8px 0 max(8px, env(safe-area-inset-bottom));
            }
            .button-container .btn { width: 100%; min-height: 48px; }
        }

        @media print {
            body {
                width: 210mm;
                height: 297mm;
                margin: 0;
                padding: 0;
            }

            header, .footer, .button-container {
                display: none;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-title">
            <svg width="28" height="28" viewBox="0 0 24 24" aria-hidden="true" style="fill: var(--primary);">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z" />
            </svg>
            <span>OQC Checking System</span>
        </div>
    </header>

    <div class="container">
        <h2 class="section-title">Inspection Summary</h2>
        
        <div class="info-card">
            <div class="info-grid">
                <div class="info-item">
                    <span class="info-label">Part:</span>
                    <span class="info-value" id="selected-part"></span>
                </div>
                <div class="info-item">
                    <span class="info-label">Process:</span>
                    <span class="info-value" id="selected-process"></span>
                </div>
                <div class="info-item">
                    <span class="info-label">Job Order:</span>
                    <span class="info-value" id="selected-jo"></span>
                </div>
                <div class="info-item">
                    <span class="info-label">Person Name:</span>
                    <span class="info-value" id="person-name"></span>
                </div>
            </div>
        </div>
    
        <div id="summary-container">
            <!-- Inspection summary will be added dynamically -->
        </div>

        <div id="visual-container" class="visual-section">
            <h3 class="visual-title">Visual Inspection Results</h3>
            <div class="visual-grid" id="visual-grid">
                <!-- Visual inspection results will be added dynamically -->
            </div>
            <div class="decision-section" id="decision-section">
                <!-- QC Decision will be added dynamically -->
            </div>
            <div class="remark-section" id="remark-section">
                <!-- QC Remark will be added dynamically -->
            </div>
        </div>
    
        <div class="button-container">
            <button id="finish-btn" class="btn btn-primary">Finish</button>
        </div>
    </div>
    
    <div class="footer">© 2025 Famax Technology (M) Sdn. Bhd. All rights reserved.</div>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Get URL parameters
            const urlParams = new URLSearchParams(window.location.search);
            const partName = urlParams.get('part');
            const processName = urlParams.get('process');
            const joNumber = urlParams.get('jo');
            const personName = urlParams.get('name');
    
            // Display the values in elements
            document.getElementById('selected-part').textContent = partName || 'Not provided';
            document.getElementById('selected-process').textContent = processName || 'Not provided';
            document.getElementById('selected-jo').textContent = joNumber || 'Not provided';
            document.getElementById('person-name').textContent = personName || 'Not provided';
    
            // Get submitted readings from URL parameters
            //const readings = JSON.parse(decodeURIComponent(urlParams.get('readings') || '[]'));
            
            // Get visual inspection data from URL parameters
            //const visualData = urlParams.get('visualData') ? JSON.parse(decodeURIComponent(urlParams.get('visualData'))) : null;



            const readings = JSON.parse(localStorage.getItem('oqcReadings') || '[]');
            const visualData = JSON.parse(localStorage.getItem('oqcVisualData') || 'null');
    
            // Display inspection summary
            const summaryContainer = document.getElementById('summary-container');
            readings.forEach((zone, index) => {
                const zoneElement = document.createElement('div');
                zoneElement.innerHTML = `
                    <h3>Zone ${index + 1}: ${zone.Point_DWG_Zone || (index + 1)}</h3>
                    <table class="detail-table">
                        <thead>
                            <tr>
                                <th>Measurement</th>
                                ${['Reading_1', 'Reading_2', 'Reading_3', 'Reading_4', 'Reading_5'].map(key => {
                                    // Convert values to numbers for comparison
                                    const reading = parseFloat(zone[key]);
                                    const min = parseFloat(zone.Min);
                                    const max = parseFloat(zone.Max);
                                    
                                    // Check if the reading is out of range
                                    const isExceeded = !isNaN(reading) && 
                                        ((!isNaN(min) && reading < min) || (!isNaN(max) && reading > max));
                                    
                                    // Special case for text comparisons like 'OK' and 'NG'
                                    const isTextExceeded = typeof zone[key] === 'string' && typeof zone.Min === 'string' && 
                                        (zone.Min.toLowerCase() === 'ok' && zone[key].toLowerCase() !== 'ok') ||
                                        (typeof zone.Max === 'string' && zone.Max.toLowerCase() === 'ng' && zone[key].toLowerCase() === 'ng');
                                    
                                    return `
                                        <th${(isExceeded || isTextExceeded) ? ' class="exceeded"' : ''}>
                                            ${key.replace('_', ' ')}
                                        </th>
                                    `;
                                }).join('')}
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>Range: ${zone.Min || 'N/A'} - ${zone.Max || 'N/A'}</td>
                                ${['Reading_1', 'Reading_2', 'Reading_3', 'Reading_4', 'Reading_5'].map(key => {
                                    // Convert values to numbers for comparison
                                    const reading = parseFloat(zone[key]);
                                    const min = parseFloat(zone.Min);
                                    const max = parseFloat(zone.Max);
                                    
                                    // Check if the reading is out of range
                                    const isExceeded = !isNaN(reading) && 
                                        ((!isNaN(min) && reading < min) || (!isNaN(max) && reading > max));
                                    
                                    // Special case for text comparisons like 'OK' and 'NG'
                                    const isTextExceeded = typeof zone[key] === 'string' && typeof zone.Min === 'string' && 
                                        (zone.Min.toLowerCase() === 'ok' && zone[key].toLowerCase() !== 'ok') ||
                                        (typeof zone.Max === 'string' && zone.Max.toLowerCase() === 'ng' && zone[key].toLowerCase() === 'ng');
                                    
                                    return `
                                        <td${(isExceeded || isTextExceeded) ? ' class="exceeded-value"' : ''}>
                                            ${zone[key] || 'N/A'}
                                        </td>
                                    `;
                                }).join('')}
                            </tr>
                        </tbody>
                    </table>
                `;
                summaryContainer.appendChild(zoneElement);
            });

            // Display visual inspection results if available
            if (visualData) {
                const visualGrid = document.getElementById('visual-grid');
                const decisionSection = document.getElementById('decision-section');
                const remarkSection = document.getElementById('remark-section');

                // Create visual inspection criteria items
                const criteria = [
                    { id: 'hardness', label: 'Hardness' },
                    { id: 'finishing', label: 'Finishing' },
                    { id: 'noBurr', label: 'No Burr' },
                    { id: 'noDented', label: 'No Dented' },
                    { id: 'noScratches', label: 'No Scratches' },
                    { id: 'plating', label: 'Plating' },
                    { id: 'flatness', label: 'Flatness' },
                    { id: 'roundness', label: 'Roundness' }
                ];

                criteria.forEach(item => {
                    const rating = parseInt(visualData[item.id]);
                    const visualItem = document.createElement('div');
                    visualItem.className = 'visual-item';
                    visualItem.innerHTML = `
                        <div class="rating-label">${item.label}:</div>
                        <div class="rating-value ${rating < 3 ? 'rating-low' : ''}">
                            ${rating}/5
                        </div>
                    `;
                    visualGrid.appendChild(visualItem);
                });


                // Add QC Remark
                remarkSection.innerHTML = `
                    <div style="font-weight: 600; margin-bottom: 0.5rem;">QC Remark:</div>
                    <div style="font-style: italic;">
                        "${visualData.qcRemark}"
                    </div>
                `;
            } else {
                // Hide visual section if no data available
                document.getElementById('visual-container').style.display = 'none';
            }

            // Add event listener to finish button
            document.getElementById('finish-btn').addEventListener('click', function() {
                window.print();

                // Wait for a short delay to allow the print dialog to appear
                setTimeout(function() {
                    // Clear localStorage
                    localStorage.removeItem('oqcReadings');
                    localStorage.removeItem('oqcVisualData');

                    // Redirect to mainpage1.html
                    window.location.href = '../../index.html';
                }, 500);
            });
        });
    </script>
</body>
</html>
