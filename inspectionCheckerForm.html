<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inspection Entry | Quality Hub</title>
    <link rel="icon" type="png" href="/FamaxQCSystem/img/LogoRound.png?v=2" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/vue@3.4.21/dist/vue.global.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f8f9fa;
            color: #1a1a1a;
            padding: 2rem;
            background-image: radial-gradient(circle at 0% 0%, rgba(251, 191, 36, 0.08) 0%, transparent 25%), radial-gradient(circle at 100% 100%, rgba(251, 191, 36, 0.05) 0%, transparent 25%);
        }

        @media (min-width: 768px) {
            body {
                padding: 3rem;
            }
        }

        .app-header {
            background: #ffffff;
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 0, 0, 0.05);
            border-radius: 2.5rem;
            padding: 2rem;
            margin-bottom: 2.5rem;
            color: #1a1a1a;
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.1);
            position: relative;
            overflow: visible;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: flex-start;
            gap: 2rem;
        }

        @media (min-width: 768px) {
            .app-header {
                padding: 3rem;
                flex-direction: row;
                align-items: flex-start;
            }
        }

        .header-accent-bar {
            width: 0.75rem;
            height: 2.5rem;
            background-color: #fbbf24;
            border-radius: 9999px;
            box-shadow: 0 4px 10px rgba(251, 191, 36, 0.3);
        }

        .header-title {
            font-size: 2.25rem;
            font-weight: 900;
            letter-spacing: -0.05em;
            text-transform: uppercase;
            font-style: italic;
            text-align: left;
            color: #000;
        }

        .nav-button-wrap {
            display: flex;
            gap: 1rem;
            z-index: 10;
        }

        .nav-link {
            padding: 0.75rem 1.5rem;
            border-radius: 1rem;
            font-weight: 700;
            font-size: 0.875rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s;
        }

        .nav-link-home {
            background: #f3f4f6;
            border: 1px solid rgba(0, 0, 0, 0.05);
            color: #4b5563;
        }

        .nav-link-sched {
            background: #000;
            color: white;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .inspection-card {
            background: #ffffff;
            border-radius: 2.5rem;
            box-shadow: 0 15px 35px -5px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(0, 0, 0, 0.05);
            margin-bottom: 2.5rem;
            position: relative;
        }

        .card-header {
            padding: 1.5rem 2.5rem;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            background-color: #fafafa;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top-left-radius: 2.5rem;
            border-top-right-radius: 2.5rem;
        }

        .card-id-badge {
            width: 2.5rem;
            height: 2.5rem;
            background: #fbbf24;
            color: #000;
            border-radius: 0.75rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
        }

        .section-label {
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #6b7280;
            margin-bottom: 0.75rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .form-input {
            width: 100%;
            height: 3.5rem;
            padding: 0 1.5rem;
            background-color: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 1rem;
            font-weight: 600;
            color: #1a1a1a;
            transition: border-color 0.2s;
            padding-right: 3rem !important;
        }

        .input-wrapper {
            position: relative;
            width: 100%;
            display: flex;
            align-items: center;
        }

        .clear-btn {
            position: absolute;
            right: 1.25rem;
            /* Distance from the right edge */
            color: #9ca3af;
            transition: all 0.2s;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            border: none;
            padding: 0;
            z-index: 10;
        }

        .clear-btn:hover {
            color: #ef4444;
            transform: scale(1.1);
        }


        .clear-btn:hover {
            color: #ef4444;
        }

        .form-input:focus {
            outline: none;
            border-color: #fbbf24;
            box-shadow: 0 0 0 3px rgba(251, 191, 36, 0.1);
        }

        .dropdown-list {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: #ffffff;
            border-radius: 1.25rem;
            z-index: 200;
            max-height: 250px;
            overflow-y: auto;
            border: 1px solid #fbbf24;
            padding: 0.5rem;
            margin-top: 5px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        .dropdown-item {
            padding: 0.75rem 1rem;
            cursor: pointer;
            font-size: 0.875rem;
            font-weight: 600;
            border-radius: 0.75rem;
            color: #374151;
        }

        .dropdown-item:hover {
            background-color: #fbbf24;
            color: #000;
        }

        .qty-container {
            background-color: #f9fafb;
            padding: 2rem;
            border-radius: 2rem;
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        .qty-input {
            height: 4rem;
            text-align: center;
            /* Reduced font size slightly to fit 7 digits (1,000,000) */
            font-size: 1.15rem;
            font-weight: 900;
            background-color: #ffffff;
            border-color: #e5e7eb;

            /* OVERRIDE the padding from .form-input to provide more space for numbers */
            padding-left: 0.25rem !important;
            padding-right: 0.25rem !important;
        }

        .qty-input-accept {
            color: #16a34a !important;
        }

        .qty-readonly {
            background-color: #f3f4f6 !important;
            opacity: 0.8;
            border-color: transparent;
        }

        .btn-lock-locked {
            background-color: #fbbf24;
            color: #000;
        }

        .btn-lock-unlocked {
            background-color: #000;
            border: 1px solid #000;
            color: #fbbf24;
        }

        .btn-add-form {
            width: 100%;
            padding: 2.5rem;
            border: 2px dashed #d1d5db;
            background: #ffffff;
            border-radius: 3rem;
            color: #9ca3af;
            font-size: 1.25rem;
            font-weight: 900;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            transition: all 0.2s;
        }

        .btn-add-form:hover {
            border-color: #fbbf24;
            color: #fbbf24;
            background: #fffdf5;
        }

        .btn-submit-all {
            width: 100%;
            padding: 1.5rem;
            background-color: #fbbf24;
            color: black;
            border-radius: 2.5rem;
            font-size: 1.5rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            box-shadow: 0 10px 20px rgba(251, 191, 36, 0.2);
        }

        .btn-submit-all:disabled {
            background-color: #e5e7eb;
            color: #9ca3af;
            box-shadow: none;
            cursor: not-allowed;
        }

        .badge-rework {
            background: #000 !important;
            color: #fbbf24 !important;
        }

        .type-toggle {
            display: flex;
            background: #f3f4f6;
            padding: 4px;
            border-radius: 0.75rem;
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        .type-btn {
            padding: 6px 12px;
            font-size: 10px;
            font-weight: 800;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: all 0.2s;
            color: #6b7280;
        }

        .type-btn.active-initial {
            background: #fbbf24;
            color: black;
        }

        .type-btn.active-rework {
            background: #000;
            color: white;
        }
    </style>
</head>

<body>
    <div id="app" class="max-w-[1400px] mx-auto pb-20">

        <header class="app-header">
            <div class="relative z-10">
                <div class="flex items-center gap-4">
                    <div class="header-accent-bar"></div>
                    <h1 class="header-title">New <span class="text-yellow-500">Inspection</span></h1>
                </div>
            </div>
            <div class="nav-button-wrap">
                <a href="inspectionDashboard.html" class="nav-link nav-link-home"><i class="fa fa-th-large"></i>
                    Dashboard</a>
                <a href="inspectionSchedule.html" class="nav-link nav-link-sched"><i class="fa fa-calendar-alt"></i>
                    View Schedule</a>
            </div>
        </header>

        <div id="ui-forms-container">
            <div v-for="(form, index) in forms" :key="index" class="inspection-card">
                <div class="card-header">
                    <div class="flex items-center gap-6">
                        <div class="card-id-badge" :class="{'badge-rework': form.inspection_type === 'Rework'}">0{{
                            index + 1 }}</div>
                        <div class="type-toggle">
                            <div class="type-btn" :class="{'active-initial': form.inspection_type === 'Initial'}"
                                @click="!form.isLocked && (form.inspection_type = 'Initial')">Initial Inspection</div>
                            <div class="type-btn" :class="{'active-rework': form.inspection_type === 'Re-Inspection'}"
                                @click="!form.isLocked && (form.inspection_type = 'Re-Inspection')">Re-Inspection</div>
                        </div>
                        <h2 class="font-black uppercase text-xl italic tracking-tighter">
                            <span class="text-yellow-500">Quality</span> <span class="text-black">ENTRY</span>
                        </h2>
                    </div>
                    <button v-if="forms.length > 1 && !form.isLocked" @click="removeForm(index)"
                        class="text-red-500 font-bold text-sm hover:underline"><i class="fa fa-trash-alt"></i> Remove
                        Item</button>
                </div>
                <div class="card-content p-8 md:p-12 flex flex-col gap-10">
                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-10">
                        <!--Part Name-->
                        <div class="relative">
                            <label class="section-label">Part Name</label>
                            <div class="input-wrapper">
                                <input type="text" v-model="form.part_name" @focus="form.showPartDropdown = true"
                                    @blur="closeDropdown(index, 'part')" :disabled="form.isLocked"
                                    placeholder="Search Part..." class="form-input">
                                <!-- Clear Button -->
                                <button v-if="form.part_name && !form.isLocked" @click="clearField(index, 'part')"
                                    class="clear-btn">
                                    <i class="fa fa-times-circle"></i>
                                </button>
                            </div>
                            <div v-if="form.showPartDropdown" class="dropdown-list">
                                <div v-for="part in filterList(distinctParts, form.part_name)" :key="part"
                                    @mousedown="selectPart(part, index)" class="dropdown-item">{{ part }}</div>
                            </div>
                        </div>
                        <!--JO Input-->
                        <div class="relative">
                            <label class="section-label">Job Order Reference</label>
                            <div class="input-wrapper">
                                <input type="text" v-model="form.job_order_no" @focus="form.showJODropdown = true"
                                    @blur="closeDropdown(index, 'jo')" :disabled="form.isLocked || !form.part_name"
                                    placeholder="Select JO Number..." class="form-input">
                                <!-- Clear Button -->
                                <button v-if="form.job_order_no && !form.isLocked" @click="form.job_order_no = ''"
                                    class="clear-btn">
                                    <i class="fa fa-times-circle"></i>
                                </button>
                            </div>
                            <div v-if="form.showJODropdown" class="dropdown-list">
                                <div v-for="jo in filterList(form.availableJOs, form.job_order_no)" :key="jo"
                                    @mousedown="selectJO(jo, index)" class="dropdown-item">{{ jo }}</div>
                            </div>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-10">
                        <!--Inspection Parameter-->
                        <div class="relative">
                            <label class="section-label">Inspection Parameter</label>
                            <div class="input-wrapper">
                                <input type="text" v-model="form.parameter" @focus="form.showParamDropdown = true"
                                    @blur="closeDropdown(index, 'param')" :disabled="form.isLocked"
                                    placeholder="Select Parameter..." class="form-input">
                                <!-- Clear Button -->
                                <button v-if="form.parameter && !form.isLocked" @click="form.parameter = ''"
                                    class="clear-btn">
                                    <i class="fa fa-times-circle"></i>
                                </button>
                            </div>
                            <div v-if="form.showParamDropdown" class="dropdown-list">
                                <!-- List existing parameters -->
                                <div v-for="p in filterList(guideParams, form.parameter)" :key="p"
                                    @mousedown="selectParam(p, index)" class="dropdown-item">{{ p }}</div>

                                <!-- Button to open modal -->
                                <div @mousedown="openParamModal(index)"
                                    class="dropdown-item border-t border-yellow-200 text-yellow-600 font-bold sticky bottom-0 bg-white">
                                    <i class="fa fa-plus-circle mr-2"></i>+ Add New Parameter
                                </div>
                            </div>
                        </div>
                        <!-- Category Dropdown -->
                        <div class="relative">
                            <label class="section-label">Category</label>
                            <div class="input-wrapper">
                                <input type="text" v-model="form.category" @focus="form.showCategoryDropdown = true"
                                    @blur="closeDropdown(index, 'category')" :disabled="form.isLocked"
                                    placeholder="Select Category..." class="form-input">
                                <button v-if="form.category && !form.isLocked" @click="form.category = ''"
                                    class="clear-btn">
                                    <i class="fa fa-times-circle"></i>
                                </button>
                            </div>
                            <div v-if="form.showCategoryDropdown" class="dropdown-list">
                                <!-- The Actual List -->
                                <div v-for="cat in filterList(inspectionCategories, form.category)" :key="cat"
                                    @mousedown="selectCategory(cat, index)" class="dropdown-item">{{ cat }}</div>

                                <!-- Debugging message: shows only if inspectionCategories is empty -->
                                <div v-if="inspectionCategories.length === 0" class="p-4 text-xs text-red-400">
                                    No data found in InspectionCategory table
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 xl:grid-cols-12 gap-10">
                        <div class="xl:col-span-7 qty-container">
                            <label class="section-label">Quantities</label>
                            <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-3">
                                <div class="flex flex-col gap-2">
                                    <label class="text-[10px] font-black uppercase text-gray-500">Total</label>
                                    <input type="number" v-model.number="form.total_checking" @input="updateQty(index)"
                                        @focus="clearIfZero(index, 'total_checking')" :disabled="form.isLocked"
                                        class="form-input qty-input">
                                </div>
                                <div class="flex flex-col gap-2">
                                    <label class="text-[10px] font-black uppercase text-blue-600">Rework</label>
                                    <input type="number" v-model.number="form.rework_qty" @input="updateQty(index)"
                                        @focus="clearIfZero(index, 'rework_qty')" :disabled="form.isLocked"
                                        class="form-input qty-input text-blue-600">
                                </div>
                                <div class="flex flex-col gap-2">
                                    <label class="text-[10px] font-black uppercase text-red-600">Scrap</label>
                                    <input type="number" v-model.number="form.scrap_qty" @input="updateQty(index)"
                                        @focus="clearIfZero(index, 'scrap_qty')" :disabled="form.isLocked"
                                        class="form-input qty-input text-red-600">
                                </div>
                                <div class="flex flex-col gap-2">
                                    <label class="text-[10px] font-black uppercase text-gray-400">Reject</label>
                                    <input type="number" v-model.number="form.reject_qty" readonly
                                        class="form-input qty-input text-gray-400 qty-readonly">
                                </div>
                                <div class="flex flex-col gap-2">
                                    <label class="text-[10px] font-black uppercase text-green-600">Accept</label>
                                    <input type="number" v-model.number="form.accept_qty" readonly
                                        class="form-input qty-input qty-input-accept qty-readonly">
                                </div>
                            </div>
                        </div>

                        <div class="xl:col-span-5 flex flex-col gap-6">
                            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                <!--Inspector-->
                                <div class="relative">
                                    <label class="section-label">Inspector</label>
                                    <div class="input-wrapper">
                                        <input type="text" v-model="form.inspect_by"
                                            @focus="form.showInspectDropdown = true"
                                            @blur="closeDropdown(index, 'inspect')" :disabled="form.isLocked"
                                            placeholder="Checker" class="form-input">
                                        <!-- Clear Button -->
                                        <button v-if="form.inspect_by && !form.isLocked" @click="form.inspect_by = ''"
                                            class="clear-btn">
                                            <i class="fa fa-times-circle"></i>
                                        </button>
                                    </div>
                                    <div v-if="form.showInspectDropdown" class="dropdown-list">
                                        <div v-for="opt in filterList(operators, form.inspect_by)" :key="opt"
                                            @mousedown="selectChecker(opt, index, 'inspect_by')" class="dropdown-item">
                                            {{ opt }}</div>
                                        <div @mousedown="openCheckerModal(index, 'inspect_by')"
                                            class="dropdown-item border-t border-yellow-200 text-yellow-600 font-bold sticky bottom-0 bg-white">
                                            <i class="fa fa-user-plus mr-2"></i>+ Add New Inspector
                                        </div>
                                    </div>
                                </div>
                                <!--Supervisor-->
                                <div class="relative">
                                    <label class="section-label">Supervisor</label>
                                    <div class="input-wrapper">
                                        <input type="text" v-model="form.finalize_by"
                                            @focus="form.showFinalizeDropdown = true"
                                            @blur="closeDropdown(index, 'finalize')" :disabled="form.isLocked"
                                            placeholder="Supervisor" class="form-input">
                                        <!-- Clear Button -->
                                        <button v-if="form.finalize_by && !form.isLocked" @click="form.finalize_by = ''"
                                            class="clear-btn">
                                            <i class="fa fa-times-circle"></i>
                                        </button>
                                    </div>
                                    <div v-if="form.showFinalizeDropdown" class="dropdown-list">
                                        <div v-for="opt in filterList(supervisors, form.finalize_by)" :key="opt"
                                            @mousedown="selectChecker(opt, index, 'finalize_by')" class="dropdown-item">
                                            {{ opt }}</div>
                                        <div @mousedown="openCheckerModal(index, 'finalize_by')"
                                            class="dropdown-item border-t border-yellow-200 text-yellow-600 font-bold sticky bottom-0 bg-white">
                                            <i class="fa fa-user-plus mr-2"></i>+ Add New Supervisor
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="flex flex-col sm:flex-row gap-4">
                                <input type="text" v-model="form.remark" :disabled="form.isLocked"
                                    placeholder="Remarks..." class="form-input flex-1">
                                <button @click="toggleLock(index)"
                                    :class="form.isLocked ? (form.inspection_type === 'Rework' ? 'bg-black text-white' : 'btn-lock-locked') : 'btn-lock-unlocked'"
                                    class="h-[3.5rem] px-8 rounded-2xl font-black flex items-center gap-2 transition-all">
                                    <i :class="form.isLocked ? 'fa fa-unlock' : 'fa fa-lock'"></i>
                                    <span>{{ form.isLocked ? 'UNLOCK' : 'LOCK' }}</span>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="flex flex-col gap-6 max-w-4xl mx-auto">
            <button @click="addNewForm" class="btn-add-form group"><i class="fa fa-plus-circle"></i> ADD ANOTHER
                INSPECTION CARD</button>
            <button @click="submitAll" :disabled="!allLocked" class="btn-submit-all">Confirm & Submit Records</button>
        </div>

        <!-- NEW: PARAMETER MODAL -->
        <div v-if="showParamModal" class="fixed inset-0 z-[500] flex items-center justify-center p-4">
            <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" @click="closeParamModal"></div>
            <div class="relative bg-white w-full max-w-md rounded-[2.5rem] shadow-2xl overflow-hidden">
                <div class="bg-yellow-400 p-6 flex justify-between items-center">
                    <h3 class="font-black uppercase italic text-xl tracking-tighter">Add Parameter</h3>
                    <button @click="closeParamModal" class="text-black/50 hover:text-black"><i
                            class="fa fa-times text-xl"></i></button>
                </div>
                <div class="p-8 flex flex-col gap-5">
                    <div>
                        <label class="section-label">Parameter Name</label>
                        <input type="text" v-model="newParameterName" placeholder="e.g. VISUAL"
                            class="form-input uppercase">
                    </div>
                    <div class="flex gap-3 mt-4">
                        <button @click="closeParamModal"
                            class="flex-1 h-14 rounded-2xl font-bold bg-gray-100 text-gray-600 hover:bg-gray-200 transition-all">CANCEL</button>
                        <button @click="submitNewParam"
                            class="flex-1 h-14 rounded-2xl font-black bg-black text-yellow-400">SAVE</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- NEW: CHECKER MODAL -->
        <div v-if="showCheckerModal" class="fixed inset-0 z-[500] flex items-center justify-center p-4">
            <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" @click="closeCheckerModal"></div>
            <div class="relative bg-white w-full max-w-md rounded-[2.5rem] shadow-2xl overflow-hidden">
                <div class="bg-yellow-400 p-6 flex justify-between items-center">
                    <h3 class="font-black uppercase italic text-xl tracking-tighter">Add Checker</h3>
                    <button @click="closeCheckerModal" class="text-black/50 hover:text-black"><i
                            class="fa fa-times text-xl"></i></button>
                </div>
                <div class="p-8 flex flex-col gap-5">
                    <div><label class="section-label">Name</label><input type="text" v-model="newChecker.name"
                            placeholder="Enter Full Name" class="form-input uppercase placeholder:normal-case"></div>
                    <div><label class="section-label">Emp ID</label><input type="text" v-model="newChecker.empId"
                            placeholder="Enter Employee ID" class="form-input uppercase placeholder:normal-case"></div>
                    <div><label class="section-label">Position</label>
                        <select v-model="newChecker.position" class="form-input bg-white">
                            <option value="" disabled>Select Position</option>
                            <option v-for="pos in positionOptions" :key="pos" :value="pos">{{ pos }}</option>
                        </select>
                    </div>
                    <div class="flex gap-3 mt-4">
                        <button @click="closeCheckerModal"
                            class="flex-1 h-14 rounded-2xl font-bold bg-gray-100">CANCEL</button>
                        <button @click="submitNewChecker"
                            class="flex-1 h-14 rounded-2xl font-black bg-black text-yellow-400">SAVE</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref, onMounted, computed } = Vue;

        createApp({
            setup() {
                const api = axios.create({
                    baseURL: 'http://192.168.2.113:8000/rest/v1',
                    headers: {
                        'apikey': 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyAgCiAgICAicm9sZSI6ICJhbm9uIiwKICAgICJpc3MiOiAic3VwYWJhc2UtZGVtbyIsCiAgICAiaWF0IjogMTY0MTc2OTIwMCwKICAgICJleHAiOiAxNzk5NTM1NjAwCn0.dc_X5iR_VP_qT0zsiyj_I_OZ2T9FtRU2BBNWN8Bu4GE',
                        'Authorization': 'Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyAgCiAgICAicm9sZSI6ICJhbm9uIiwKICAgICJpc3MiOiAic3VwYWJhc2UtZGVtbyIsCiAgICAiaWF0IjogMTY0MTc2OTIwMCwKICAgICJleHAiOiAxNzk5NTM1NjAwCn0.dc_X5iR_VP_qT0zsiyj_I_OZ2T9FtRU2BBNWN8Bu4GE'
                    }
                });

                const forms = ref([]);
                const distinctParts = ref([]);
                const guideParams = ref([]);
                const operators = ref([]);
                const supervisors = ref([]);
                const inspectionCategories = ref([]);

                // Modal States
                const showParamModal = ref(false);
                const showCheckerModal = ref(false);
                const currentFormIdx = ref(null);
                const currentTargetField = ref('');
                const newParameterName = ref('');
                const newChecker = ref({ name: '', empId: '', position: '' });
                const positionOptions = ["PRODUCTION OPERATOR", "QA ASSISTANT", "QA ENGINEER", "ASSISTANT ENGINEER", "QA TECHNICIAN"];

                const addNewForm = () => {
                    forms.value.push({
                        inspection_type: 'Initial', part_name: '', job_order_no: '', parameter: '', category: 'IPQC', total_checking: 0, rework_qty: 0,
                        reject_qty: 0, scrap_qty: 0, accept_qty: 0, inspect_by: '', finalize_by: '', remark: '',
                        isLocked: false, availableJOs: [], showPartDropdown: false, showJODropdown: false, showParamDropdown: false, showCategoryDropdown: false,
                        showInspectDropdown: false, showFinalizeDropdown: false
                    });
                };

                const fetchData = async () => {
                    try {
                        const [pRes, gRes, cRes, catRes] = await Promise.all([
                            api.get('/JobOrder?select=Part_Name'),
                            api.get('/InspectionGuide?select=Parameter'),
                            api.get('/InspectionChecker?select=CheckerName,Position&order=id.asc'),
                            api.get('/InspectionCategory?select=id,Category&order=id.asc')
                        ]);
                        distinctParts.value = [...new Set(pRes.data.map(i => i.Part_Name || i.part_name))].filter(Boolean).sort();
                        guideParams.value = [...new Set(gRes.data.map(i => i.Parameter || i.parameter))].filter(Boolean).sort();
                        operators.value = cRes.data.filter(c => c.Position === 'PRODUCTION OPERATOR').map(c => c.CheckerName || c.checkername);
                        supervisors.value = cRes.data.filter(c => c.Position !== 'PRODUCTION OPERATOR').map(c => c.CheckerName || c.checkername);
                        inspectionCategories.value = catRes.data
                            .map(i => i.Category || i.category)
                            .filter(Boolean);
                    } catch (err) { console.error(err); }
                };

                const clearField = (index, type) => {
                    const f = forms.value[index];
                    if (type === 'part') {
                        f.part_name = '';
                        f.job_order_no = ''; // Clear JO if Part is cleared
                        f.availableJOs = [];
                    }
                };

                const openParamModal = (idx) => { currentFormIdx.value = idx; newParameterName.value = ''; showParamModal.value = true; };
                const closeParamModal = () => { showParamModal.value = false; };
                const submitNewParam = async () => {
                    if (!newParameterName.value.trim()) return;
                    const val = newParameterName.value.trim().toUpperCase();
                    try {
                        await api.post('/InspectionGuide', { Parameter: val });
                        if (!guideParams.value.includes(val)) { guideParams.value.push(val); guideParams.value.sort(); }
                        forms.value[currentFormIdx.value].parameter = val;
                        closeParamModal();
                    } catch (e) { console.error(e); }
                };

                const openCheckerModal = (idx, field) => { currentFormIdx.value = idx; currentTargetField.value = field; newChecker.value = { name: '', empId: '', position: '' }; showCheckerModal.value = true; };
                const closeCheckerModal = () => { showCheckerModal.value = false; };
                const submitNewChecker = async () => {
                    const { name, empId, position } = newChecker.value;
                    if (!name || !empId || !position) return;
                    const formattedName = name.trim().toUpperCase();
                    try {
                        await api.post('/InspectionChecker', { CheckerName: formattedName, EmpID: empId.trim().toUpperCase(), Position: position });
                        if (position === 'PRODUCTION OPERATOR') { operators.value.push(formattedName); operators.value.sort(); }
                        else { supervisors.value.push(formattedName); supervisors.value.sort(); }
                        forms.value[currentFormIdx.value][currentTargetField.value] = formattedName;
                        closeCheckerModal();
                    } catch (e) { console.error(e); }
                };

                const filterList = (list, search) => !search ? list : list.filter(i => String(i).toLowerCase().includes(search.toLowerCase()));

                const selectPart = async (name, index) => {
                    forms.value[index].part_name = name;
                    forms.value[index].showPartDropdown = false;
                    const res = await api.get(`/JobOrder?Part_Name=eq.${encodeURIComponent(name)}&select=JO_Number`);
                    forms.value[index].availableJOs = [...new Set(res.data.map(i => i.JO_Number || i.jo_number))].filter(Boolean).sort();
                };

                const selectJO = (jo, index) => { forms.value[index].job_order_no = jo; forms.value[index].showJODropdown = false; };
                const selectParam = (p, index) => { forms.value[index].parameter = p; forms.value[index].showParamDropdown = false; };
                const selectChecker = (name, index, field) => {
                    forms.value[index][field] = name;
                    if (field === 'inspect_by') forms.value[index].showInspectDropdown = false;
                    else forms.value[index].showFinalizeDropdown = false;
                };
                const selectCategory = (cat, index) => {
                    forms.value[index].category = cat;
                    forms.value[index].showCategoryDropdown = false;
                };


                const closeDropdown = (idx, type) => {
                    setTimeout(() => {
                        if (type === 'part') forms.value[idx].showPartDropdown = false;
                        else if (type === 'jo') forms.value[idx].showJODropdown = false;
                        else if (type === 'param') forms.value[idx].showParamDropdown = false;
                        else if (type === 'category') forms.value[idx].showCategoryDropdown = false;
                        else if (type === 'inspect') forms.value[idx].showInspectDropdown = false;
                        else forms.value[idx].showFinalizeDropdown = false;
                    }, 250);
                };

                const updateQty = (idx) => {
                    const f = forms.value[idx];
                    f.reject_qty = (f.rework_qty || 0) + (f.scrap_qty || 0);
                    f.accept_qty = (f.total_checking || 0) - f.reject_qty;
                };

                const toggleLock = (idx) => {
                    const f = forms.value[idx];
                    if (!f.part_name || !f.job_order_no || !f.inspect_by || !f.finalize_by) {
                        Toastify({ text: "Please complete all fields", style: { background: "#ef4444" } }).showToast();
                        return;
                    }
                    f.isLocked = !f.isLocked;
                };

                const removeForm = (idx) => forms.value.splice(idx, 1);
                const allLocked = computed(() => forms.value.length > 0 && forms.value.every(f => f.isLocked));

                const submitAll = async () => {
                    try {
                        const payload = forms.value.map(f => ({
                            Inspection_Type: f.inspection_type, Category: f.category,
                            Part_Name: f.part_name, JO_Number: f.job_order_no, Parameter: f.parameter,
                            TotalCheck: f.total_checking || 0, ReworkQty: f.rework_qty || 0,
                            RejectQty: f.reject_qty || 0, ScrapQty: f.scrap_qty || 0,
                            AcceptQty: f.accept_qty || 0, InspectBy: f.inspect_by,
                            FinalizeBy: f.finalize_by, Remark: f.remark, created_at: new Date().toISOString()
                        }));
                        await api.post('/InspectionRecord', payload);
                        localStorage.setItem('last_inspection_submission', JSON.stringify(payload));
                        Toastify({ text: "Success! Records Saved.", style: { background: "#fbbf24", color: "#000" } }).showToast();
                        setTimeout(() => { window.location.href = 'inspectionSummary.html'; }, 1500);
                    } catch (err) { console.error(err); }
                };

                const clearIfZero = (idx, field) => { if (forms.value[idx][field] === 0) forms.value[idx][field] = ''; };

                onMounted(() => {
                    addNewForm(); // Auto-open card immediately
                    fetchData();  // Then load dropdown data
                });

                return {
                    forms, distinctParts, guideParams, operators, supervisors, filterList, selectPart, selectJO, inspectionCategories,
                    selectParam, selectChecker, closeDropdown, updateQty, toggleLock, addNewForm, selectCategory,
                    removeForm, allLocked, submitAll, clearIfZero,
                    showParamModal, showCheckerModal, newParameterName, newChecker, positionOptions, clearField,
                    openParamModal, closeParamModal, submitNewParam, openCheckerModal, closeCheckerModal, submitNewChecker
                };
            }
        }).mount('#app');
    </script>
</body>

</html>
