<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <title>Job Order History - Famax QC</title>
  <link rel="icon" type="png" href="/FamaxQCSystem/img/LogoRound.png?v=2" />

  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <!-- EXCEL LIBRARY -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

  <style>
    :root {
      --primary: #0078d4;
      --bg-body: #f3f4f6;
      --text-main: #1f2937;
      --text-muted: #6b7280;
      --border-color: #e5e7eb;
      --danger: #ef4444;
      --success: #10b981;
    }

    body {
      font-family: "Inter", sans-serif;
      background-color: var(--bg-body);
      padding: 20px;
      margin: 0;
    }

    .container {
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
    }

    .card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      overflow: hidden;
    }

    .card-header {
      background: var(--primary);
      padding: 18px 25px;
      color: white;
    }

    .card-header h1 {
      margin: 0;
      font-size: 1.5rem;
    }

    .search-section {
      display: flex;
      gap: 12px;
      padding: 20px;
      background: #fff;
      border-bottom: 1px solid var(--border-color);
    }

    #jobOrderSelect {
      flex: 1;
      height: 48px;
      border: 1px solid #ccc;
      border-radius: 8px;
      padding: 0 15px;
      font-size: 15px;
      width: 100%;
    }

    .btn-search {
      background: var(--primary);
      color: white;
      border: none;
      padding: 0 25px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
    }

    .btn-export {
      background: #166534;
      color: white;
      border: none;
      padding: 0 25px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      display: none;
      /* Hidden until data is loaded */
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
      padding: 20px;
      background: #f9fafb;
    }

    .stat-box {
      padding: 12px 15px;
      background: white;
      border: 1px solid var(--border-color);
      border-radius: 8px;
    }

    .stat-label {
      font-size: 10px;
      color: var(--text-muted);
      text-transform: uppercase;
      font-weight: 700;
    }

    .stat-value {
      font-size: 15px;
      font-weight: 700;
      margin-top: 4px;
    }

    /* FIXED ALIGNMENT CSS */
    .table-container {
      width: 100%;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    table.main-table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
      min-width: 1000px;
    }

    table.main-table th,
    table.main-table td {
      padding: 15px 10px;
      border-bottom: 1px solid var(--border-color);
      font-size: 13px;
      word-wrap: break-word;
    }

    table.main-table th {
      background: #f8fafc;
      color: var(--text-muted);
      font-size: 11px;
      text-transform: uppercase;
      text-align: left;
    }

    .col-icon {
      width: 50px;
      text-align: center;
    }

    .col-process {
      width: auto;
      font-weight: 700;
    }

    .col-machine {
      width: 120px;
    }

    .col-date {
      width: 130px;
    }

    .col-num {
      width: 100px;
      text-align: center !important;
    }

    .col-yield {
      width: 100px;
      text-align: center !important;
    }

    .process-row {
      cursor: pointer;
    }

    .process-row:hover {
      background-color: #f1f5f9;
    }

    .expand-icon {
      transition: transform 0.2s;
      color: var(--primary);
      font-size: 12px;
      display: inline-block;
    }

    .row-expanded .expand-icon {
      transform: rotate(180deg);
    }

    .details-row {
      display: none;
      background: #ffffff;
    }

    .details-wrapper {
      padding: 10px 15px 25px 60px;
      border-left: 5px solid var(--primary);
    }

    .inner-table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border: 1px solid #ddd;
    }

    .inner-table th {
      background: #f1f5f9;
      padding: 10px;
      font-size: 11px;
      text-align: left;
    }

    .inner-table td {
      padding: 10px;
      border-bottom: 1px solid #eee;
    }

    .badge {
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 700;
    }

    .badge-success {
      background: #dcfce7;
      color: #166534;
    }

    .badge-danger {
      background: #fee2e2;
      color: #991b1b;
    }

    @media (max-width: 768px) {
      .search-section {
        flex-direction: column;
      }

      .btn-export {
        width: 100%;
        height: 48px;
      }

      .summary-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="card">
      <div class="card-header">
        <h1>Job Order History</h1>
      </div>

      <div class="search-section">
        <select id="jobOrderSelect">
          <option value="">Loading...</option>
        </select>
        <button class="btn-search" onclick="searchHistory()">View History</button>
        <!-- ADDED EXPORT BUTTON -->
        <button id="btnExport" class="btn-export" onclick="exportToExcel()">Export Excel</button>
      </div>

      <div id="loading" style="display:none; text-align:center; padding:20px;">Searching...</div>

      <div id="resultArea" style="display: none;">
        <div class="summary-grid">
          <div class="stat-box">
            <div class="stat-label">Part Name</div>
            <div id="summaryPartName" class="stat-value">-</div>
          </div>
          <div class="stat-box">
            <div class="stat-label">Order Quantity</div>
            <div id="summaryQuantity" class="stat-value">-</div>
          </div>
          <div class="stat-box">
            <div class="stat-label">Overall Yield</div>
            <div id="summaryYield" class="stat-value">-</div>
          </div>
        </div>

        <div class="table-container">
          <table class="main-table">
            <thead>
              <tr>
                <th class="col-icon"></th>
                <th class="col-process">Process Name</th>
                <th class="col-machine">Machine</th>
                <th class="col-date">Last Inspected</th>
                <th class="col-num">Total</th>
                <th class="col-num">OK</th>
                <th class="col-num">NG</th>
                <th class="col-yield">Yield</th>
              </tr>
            </thead>
            <tbody id="historyTableBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "http://192.168.0.5:8000";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyAgCiAgICAicm9sZSI6ICJhbm9uIiwKICAgICJpc3MiOiAic3VwYWJhc2UtZGVtbyIsCiAgICAiaWF0IjogMTY0MTc2OTIwMCwKICAgICJleHAiOiAxNzk5NTM1NjAwCn0.dc_X5iR_VP_qT0zsiyj_I_OZ2T9FtRU2BBNWN8Bu4GE";

    const api = axios.create({
      baseURL: SUPABASE_URL,
      headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}`, "Content-Type": "application/json" }
    });

    let joMetadata = new Map();
    let currentProcessedData = null; // To store data for Excel export

    $(document).ready(() => fetchJobOrders());

    async function fetchJobOrders() {
      try {
        const response = await api.get('/rest/v1/JobOrder?select=JO_Number,Part_Name,Quantity&order=created_at.desc');
        const $select = $("#jobOrderSelect").empty().append('<option value=""> Select Job Order </option>');
        const seen = new Set();
        response.data.forEach(item => {
          if (item.JO_Number && !seen.has(item.JO_Number)) {
            seen.add(item.JO_Number);
            joMetadata.set(item.JO_Number, {
              partName: item.Part_Name || "N/A",
              quantity: item.Quantity || "-"
            });
            $select.append(`<option value="${item.JO_Number}">${item.JO_Number} — ${item.Part_Name}</option>`);
          }
        });
      } catch (e) { console.error(e); }
    }

    async function searchHistory() {
      const jo = $("#jobOrderSelect").val();
      if (!jo) return;

      const meta = joMetadata.get(jo);
      $("#summaryPartName").text(meta.partName);
      $("#summaryQuantity").text(meta.quantity);

      $("#loading").show(); $("#resultArea").hide(); $("#btnExport").hide();
      try {
        const res = await api.get(`/rest/v1/Data_IPQC?JO_Number=eq.${jo}`);
        if (!res.data.length) {
          $("#loading").hide();
          alert("No inspection data found.");
          return;
        }
        processAndDisplayData(res.data);
        $("#btnExport").show();
      } catch (e) { alert("Error fetching data"); } finally { $("#loading").hide(); }
    }

    function processAndDisplayData(data) {
      const processMap = {};
      let grandTotalOk = 0, grandTotalNg = 0;

      const byProcess = {};
      data.forEach(row => {
        const p = row.Process || "Unknown";
        if (!byProcess[p]) byProcess[p] = [];
        byProcess[p].push(row);
      });

      Object.keys(byProcess).forEach(pName => {
        const rows = byProcess[pName].sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
        const clusters = [];
        let currentCluster = [];
        rows.forEach(row => {
          if (currentCluster.length === 0) {
            currentCluster.push(row);
          } else {
            const lastTime = new Date(currentCluster[0].created_at).getTime();
            const currentTime = new Date(row.created_at).getTime();
            if (Math.abs(currentTime - lastTime) <= 2000) {
              currentCluster.push(row);
            } else {
              clusters.push(currentCluster);
              currentCluster = [row];
            }
          }
        });
        if (currentCluster.length > 0) clusters.push(currentCluster);

        processMap[pName] = {
          name: pName,
          mc: clusters[0][0].Machine || "-",
          date: clusters[clusters.length - 1][0].created_at,
          okCount: 0, ngCount: 0, totalCount: clusters.length,
          dailySummary: {}
        };

        clusters.forEach(cluster => {
          let clusterIsNg = false;
          const dateKey = new Date(cluster[0].created_at).toLocaleDateString('en-GB');

          if (!processMap[pName].dailySummary[dateKey]) {
            processMap[pName].dailySummary[dateKey] = { ok: 0, ng: 0, remarks: "" };
          }
          if (!processMap[pName].dailySummary[dateKey].remarks && cluster[0].Remarks) {
            processMap[pName].dailySummary[dateKey].remarks = cluster[0].Remarks;
          }

          cluster.forEach(row => {
            const lsl = parseFloat(row.LSL_OK), usl = parseFloat(row.USL_NG);
            [row.Reading_1, row.Reading_2, row.Reading_3].forEach(v => {
              if (v === null || v === "") return;
              const n = parseFloat(v);
              if ((!isNaN(n) && (n < lsl || n > usl)) || String(v).toUpperCase() === "NG") {
                clusterIsNg = true;
              }
            });
          });

          if (clusterIsNg) {
            processMap[pName].ngCount++;
            processMap[pName].dailySummary[dateKey].ng++;
            grandTotalNg++;
          } else {
            processMap[pName].okCount++;
            processMap[pName].dailySummary[dateKey].ok++;
            grandTotalOk++;
          }
        });
      });

      const totalInspected = grandTotalOk + grandTotalNg;
      const yieldPct = totalInspected > 0 ? ((grandTotalOk / totalInspected) * 100).toFixed(1) : "0.0";
      $("#summaryYield").text(yieldPct + "%");

      // Store globally for Excel export
      currentProcessedData = {
        processMap,
        meta: joMetadata.get($("#jobOrderSelect").val()),
        jo: $("#jobOrderSelect").val(),
        overallYield: yieldPct + "%"
      };

      const $body = $("#historyTableBody").empty();
      Object.keys(processMap).sort().forEach((k, i) => {
        const p = processMap[k];
        const y = p.totalCount > 0 ? ((p.okCount / p.totalCount) * 100).toFixed(1) : "0.0";
        const dailyKeys = Object.keys(p.dailySummary).sort((a, b) => new Date(b.split('/').reverse().join('-')) - new Date(a.split('/').reverse().join('-')));

        const innerRows = dailyKeys.map(date => {
          const s = p.dailySummary[date];
          return `<tr>
                <td style="width:25%; font-weight:600;">${date}</td>
                <td style="width:20%; color:var(--success); font-weight:600;">${s.ok}</td>
                <td style="width:20%; color:var(--danger); font-weight:600;">${s.ng}</td>
                <td>${s.remarks || '-'}</td>
              </tr>`;
        }).join('');

        $body.append(`
          <tr class="process-row" onclick="toggleDetails(${i}, this)">
            <td class="col-icon"><span class="expand-icon">▼</span></td>
            <td class="col-process">${p.name}</td>
            <td class="col-machine">${p.mc}</td>
            <td class="col-date">${new Date(p.date).toLocaleDateString('en-GB')}</td>
            <td class="col-num">${p.totalCount}</td>
            <td class="col-num" style="color:var(--success); font-weight:600">${p.okCount}</td>
            <td class="col-num" style="color:var(--danger); font-weight:600">${p.ngCount}</td>
            <td class="col-yield"><span class="badge ${y >= 95 ? 'badge-success' : 'badge-danger'}">${y}%</span></td>
          </tr>
          <tr class="details-row" id="det-${i}">
            <td colspan="8">
              <div class="details-wrapper">
                <table class="inner-table">
                  <thead><tr><th>Date</th><th>OK</th><th>NG</th><th>Remarks</th></tr></thead>
                  <tbody>${innerRows}</tbody>
                </table>
              </div>
            </td>
          </tr>`);
      });
      $("#resultArea").show();
    }

    function toggleDetails(i, el) {
      $(`#det-${i}`).toggle();
      $(el).toggleClass("row-expanded");
    }

    // EXPORT FUNCTION
    function exportToExcel() {
      if (!currentProcessedData) return;

      const { processMap, meta, jo, overallYield } = currentProcessedData;
      const wb = XLSX.utils.book_new();
      const exportRows = [];

      // 1. Header Information
      exportRows.push(["JOB ORDER QUALITY REPORT"]);
      exportRows.push(["JO Number:", jo]);
      exportRows.push(["Part Name:", meta.partName]);
      exportRows.push(["Order Qty:", meta.quantity]);
      exportRows.push(["Overall Yield:", overallYield]);
      exportRows.push([]); // Spacer

      // 2. Main Process Summary Table
      exportRows.push(["PROCESS SUMMARY"]);
      exportRows.push(["Process Name", "Machine", "Last Inspected", "Total", "OK", "NG", "Yield %"]);

      Object.keys(processMap).sort().forEach(k => {
        const p = processMap[k];
        const y = p.totalCount > 0 ? ((p.okCount / p.totalCount) * 100).toFixed(1) : "0.0";
        exportRows.push([
          p.name,
          p.mc,
          new Date(p.date).toLocaleDateString('en-GB'),
          p.totalCount,
          p.okCount,
          p.ngCount,
          y + "%"
        ]);
      });

      exportRows.push([]); // Spacer
      exportRows.push(["DETAILED DAILY LOGS"]);

      // 3. Detailed Logs per Process
      Object.keys(processMap).sort().forEach(k => {
        const p = processMap[k];
        exportRows.push(["Process:", p.name]);
        exportRows.push(["Date", "OK", "NG", "Remarks"]);

        const dailyKeys = Object.keys(p.dailySummary).sort((a, b) => new Date(b.split('/').reverse().join('-')) - new Date(a.split('/').reverse().join('-')));
        dailyKeys.forEach(date => {
          const s = p.dailySummary[date];
          exportRows.push([date, s.ok, s.ng, s.remarks || "-"]);
        });
        exportRows.push([]); // Small spacer between processes
      });

      const ws = XLSX.utils.aoa_to_sheet(exportRows);

      // Basic formatting: Column Widths
      ws['!cols'] = [
        { wch: 25 }, // A
        { wch: 15 }, // B
        { wch: 15 }, // C
        { wch: 10 }, // D
        { wch: 10 }, // E
        { wch: 10 }, // F
        { wch: 10 }  // G
      ];

      XLSX.utils.book_append_sheet(wb, ws, "JO History");
      XLSX.writeFile(wb, `JO_${jo}_History_Report.xlsx`);
    }
  </script>
</body>

</html>
