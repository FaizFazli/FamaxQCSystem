<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Document Revision</title>
    <!-- Add /FamaxQCSystem to the beginning of the path -->
    <link rel="icon" type="png" href="/FamaxQCSystem/img/LogoRound.png?v=2">

  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Libraries -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <style>
    :root {
      --primary: #0078d4;
      --primary-dark: #005a9e;
      --bg-body: #f3f4f6;
      --bg-card: #ffffff;
      --text-main: #1f2937;
      --text-muted: #6b7280;
      --border-color: #e5e7eb;
      --danger: #ef4444;
      --focus-ring: rgba(0, 120, 212, 0.25);
      --input-height: 46px;
      --radius: 8px;
      --shadow-card: 0 10px 25px -5px rgba(0, 0, 0, 0.1),
        0 8px 10px -6px rgba(0, 0, 0, 0.1);
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: "Inter", sans-serif;
      background-color: var(--bg-body);
      color: var(--text-main);
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
    }

    /* --- Navigation --- */
    .nav-top {
      width: 100%;
      max-width: 550px;
      margin-bottom: 15px;
      display: flex;
      justify-content: flex-start;
    }

    .back-link {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      transition: color 0.2s;
    }

    .back-link:hover {
      color: var(--primary);
    }

    /* --- Main Card --- */
    .card {
      background: var(--bg-card);
      width: 100%;
      max-width: 550px;
      border-radius: 16px;
      box-shadow: var(--shadow-card);
      overflow: hidden;
      border: 1px solid var(--border-color);
    }

    /* Header */
    .card-header {
      background: var(--primary);
      padding: 24px 30px;
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .card-header h1 {
      margin: 0;
      font-size: 20px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .card-body {
      padding: 30px;
    }

    /* --- Form Elements --- */
    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-main);
      margin-bottom: 8px;
    }

    /* Select2 Overrides */
    .select2-container {
      width: 100% !important;
    }

    .select2-container .select2-selection--single {
      height: var(--input-height) !important;
      border: 1px solid var(--border-color) !important;
      border-radius: var(--radius) !important;
      display: flex !important;
      align-items: center !important;
    }

    .select2-container--default .select2-selection--single .select2-selection__rendered {
      padding-left: 12px !important;
      color: var(--text-main) !important;
      font-size: 14px !important;
    }

    .select2-container--default .select2-selection--single .select2-selection__arrow {
      height: 100% !important;
      top: 0 !important;
      right: 8px !important;
    }

    .select2-container--default.select2-container--focus .select2-selection--single,
    .select2-container--default.select2-container--open .select2-selection--single {
      border-color: var(--primary) !important;
      box-shadow: 0 0 0 4px var(--focus-ring) !important;
    }

    .select2-dropdown {
      border-color: var(--border-color) !important;
      border-radius: var(--radius) !important;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1) !important;
      margin-top: 4px;
    }

    .select2-results__option {
      padding: 10px 12px !important;
      font-size: 14px !important;
    }

    .select2-container--default .select2-results__option--highlighted[aria-selected] {
      background-color: var(--primary) !important;
    }

    /* --- File Upload Area --- */
    .file-drop-area {
      position: relative;
      display: flex;
      align-items: center;
      width: 100%;
      padding: 20px;
      border: 2px dashed var(--border-color);
      border-radius: var(--radius);
      transition: 0.2s;
      background: #f9fafb;
      flex-direction: column;
      gap: 10px;
      text-align: center;
    }

    .file-drop-area:hover {
      border-color: var(--primary);
      background: #eff6ff;
    }

    .choose-file-btn {
      background-color: white;
      border: 1px solid var(--border-color);
      border-radius: 4px;
      padding: 6px 12px;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-main);
      pointer-events: none;
    }

    .file-msg {
      font-size: 13px;
      color: var(--text-muted);
      pointer-events: none;
    }

    .file-input {
      position: absolute;
      left: 0;
      top: 0;
      height: 100%;
      width: 100%;
      cursor: pointer;
      opacity: 0;
    }

    .file-hint {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 6px;
    }

    /* --- Action Button --- */
    .btn-action {
      width: 100%;
      height: 48px;
      background-color: var(--primary);
      color: white;
      border: none;
      border-radius: var(--radius);
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 20px;
    }

    .btn-action:hover:not(:disabled) {
      background-color: var(--primary-dark);
    }

    .btn-action:disabled {
      background-color: #cbd5e1;
      cursor: not-allowed;
    }

    /* --- Messages --- */
    .error-msg {
      color: var(--danger);
      font-size: 13px;
      margin-top: 5px;
      display: none;
    }

    /* --- Loading Overlay --- */
    #loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(255, 255, 255, 0.9);
      z-index: 2000;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }

    .spinner {
      border: 3px solid #f3f3f3;
      border-top: 3px solid var(--primary);
      border-radius: 50%;
      width: 30px;
      height: 30px;
      animation: spin 1s linear infinite;
      margin-bottom: 10px;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    .footer {
      margin-top: auto;
      padding: 20px;
      color: var(--text-muted);
      font-size: 12px;
    }
  </style>
</head>

<body>
  <div id="loading-overlay" style="display: none">
    <div class="spinner"></div>
    <div style="font-size: 14px; color: var(--text-muted)">
      Processing Revision...
    </div>
  </div>

  <!-- Navigation -->
  <div class="nav-top">
    <a onclick="window.location.href='AdminLogin.html'" class="back-link">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="19" y1="12" x2="5" y2="12"></line>
        <polyline points="12 19 5 12 12 5"></polyline>
      </svg>
      Back to Dashboard
    </a>
  </div>

  <div class="card">
    <div class="card-header">
      <h1>
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
          <polyline points="14 2 14 8 20 8"></polyline>
          <line x1="16" y1="13" x2="8" y2="13"></line>
          <line x1="16" y1="17" x2="8" y2="17"></line>
          <polyline points="10 9 9 9 8 9"></polyline>
        </svg>
        Document Revision
      </h1>
    </div>

    <div class="card-body">
      <!-- Document Type -->
      <div class="form-group">
        <label>Document Type</label>
        <select id="documentType" class="select2">
          <option value="" disabled selected>Select type...</option>
          <option value="IPQC">IPQC</option>
          <option value="IQC">IQC</option>
          <option value="OQC">OQC</option>
        </select>
      </div>

      <!-- Part Name -->
      <div class="form-group">
        <label>Part Name</label>
        <select id="partName" class="select2" disabled>
          <option value=""></option>
        </select>
      </div>

      <!-- Process -->
      <div class="form-group" id="processGroup" style="display: none">
        <label>Process</label>
        <select id="process" class="select2">
          <option value=""></option>
        </select>
      </div>

      <!-- File Upload -->
      <div class="form-group" id="fileGroup" style="display: none">
        <label>Upload Revision File (.xlsx)</label>
        <div class="file-drop-area">
          <span class="choose-file-btn">Choose File</span>
          <span class="file-msg">or drag and drop here</span>
          <input class="file-input" type="file" id="fileUpload" accept=".xlsx" />
        </div>
        <div class="file-hint" id="fileFormatHint"></div>
        <div class="error-msg" id="fileError"></div>
      </div>

      <!-- Submit Button -->
      <button id="submitBtn" class="btn-action" disabled>
        Continue to Image Revision
      </button>
    </div>
  </div>

  <div class="footer">© 2025 Famax Technology (M) Sdn. Bhd. All rights reserved.</div>

  <script>
    // --- Config ---
    const SUPABASE_URL = "http://192.168.0.5:8000";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyAgCiAgICAicm9sZSI6ICJhbm9uIiwKICAgICJpc3MiOiAic3VwYWJhc2UtZGVtbyIsCiAgICAiaWF0IjogMTY0MTc2OTIwMCwKICAgICJleHAiOiAxNzk5NTM1NjAwCn0.dc_X5iR_VP_qT0zsiyj_I_OZ2T9FtRU2BBNWN8Bu4GE";
    const API_URL = "http://192.168.0.5/FamaxQCSystem";

    const supabaseClient = window.supabase.createClient(
      SUPABASE_URL,
      SUPABASE_KEY,
      { auth: { persistSession: false } }
    );

    // --- HELPER: Clean Excel values and handle numbers/nulls ---
    function cleanValue(cell) {
      if (!cell || cell.v === undefined || cell.v === "" || cell.v === "-") return null;

      // If the value is a string but represents a number, convert it to a float
      if (typeof cell.v === 'string') {
        const cleaned = cell.v.trim();
        if (cleaned !== "" && !isNaN(cleaned)) {
          return parseFloat(cleaned);
        }
      }
      return cell.v;
    }

    $(document).ready(function () {
      // Init Select2
      $(".select2").select2({
        width: "100%",
        placeholder: "Select...",
        allowClear: true,
      });

      // Auto-focus search field when opening Select2
      $('.select2').on("select2:open", function () {
        setTimeout(() => {
          const search = document.querySelector(".select2-container--open .select2-search__field");
          if (search) search.focus();
        }, 0);
      });

      // 1. Doc Type Change
      $("#documentType").on("select2:select", function (e) {
        const docType = e.params.data.id;
        loadPartNames(docType);
        resetFields(["partName", "process", "file"]);
      });

      // 2. Part Name Change
      $("#partName").on("select2:select", function (e) {
        const docType = $("#documentType").val();
        const partName = e.params.data.id;
        loadProcesses(docType, partName);
        resetFields(["process", "file"]);
      });

      // 3. Process Change
      $("#process").on("select2:select", function (e) {
        const proc = e.params.data.id;
        const docType = $("#documentType").val();
        showFileUpload(proc, docType);
      });

      // 4. File Input
      $("#fileUpload").on("change", function () {
        const files = this.files;
        if (files.length > 0) {
          $(".file-msg").text(files[0].name);
          const docType = $("#documentType").val();
          const proc = $("#process").val();
          validateFile(files[0].name, proc, docType);
        } else {
          resetFileUI();
        }
      });

      // 5. Submit
      $("#submitBtn").click(handleSubmission);
    });

    function resetFields(fields) {
      if (fields.includes("partName")) {
        $("#partName").empty().append(new Option("", "")).trigger("change").prop("disabled", true);
      }
      if (fields.includes("process")) {
        $("#processGroup").hide();
        $("#process").empty().append(new Option("", "")).trigger("change");
      }
      if (fields.includes("file")) {
        $("#fileGroup").hide();
        resetFileUI();
      }
      $("#submitBtn").prop("disabled", true);
    }

    function resetFileUI() {
      $("#fileUpload").val("");
      $(".file-msg").text("or drag and drop here");
      $("#fileError").hide();
      $("#submitBtn").prop("disabled", true);
    }

    // --- Data Loading ---
    async function loadPartNames(docType) {
      $("#loading-overlay").show();
      try {
        const { data, error } = await supabaseClient.from(docType).select("Part_Name");
        if (error) throw error;

        const uniqueParts = [...new Set(data.map((item) => item.Part_Name))];
        const $select = $("#partName").empty().append(new Option("", ""));
        uniqueParts.forEach((p) => $select.append(new Option(p, p)));
        $select.prop("disabled", false);
      } catch (e) {
        console.error(e);
        alert("Error loading parts: " + e.message);
      }
      $("#loading-overlay").hide();
    }

    async function loadProcesses(docType, partName) {
      $("#loading-overlay").show();
      try {
        const { data, error } = await supabaseClient.from(docType).select("Process").eq("Part_Name", partName);
        if (error) throw error;

        const uniqueProc = [...new Set(data.map((item) => item.Process))].filter((p) => p);
        if (uniqueProc.length > 0) {
          const $select = $("#process").empty().append(new Option("", ""));
          uniqueProc.forEach((p) => $select.append(new Option(p, p)));
          $("#processGroup").fadeIn();
        } else {
          alert("No processes found for this part.");
        }
      } catch (e) {
        console.error(e);
      }
      $("#loading-overlay").hide();
    }

    // --- File Logic ---
    function showFileUpload(process, docType) {
      $("#fileFormatHint").text(`Expected format: Vx_${process}_${docType}.xlsx`);
      $("#fileGroup").fadeIn();
      resetFileUI();
    }

    function validateFile(filename, process, docType) {
      const escapedProcess = process.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      const pattern = new RegExp(`^V\\d+_${escapedProcess}_${docType}\\.xlsx$`);

      if (!pattern.test(filename)) {
        $("#fileError").text(`Incorrect Format. Expected: Vx_${process}_${docType}.xlsx`).show();
        $("#submitBtn").prop("disabled", true);
        return false;
      }
      $("#fileError").hide();
      $("#submitBtn").prop("disabled", false);
      return true;
    }

    // --- Submission Logic ---
    async function handleSubmission() {
      const docType = $("#documentType").val();
      const partName = $("#partName").val();
      const process = $("#process").val();
      const fileInput = document.getElementById("fileUpload");

      if (!docType || !partName || !process || fileInput.files.length === 0) return;

      $("#loading-overlay").show();
      $("#submitBtn").prop("disabled", true);

      const file = fileInput.files[0];

      try {
        // --- STEP 1: Attempt Local File Server Save ---
        try {
          const formData = new FormData();
          formData.append("file", file);
          formData.append("partName", partName);
          formData.append("process", process);
          formData.append("documentType", docType);

          // Notify server to move existing file to obsolete
          await fetch(`${API_URL}/moveObsoleteFiles`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ partName, process, documentType: docType }),
          });

          // Upload new file
          await fetch(`${API_URL}/saveExcelFile`, { method: "POST", body: formData });
        } catch (serverError) {
          console.warn("Local server connection failed (likely ALPN error). Proceeding with DB update anyway.", serverError);
        }

        // --- STEP 2: Process Excel & Update Supabase ---
        const ws = await readExcel(file);
        const timestamp = new Date().toISOString(); // Fixes 23502 error

        // Mark old data as Suspended
        const { error: updateErr } = await supabaseClient
          .from(docType)
          .update({ Status: "Suspended" })
          .eq("Part_Name", partName)
          .eq("Process", process)
          .eq("Status", "Active");

        if (updateErr) throw updateErr;

        let rowsToInsert = [];

        // Define Ranges based on DocType
        if (docType === "IPQC") {
          const ranges = [{ s: 15, e: 26 }, { s: 63, e: 74 }, { s: 111, e: 122 }, { s: 159, e: 170 }, { s: 207, e: 218 }, { s: 255, e: 266 }, { s: 303, e: 314 }, { s: 351, e: 362 }, { s: 399, e: 410 }, { s: 447, e: 458 }];
          ranges.forEach(r => {
            for (let i = r.s; i <= r.e; i++) {
              if (ws[`V${i}`]?.v) {
                rowsToInsert.push({
                  Part_Name: partName, Process: process, Status: "Active", created_at: timestamp,
                  Point_DWG_Zone: ws[`V${i}`].v,
                  Measuring_Instrument: ws[`W${i}`]?.v || null,
                  LSL_OK: cleanValue(ws[`Y${i}`]), USL_NG: cleanValue(ws[`Z${i}`]),
                  SC: ws[`AA${i}`]?.v || null, LCL: cleanValue(ws[`AB${i}`]), UCL: cleanValue(ws[`AC${i}`])
                });
              }
            }
          });
        } else if (docType === "OQC" || docType === "IQC") {
          const ranges = docType === "OQC"
            ? [{ s: 11, e: 20 }, { s: 59, e: 68 }, { s: 107, e: 116 }, { s: 155, e: 164 }, { s: 203, e: 212 }, { s: 251, e: 260 }, { s: 299, e: 308 }, { s: 347, e: 356 }, { s: 395, e: 404 }, { s: 443, e: 452 }, { s: 491, e: 500 }]
            : [{ s: 13, e: 22 }, { s: 61, e: 70 }, { s: 109, e: 118 }, { s: 157, e: 166 }, { s: 205, e: 214 }, { s: 253, e: 262 }, { s: 301, e: 310 }, { s: 349, e: 358 }, { s: 397, e: 406 }, { s: 445, e: 454 }, { s: 493, e: 502 }, { s: 541, e: 550 }];

          ranges.forEach(r => {
            for (let i = r.s; i <= r.e; i++) {
              if (ws[`V${i}`]?.v) {
                rowsToInsert.push({
                  Part_Name: partName, Process: process, Status: "Active", created_at: timestamp,
                  Point_DWG_Zone: ws[`V${i}`].v,
                  Measuring_Instrument: ws[`W${i}`]?.v || null,
                  Min: cleanValue(ws[`Y${i}`]), Nominal: cleanValue(ws[`Z${i}`]), Max: cleanValue(ws[`AA${i}`])
                });
              }
            }
          });
        }

        if (rowsToInsert.length > 0) {
          const { error: insErr } = await supabaseClient.from(docType).insert(rowsToInsert);
          if (insErr) throw insErr;
        }

        // --- STEP 3: Redirect ---
        sessionStorage.setItem("formData", JSON.stringify({ documentType: docType, partName, process, fileName: file.name }));
        window.location.href = "revisionImage.html";

      } catch (e) {
        console.error(e);
        alert("Database Error: " + (e.message || "Unknown error"));
        $("#loading-overlay").hide();
        $("#submitBtn").prop("disabled", false);
      }
    }

    function readExcel(fileObject) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          const data = new Uint8Array(e.target.result);
          const workbook = XLSX.read(data, { type: "array" });
          resolve(workbook.Sheets[workbook.SheetNames[0]]);
        };
        reader.onerror = reject;
        reader.readAsArrayBuffer(fileObject);
      });
    }
  </script>
</body>

</html>
